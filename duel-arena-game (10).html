function renderField(dv,isMyTurn){
  const scale=parseFloat(localStorage.getItem('ui_scale')||'0.82');
  return`<div class="field-scaler-wrap">
    <div class="field-scaler" id="field-scaler" style="transform:scale(${scale});transform-origin:top center">
      <div class="field">
        ${renderSide(1,dv,isMyTurn,true)}
        <div class="field-divider"></div>
        ${renderSide(0,dv,isMyTurn,false)}
      </div>
    </div>
  </div>`;
}

function renderSide(pi,dv,isMyTurn,isEnemy){
  const p=P(pi);
  const extraDeckCount=p.extraDeck?p.extraDeck.length:0;
  const mRows=isEnemy?
    `<div class="spell-row" style="margin-bottom:.3rem">${p.spellZones.map((z,i)=>renderZone(z,'szone',pi,'spell',i,isMyTurn,isEnemy)).join('')}</div>
     <div class="monster-row">${p.monsterZones.map((z,i)=>renderZone(z,'mzone',pi,'monster',i,isMyTurn,isEnemy)).join('')}</div>`:
    `<div class="monster-row" style="margin-bottom:.3rem">${p.monsterZones.map((z,i)=>renderZone(z,'mzone',pi,'monster',i,isMyTurn,isEnemy)).join('')}</div>
     <div class="spell-row">${p.spellZones.map((z,i)=>renderZone(z,'szone',pi,'spell',i,isMyTurn,isEnemy)).join('')}</div>`;
  // Extra deck zone — enemy에는 표시만, 플레이어에게만 클릭 가능
  const extraZoneOnclick=(!isEnemy&&isMyTurn&&(dv.phase==='MAIN1'||dv.phase==='MAIN2')&&dv.activePlayer===0)?
    `onclick="openExtraSummonModal()"` : '';
  const extraZone=`<div class="zone extra-deck-zone ${extraZoneOnclick?'clickable':''}" style="cursor:${extraZoneOnclick?'pointer':'default'}" ${extraZoneOnclick}>
    <div class="extra-zone-label">EXTRA<br>${extraDeckCount}</div>
    <div class="zone-cnt">${extraDeckCount}</div>
  </div>`;

  return`<div class="field-side">
    ${isEnemy?renderHandArea(p,true):''}
    <div class="field-main-area">
      <div class="zone-col">
        <div class="zone fz"><div>필드</div></div>
        ${renderGYZone(pi,p)}
        <div class="zone bz"><div>제외</div><div class="zone-cnt">${p.banished.length}</div></div>
      </div>
      <div class="extra-col">${extraZone}</div>
      <div>${mRows}</div>
      <div class="extra-col"></div>
      <div class="zone-col">
        <div class="zone" style="background:linear-gradient(135deg,#1a1a3a,#0c0c20)"><div style="font-size:1.2rem">🃏</div><div class="zone-cnt">${p.deck.length}</div></div>
      </div>
    </div>
    ${!isEnemy?renderHandArea(p,false):''}
  </div>`;
}

function renderGYZone(pi,p){
  const topId=p.graveyard[p.graveyard.length-1];
  return`<div class="zone gz" onclick="showGY(${pi})" ${topId?`onmouseenter="showTooltip(event,'${topId}')" onmouseleave="hideTooltip()"`:''}>
    ${topId?`<span>${renderCardImage(CARDDB[topId]?.image||'🃏',30)}</span>`:'<div>묘지</div>'}
    <div class="zone-cnt">${p.graveyard.length}</div>
  </div>`;
}

function renderZone(fieldCard,zoneClass,pi,zoneType,zoneIdx,isMyTurn,isEnemy){
  const dv=d();
  const atk=App.ui.attackingZone;
  const summonMode=App.ui.summonMode&&!isEnemy&&isMyTurn;
  const targetMode=App.ui.targetMode;
  let extraClass='',onclick='';

  if(!fieldCard){
    // Summon mode: show empty zones pulsing
    if(summonMode&&zoneType==='monster'){
      extraClass='pulse';
      onclick=`confirmSummonToZone(${zoneIdx})`;
    }
    // Attack target (direct)
    if(atk&&isEnemy&&zoneType==='monster'){extraClass='atk-target';onclick=`doDirectAttack()`;}
    // Spell zone placement while selectedHand and not summon mode
    if(!isEnemy&&isMyTurn&&App.ui.selectedHand!==null&&!App.ui.summonMode&&!atk){
      if(zoneType==='spell'&&(dv.phase==='MAIN1'||dv.phase==='MAIN2')&&dv.activePlayer===0){
        extraClass='pulse';onclick=`onEmptySpellClick(${zoneIdx})`;
      }
    }
    return`<div class="zone ${zoneClass} ${extraClass} ${onclick?'clickable':''}" onclick="${onclick}">
      <div>${zoneType==='monster'?'M':'S/T'}</div>
    </div>`;
  }

  const card=CARDDB[fieldCard.cardId];
  const fc=getFrameColor(card);
  const isSelectedAtk=atk?.zoneIdx===zoneIdx&&!isEnemy&&zoneType==='monster';
  // Fix 3: 상대 세트 카드는 tooltip 숨김
  const showTip=!(isEnemy&&!fieldCard.faceUp);
  const tipAttrs=showTip?`onmouseenter="showTooltip(event,'${fieldCard.cardId}')" onmouseleave="hideTooltip()"`:'';

  // Player monster zone interactions
  if(!isEnemy&&isMyTurn&&zoneType==='monster'){
    if(dv.phase==='BATTLE'&&dv.activePlayer===0&&fieldCard.canAttack&&!fieldCard.attacked){
      onclick=`selectAttacker(${zoneIdx})`;extraClass=isSelectedAtk?'pulse':'';
    }else if((dv.phase==='MAIN1'||dv.phase==='MAIN2')&&dv.activePlayer===0){
      onclick=`showFieldMonsterActions(event,${zoneIdx})`;
    }
  }
  // Player spell zone: set trap/quickplay activation
  if(!isEnemy&&zoneType==='spell'&&!fieldCard.faceUp){
    const card2=CARDDB[fieldCard.cardId];
    if(card2){
      const canAct=!fieldCard.setThisTurn;
      if(canAct){onclick=`activateFieldSpellTrap(${zoneIdx},0)`;extraClass='pulse';}
    }
  }
  // Attack target on enemy monsters
  if(atk&&isEnemy&&zoneType==='monster'){extraClass='atk-target';onclick=`doAttack(${atk.zoneIdx},${zoneIdx})`;}

  const isDef=fieldCard.position==='DEF';
  const atkVal=card?.atk!=null?(card.atk+(fieldCard._atkBoost||0)):null;
  const defVal=card?.def!=null?(card.def+(fieldCard._defBoost||0)):null;

  return`<div class="zone ${zoneClass} ${extraClass} ${onclick?'clickable':''}"
    onclick="${onclick}"
    ${tipAttrs}
    style="padding:0">
    <div class="fcard ${isDef?'def-pos':''} ${!fieldCard.faceUp?'facedown':''} ${isSelectedAtk?'fcard-sel':''}">
      <div class="fcard-frame-overlay" style="background:${fc}"></div>
      ${fieldCard.faceUp?`<div class="fcard-emoji">${renderCardImageFull(card?.image||'')}</div>`:'<span style="font-size:1.1rem">🃏</span>'}
      ${fieldCard.faceUp&&fieldCard.attacked?`<div class="atk-mark">⚔</div>`:''}
      ${!fieldCard.faceUp&&fieldCard.setThisTurn?`<div class="set-mark">SET</div>`:''}
      ${fieldCard.faceUp&&card?.type==='monster'&&atkVal!=null?`<div class="fcard-atk"><span class="atk-v">${atkVal}</span><span class="def-v">${defVal??'?'}</span></div>`:''}
    </div>
  </div>`;
}

function renderHandArea(p,isEnemy){
  if(isEnemy)return`<div class="hand-area">${p.hand.map(()=>`<div class="hand-card face-down">🎴</div>`).join('')}${p.hand.length===0?'<span class="empty-hand">핸드 없음</span>':''}</div>`;
  return`<div class="hand-area">
    ${p.hand.map((cardId,i)=>{
      const card=CARDDB[cardId];const fc=getFrameColor(card);const sel=App.ui.selectedHand===i;
      return`<div class="hand-card ${sel?'selected':''}" onclick="selectHand(${i})" onmouseenter="showTooltip(event,'${cardId}')" onmouseleave="hideTooltip()">
        <div class="hand-card-inner"><div class="hand-card-overlay" style="background:${fc}"></div><span class="hand-card-emoji">${renderCardImage(card?.image||'',34)}</span></div>
      </div>`;
    }).join('')}
    ${p.hand.length===0?'<span class="empty-hand">핸드 없음</span>':''}
  </div>`;
}

// ── Card actions panel (shows when hand card selected) ──
function renderCardActionsPanel(dv,isMyTurn){
  const idx=App.ui.selectedHand;
  if(idx===null||!isMyTurn||dv.activePlayer!==0)return'';
  if(App.ui.summonMode)return`<div class="card-actions-panel"><span class="card-name">소환할 몬스터 존을 클릭하세요</span><button class="btn btn-red btn-sm" onclick="cancelSummonMode()">취소</button></div>`;
  if(App.ui.attackingZone)return'';

  const cardId=player().hand[idx];
  const card=CARDDB[cardId];
  if(!card)return'';

  const inMain=dv.phase==='MAIN1'||dv.phase==='MAIN2';
  const btns=[];

  if(isMonster(card)&&!isExtraType(card)){
    // Summon button
    if(inMain&&!dv.normalSummonDone){
      const lv=card.level||0;const trib=lv>=7?2:lv>=5?1:0;
      const existingMonsters=player().monsterZones.filter(z=>z).length;
      const hasEmptyZone=player().monsterZones.some(z=>z===null);
      if(hasEmptyZone&&existingMonsters>=trib){
        btns.push(`<button class="btn btn-gold btn-sm" onclick="startSummonMode('ATK')">소환 (ATK)</button>`);
        if(lv<=4) btns.push(`<button class="btn btn-outline btn-sm" onclick="startSummonMode('SET')">세트</button>`);
      }else if(!hasEmptyZone){
        btns.push(`<button class="btn btn-outline btn-sm" disabled>몬스터존 가득</button>`);
      }else{
        btns.push(`<button class="btn btn-outline btn-sm" disabled>릴리스 불가 (${existingMonsters}/${trib})</button>`);
      }
    }
    // Manual effects — 불가 사유 표시 포함 (Bug 5)
    if(inMain){
      const allManual=(card.effects||[]).filter(e=>e.trigger==='manual');
      allManual.forEach((eff,ei)=>{
        const ok=canActivateEffect(eff,null,0,{});
        const reason=ok?null:getEffectBlockReason(eff,null,0);
        const label=eff.description||'효과 발동';
        if(ok){
          btns.push(`<button class="btn btn-purple btn-sm" onclick="activateHandMonsterEffect(${idx})" title="${label}">${label}</button>`);
        }else{
          btns.push(`<button class="btn btn-outline btn-sm" disabled title="${reason||'조건 미충족'}" style="opacity:.4;cursor:not-allowed">${label} (불가)</button>`);
        }
      });
    }
  }else if(isSpell(card)||isTrap(card)){
    if(inMain){
      // Set button
      if(player().spellZones.some(z=>z===null)){
        btns.push(`<button class="btn btn-outline btn-sm" onclick="startSetMode(${idx})">세트</button>`);
      }
      // Activate button (only spells, traps need set first)
      if(isSpell(card)){
        btns.push(`<button class="btn btn-gold btn-sm" onclick="activateHandSpell(${idx})">발동</button>`);
      }
    }
  }

  // 엑스트라 덱 소환 버튼 (플레이어 엑스트라 덱 있을 때)
  if(inMain&&player().extraDeck?.length&&player().monsterZones.some(z=>z===null)&&App.ui.selectedHand===null){
    btns.push(`<button class="btn btn-purple btn-sm" onclick="openExtraSummonModal()">엑스트라 소환</button>`);
  }

  if(btns.length===0)return'';
  return`<div class="card-actions-panel">
    <span class="card-name">${card.image||''} ${card.name}</span>
    ${btns.join('')}
    <button class="btn btn-red btn-sm" onclick="deselectHand()">✕</button>
  </div>`;
}

function renderActionBar(dv,isMyTurn){
  const log=App.logs[0];
  const atk=App.ui.attackingZone;
  return`<div class="action-bar">
    <div class="action-log">
      ${log?`<span class="${{special:'log-special',danger:'log-danger',enemy:'log-enemy',phase:'log-phase',chain:'log-chain',normal:''}[log.type]||''}">${log.msg}</span>`:''}
    </div>
    <div class="action-btns">
      ${atk?`<button class="btn btn-red btn-sm" onclick="cancelAttack()">취소</button><button class="btn btn-outline btn-sm" onclick="doDirectAttack()">직접 공격</button>`:''}
      ${isMyTurn&&!atk&&!App.ui.summonMode&&(dv.phase==='MAIN1'||dv.phase==='MAIN2')?`<button class="btn btn-outline btn-sm" onclick="openSetSelectModal()">세트</button>`:''}
      ${isMyTurn&&!atk&&!App.ui.summonMode&&dv.phase==='MAIN1'?`<button class="btn btn-outline btn-sm" onclick="toBattle()">배틀 페이즈</button>`:''}
      ${isMyTurn&&!atk&&!App.ui.summonMode?`<button class="btn btn-gold btn-sm" onclick="advancePhase()">다음 페이즈 →</button>`:''}
      ${!isMyTurn?`<span style="font-size:.75rem;color:var(--muted);font-family:var(--cinzel);letter-spacing:.08em">상대 턴...</span>`:''}
      <button class="btn btn-red btn-sm" onclick="if(confirm('포기?'))endDuel(1)">포기</button>

// ══════════════════════════════════════════
// TOOLTIP — render()와 완전 분리된 독립 DOM
// ══════════════════════════════════════════
function _getTooltipEl(){
  let el=document.getElementById('_tt');
  if(!el){
    el=document.createElement('div');
    el.id='_tt';
    el.className='tooltip';
    el.style.display='none';
    document.body.appendChild(el);
  }
  return el;
}
function showTooltip(event,cardId){
  const card=CARDDB[cardId];
  if(!card)return;
  App.tooltip={cardId};
  const fc=getFrameColor(card);
  const el=_getTooltipEl();
  el.innerHTML=`<div class="tooltip-top" style="background:${fc}"></div>
    <div class="tooltip-body">
      <div class="tooltip-name">${card.name}</div>
      <div class="tooltip-type">${{monster:'몬스터',spell:'마법',trap:'함정'}[card.type]||card.type} · ${card.subtype||''} ${card.type==='monster'?`· ★${card.level||0} · ${card.attribute||''} / ${card.race||''}`:''}</div>
      ${card.type==='monster'?`<div class="tooltip-stats"><span class="tooltip-atk">ATK ${card.atk??'?'}</span><span class="tooltip-def">DEF ${card.def??'?'}</span></div>`:''}
      <div class="tooltip-desc">${card.desc||''}</div>
      ${(card.effects||[]).length>0?`<div class="tooltip-effects">${card.effects.map(e=>`<div class="effect-chip">◈ ${e.description||e.trigger}</div>`).join('')}</div>`:''}
    </div>`;
  el.style.display='block';
  positionTooltip(el,event.clientX,event.clientY);
}
function hideTooltip(){
  App.tooltip=null;
  const el=document.getElementById('_tt');
  if(el)el.style.display='none';
}
function positionTooltip(el,x,y){
  el.style.left=(x>window.innerWidth-250?x-240:x+12)+'px';
  el.style.top=Math.min(y+10,window.innerHeight-360)+'px';
}
// render()에서 호출되는 인라인 툴팁 — 빈 문자열 반환 (독립DOM이 담당)
function renderTooltipHTML(){return '';}

function renderCtxMenu(){
  if(!App.ctxMenu)return'';
  const{x,y,items}=App.ctxMenu;
  const left=x>window.innerWidth-200?x-180:x;
  const top=Math.min(y,window.innerHeight-items.length*40-20);
  return`<div class="ctxmenu" style="left:${left}px;top:${top}px">
    ${items.map(item=>`<div class="ctxmenu-item ${item.cls||''}" onclick="${item.action};closeCtx()">${item.label}</div>`).join('')}
    <div class="ctxmenu-item" onclick="closeCtx()" style="color:var(--muted)">취소</div>

function renderModal(){

  if(m.type==='gy'){
    const p=P(m.pi);
    return`<div class="modal-bg" onclick="App.modal=null;render()">
      <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-title">묘지 (${p.graveyard.length}장)</div>
        <div class="card-select-grid">${p.graveyard.slice().reverse().map(id=>{
          const card=CARDDB[id];const fc=getFrameColor(card);
          return`<div class="pool-card" style="cursor:default;border:1.5px solid ${fc}40" onmouseenter="showTooltip(event,'${id}')" onmouseleave="hideTooltip()">
            <div class="pool-card-img">${renderCardImage(card?.image||'',52)}</div>
            <div class="pool-card-footer" style="background:${fc}cc;color:rgba(0,0,0,.85)">${card?.name||id}</div>
          </div>`;
        }).join('')}</div>
        <div class="modal-actions"><button class="btn btn-outline" onclick="App.modal=null;render()">닫기</button></div>
      </div>
    </div>`;
  }

  if(m.type==='discard'){
    const p=player();
    return`<div class="modal-bg">
      <div class="modal-box">
        <div class="modal-title">핸드 제한 초과</div>
        <div class="modal-subtitle">${m.count}장을 선택하여 묘지로 보내세요 (${m.selected.length}/${m.count})</div>
        <div class="card-select-grid">${p.hand.map((id,i)=>{
          const card=CARDDB[id];const fc=getFrameColor(card);const sel=m.selected.includes(i);
          return`<div class="pool-card" style="border:2px solid ${sel?'var(--gold)':fc+'40'};cursor:pointer" onclick="toggleDiscard(${i})" onmouseenter="showTooltip(event,'${id}')" onmouseleave="hideTooltip()">
            <div class="pool-card-img">${renderCardImage(card?.image||'',52)}</div>
            <div class="pool-card-footer" style="background:${fc}cc;color:rgba(0,0,0,.85)">${card?.name||id}</div>
          </div>`;
        }).join('')}</div>
        <div class="modal-actions"><button class="btn btn-gold" onclick="confirmDiscard()" ${m.selected.length<m.count?'disabled':''}>확인</button></div>
      </div>
    </div>`;
  }

  if(m.type==='targetSelect'){
    const zones=m.zones;
    return`<div class="modal-bg">
      <div class="modal-box">
        <div class="modal-title">${m.title}</div>
        <div class="modal-subtitle">${m.count}개 선택 (${m.selected.length}/${m.count})</div>
        <div class="card-select-grid">${zones.map((fc,i)=>{
          if(!fc)return'';
          const card=CARDDB[fc.cardId];const frameC=getFrameColor(card);const sel=m.selected.includes(i);
          return`<div class="pool-card" style="border:2px solid ${sel?'var(--gold)':frameC+'40'};cursor:pointer" onclick="toggleTargetSelect(${i})" onmouseenter="showTooltip(event,'${fc.cardId}')" onmouseleave="hideTooltip()">
            <div class="pool-card-img">${renderCardImage(card?.image||'',52)}</div>
            <div class="pool-card-footer" style="background:${frameC}cc;color:rgba(0,0,0,.85)">${card?.name||fc.cardId}</div>
          </div>`;
        }).join('')}</div>
        <div class="modal-actions">
          <button class="btn btn-gold" onclick="confirmTargetSelect()" ${m.selected.length<m.count?'disabled':''}>확인</button>
          <button class="btn btn-outline" onclick="App.modal=null;render()">취소</button>
        </div>
      </div>
    </div>`;
  }

  if(m.type==='gySelect'){
    const gy=m.graveyard;
    const poolIds=m.poolIds||null;
    return`<div class="modal-bg">
      <div class="modal-box">
        <div class="modal-title">${m.title}</div>
        <div class="modal-subtitle">카드를 클릭하여 선택</div>
        <div class="card-select-grid">${gy.map((id,i)=>{
          const card=CARDDB[id];
          if(!card||!isMonster(card)||card.noSpecialSummon)return'';
          if(poolIds&&!poolIds.includes(id))return'';
          const fc=getFrameColor(card);
          return`<div class="pool-card" style="cursor:pointer;border:1.5px solid ${fc}60" onclick="confirmGYSelect('${id}',${i})" onmouseenter="showTooltip(event,'${id}')" onmouseleave="hideTooltip()">
            <div class="pool-card-img">${renderCardImage(card?.image||'',52)}</div>
            <div class="pool-card-footer" style="background:${fc}cc;color:rgba(0,0,0,.85)">${card?.name}</div>
          </div>`;
        }).join('')}</div>
        <div class="modal-actions"><button class="btn btn-outline" onclick="App.modal=null;render()">취소</button></div>
      </div>
    </div>`;
  }

  if(m.type==='effectSelect'){
    return`<div class="modal-bg">
      <div class="modal-box">
        <div class="modal-title">발동할 효과를 선택하세요</div>
        <div class="effect-list-select">${m.effects.map((eff,i)=>`
          <div class="effect-select-item" onclick="selectEffect(${i})">
            <div style="font-size:.8rem;font-weight:600;margin-bottom:.2rem">[${eff.trigger}] ${eff.description||'효과'}</div>
            ${eff.actions.map(a=>`<div style="font-size:.72rem;color:var(--muted)">• ${a.type}${a.target?' → '+a.target:''}${a.value?' ('+a.value+')':''}</div>`).join('')}
          </div>`).join('')}
        </div>
        <div class="modal-actions"><button class="btn btn-outline" onclick="App.modal=null;render()">취소</button></div>
      </div>
    </div>`;
  }

  // 융합 소환 카드 선택 모달
  if(m.type==='fusionSummonSelect'){
    const targets=m.targets;
    return`<div class="modal-bg">
      <div class="modal-box">
        <div class="modal-title">융합 소환할 몬스터를 선택하세요</div>
        <div class="modal-subtitle">소환 조건을 만족하는 카드만 표시됩니다</div>
        <div class="card-select-grid">${targets.map(({id,card})=>{
          const fc=getFrameColor(card);
          const mats=(card.fusionMaterials||[]).map(m=>{
            if(typeof m==='string')return CARDDB[m]?.name||m;
            if(m.any)return '아무 몬스터';
            if(m.race)return m.race;
            if(m.attribute)return m.attribute;
            if(m.ids)return m.ids.map(id=>CARDDB[id]?.name||id).join('/');
            return '?';
          }).join(' + ');
          return`<div class="pool-card" style="cursor:pointer;border:1.5px solid ${fc}80"
            onclick="confirmFusionSummon('${id}')"
            onmouseenter="showTooltip(event,'${id}')" onmouseleave="hideTooltip()">
            <div class="pool-card-frame" style="background:${fc}"></div>
            <div class="pool-card-img"><span style="font-size:1.5rem">${card.image||'?'}</span></div>
            <div class="pool-card-footer" style="background:${fc}cc;color:rgba(0,0,0,.85)">${card.name}</div>
            <div style="position:absolute;bottom:20px;left:0;right:0;text-align:center;font-size:.42rem;color:#cc88ff;background:rgba(0,0,0,.75);padding:1px 2px;font-family:var(--cinzel)">${mats}</div>
            ${card.atk!=null?`<div class="pool-card-atk">${card.atk}</div>`:''}
          </div>`;
        }).join('')}</div>
        <div class="modal-actions"><button class="btn btn-outline" onclick="App.modal=null;render()">취소</button></div>
      </div>
    </div>`;
  }
  if(App.ui.extraSummonModal){
    const esm=App.ui.extraSummonModal;
    const p=player();
    const tab=esm.tab||'fusion';
    const tabs=['fusion','synchro','xyz','link'];
    const tabCards=p.extraDeck.map(id=>({id,card:CARDDB[id]})).filter(({card})=>card&&card.subtype===tab);
    return`<div class="modal-bg" onclick="App.ui.extraSummonModal=null;render()">
      <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-title">엑스트라 덱 소환</div>
        <div class="extra-summon-tabs">
          ${tabs.map(t=>`<div class="extra-summon-tab ${tab===t?'on':''}" onclick="App.ui.extraSummonModal.tab='${t}';render()" style="${tab===t?'border-color:'+EXTRA_SUMMON_REQS[t]?.color+';color:'+EXTRA_SUMMON_REQS[t]?.color:''}">${EXTRA_SUMMON_REQS[t]?.label||t}</div>`).join('')}
        </div>
        <div class="modal-subtitle" style="margin-bottom:.5rem;font-size:.75rem;color:var(--muted)">
          ${tab==='fusion'?'패/필드의 소재를 사용':tab==='synchro'?'필드의 튜너+비튜너 레벨 합산':tab==='xyz'?'같은 레벨 몬스터 2체 이상':tab==='link'?'필드의 비엑스트라 몬스터 사용':''}
        </div>
        <div class="card-select-grid">
          ${tabCards.length?tabCards.map(({id,card})=>{
            const fc=getFrameColor(card);
            const req=EXTRA_SUMMON_REQS[tab];
            const check=req?req.canSummon(card,0):{ok:false,reason:'미지원'};
            return`<div class="pool-card" style="opacity:${check.ok?1:.4};cursor:${check.ok?'pointer':'default'}"
              onclick="${check.ok?`doExtraSummon('${id}')`:''}"
              onmouseenter="showTooltip(event,'${id}')" onmouseleave="hideTooltip()"
              title="${check.ok?'클릭하여 소환':check.reason}">
              <div class="pool-card-frame" style="background:${fc}"></div>
              <div class="pool-card-img"><span style="font-size:1.5rem">${card.image||'?'}</span></div>
              <div class="pool-card-footer" style="background:${fc}cc;color:rgba(0,0,0,.85)">${card.name}</div>
              ${!check.ok?`<div style="position:absolute;bottom:24px;left:0;right:0;background:rgba(0,0,0,.7);font-size:.45rem;color:#ff9090;text-align:center;padding:1px 2px;font-family:var(--cinzel)">${check.reason}</div>`:''}
            </div>`;
          }).join(''):`<div style="color:var(--muted);font-size:.8rem;grid-column:1/-1;text-align:center;padding:1.5rem">${tab} 카드 없음</div>`}
        </div>
        <div class="modal-actions"><button class="btn btn-outline" onclick="App.ui.extraSummonModal=null;render()">닫기</button></div>
      </div>
    </div>`;
  }

  return'';
}

function renderResult(){
  const r=App.result;
  const div=document.createElement('div');
  div.className='result-overlay';
  div.innerHTML=`<div class="result-box">
    <div class="result-title">${r.isPlayer?'YOU WIN!':'YOU LOSE'}</div>
    <div class="result-sub">${r.isPlayer?'멋진 승리입니다!':'분발하세요!'}</div>
    <div class="result-btns">
      <button class="btn btn-gold" onclick="returnToTitle()">타이틀로</button>
      <button class="btn btn-outline" onclick="rematch()">재도전</button>
    </div>
  </div>`;
  document.body.appendChild(div);
}

function returnToTitle(){
  document.querySelectorAll('.result-overlay').forEach(el=>el.remove());
  App.result=null;App.duel=null;App.screen='title';App.logs=[];
  App.ui={selectedHand:null,summonMode:false,summonType:null,attackingZone:null,targetMode:null,chainQueue:null,extraSummonModal:null};
  render();
}

function rematch(){
  document.querySelectorAll('.result-overlay').forEach(el=>el.remove());
  const lastIds=App.result?.lastDeckIds;
  App.result=null;
  if(lastIds&&lastIds.length>0)startDuel(lastIds);
  else quickStart();
}

// UI EVENT HANDLERS

function selectHand(idx){
  if(App.ui.summonMode){cancelSummonMode();return;}
  App.ui.selectedHand=App.ui.selectedHand===idx?null:idx;
  App.ui.attackingZone=null;
  closeCtx();
  render();
}

function deselectHand(){
  App.ui.selectedHand=null;
  App.ui.summonMode=false;
  App.ui.summonType=null;
  render();
}

// Summon flow
function startSummonMode(type){
  // type: 'ATK' or 'SET'
  App.ui.summonMode=true;
  App.ui.summonType=type;
  addLog(type==='SET'?'세트할 존을 선택하세요.':'소환할 존을 선택하세요.','phase');
  closeCtx();render();
}

function cancelSummonMode(){
  App.ui.summonMode=false;App.ui.summonType=null;render();
}

function confirmSummonToZone(zoneIdx){
  const handIdx=App.ui.selectedHand;
  if(handIdx===null)return;
  const type=App.ui.summonType;
  App.ui.summonMode=false;App.ui.summonType=null;App.ui.selectedHand=null;
  if(type==='SET'){
    setMonster(handIdx,zoneIdx);
  }else{
    normalSummon(handIdx,zoneIdx,'ATK');
  }
  render();
}

// Spell from hand
function activateHandSpell(handIdx){
  activateSpellFromHand(handIdx);
  App.ui.selectedHand=null;
  render();
}

// Set from hand (opens set modal if needed)
function startSetMode(handIdx){
  const p=player();
  const emptySlots=p.spellZones.map((z,i)=>i).filter(i=>p.spellZones[i]===null);
  if(emptySlots.length===0){addLog('마함존이 가득 찼습니다!');return;}
  // If only one slot, auto-place. Otherwise let player pick (simplified: just use first)
  const slotIdx=emptySlots[0];
  setSpellTrap(handIdx,slotIdx);
  App.ui.selectedHand=null;
  render();
}

// Activate monster effect from hand (e.g. from data - unusual, but handle)
function activateHandMonsterEffect(handIdx){
  const cardId=player().hand[handIdx];
  const card=CARDDB[cardId];
  if(!card)return;
  const effs=(card.effects||[]).filter(e=>e.trigger==='manual');
  if(effs.length===0)return;
  App.ui.selectedHand=null;
  if(effs.length===1){
    const fc={cardId,_usedEffects:[]};
    executeOneEffect(effs[0],fc,0,()=>{checkLPWin();render();});
  }else{
    App.modal={type:'effectSelect',effects:effs,fc:{cardId,_usedEffects:[]},pi:0,callback:null};
    render();
  }
}

function confirmFusionSummon(cardId){
  const m=App.modal;if(!m||m.type!=='fusionSummonSelect')return;
  const cb=m.callback;
  App.modal=null;
  cb(cardId);
}

function selectEffect(idx){
  const m=App.modal;if(!m||m.type!=='effectSelect')return;
  const eff=m.effects[idx];const fc=m.fc;const pi=m.pi;
  App.modal=null;
  executeOneEffect(eff,fc,pi,()=>{checkLPWin();render();});
}

// Field monster right-click actions
function showFieldMonsterActions(event,zoneIdx){
  const fc=player().monsterZones[zoneIdx];if(!fc)return;
  const card=CARDDB[fc.cardId];if(!card)return;
  const items=[{label:'표시 방향 변경',action:`changePos(${zoneIdx})`}];
  // 수동 효과 — 발동 가능한 것과 불가인 것 모두 표시 (Bug 5)
  const allManual=(card.effects||[]).filter(e=>e.trigger==='manual');
  allManual.forEach(eff=>{
    const ok=canActivateEffect(eff,fc,0,{});
    const reason=ok?null:getEffectBlockReason(eff,fc,0);
    const label=eff.description||'효과 발동';
    if(ok){
      items.unshift({label:`◈ ${label}`,action:`activateFieldMonsterEffect(${zoneIdx})`});
    }else{
      items.push({label:`◈ ${label} (${reason||'불가'})`,action:'',cls:'disabled'});
    }
  });
  App.ctxMenu={x:event.clientX,y:event.clientY,items};render();
}

function activateFieldMonsterEffect(zoneIdx){
  const fc=player().monsterZones[zoneIdx];if(!fc)return;
  const card=CARDDB[fc.cardId];if(!card)return;
  const effs=(card.effects||[]).filter(e=>e.trigger==='manual'&&canActivateEffect(e,fc,0,{}));
  if(effs.length===0)return;
  if(effs.length===1){
    executeOneEffect(effs[0],fc,0,()=>{checkLPWin();render();});
  }else{
    App.modal={type:'effectSelect',effects:effs,fc,pi:0};render();
  }
}

function changePos(zoneIdx){
  const fc=player().monsterZones[zoneIdx];if(!fc)return;
  fc.position=fc.position==='ATK'?'DEF':'ATK';
  addLog(`표시 방향 변경: ${fc.position}`);render();
}

// Empty spell zone click (from hand selection)
function onEmptySpellClick(zoneIdx){
  const i=App.ui.selectedHand;if(i===null)return;
  const cardId=player().hand[i];const card=CARDDB[cardId];if(!card)return;
  if(isMonster(card)){addLog('마함존에는 마법/함정만!');render();return;}
  if(isSpell(card)){
    activateSpellFromHand(i);
  }else{
    setSpellTrap(i,zoneIdx);
  }
  App.ui.selectedHand=null;render();
}

function selectAttacker(zoneIdx){
  App.ui.attackingZone={zoneIdx};App.ui.selectedHand=null;
  addLog('공격 대상을 선택하세요.','phase');render();
}
function cancelAttack(){App.ui.attackingZone=null;render();}
function doAttack(atkZoneIdx,defZoneIdx){
  const atk=App.ui.attackingZone;
  if(!atk)return;
  App.ui.attackingZone=null;
  declareAttack(atkZoneIdx,defZoneIdx);
}
function doDirectAttack(){
  const atk=App.ui.attackingZone;if(!atk)return;
  App.ui.attackingZone=null;
  declareAttack(atk.zoneIdx,-1);
}

function toBattle(){
  player().monsterZones.forEach(z=>{if(z&&!z.summonedThisTurn)z.canAttack=true;});
  d().phase='MAIN1';
  advancePhase();
}

function showGY(pi){App.modal={type:'gy',pi};render();}

function toggleDiscard(idx){
  const m=App.modal;
  const i=m.selected.indexOf(idx);
  if(i>-1)m.selected.splice(i,1);
  else if(m.selected.length<m.count)m.selected.push(idx);
  render();
}

function confirmDiscard(){
  const m=App.modal;
  m.selected.sort((a,b)=>b-a).forEach(idx=>{
    const id=player().hand.splice(idx,1)[0];
    player().graveyard.push(id);
  });
  App.modal=null;
  advancePhase();
}

// ══════════════════════════════════════════
// DECK BUILDER ACTIONS
// ══════════════════════════════════════════
function addCardFromPool(cardId){
  const card=CARDDB[cardId];if(!card)return;
  addDeckCard(cardId,isExtraType(card)?'extra':'main');
}
function addDeckCard(cardId,tab='main'){
  const card=CARDDB[cardId];if(!card)return;
  const list=tab==='main'?App.db.currentDeck.main:App.db.currentDeck.extra;
  const maxItems=tab==='main'?60:15;
  if(list.reduce((s,x)=>s+x.qty,0)>=maxItems){renderToast('덱이 가득 찼습니다!','error');return;}
  const max=maxCopies(cardId);
  if(max===0){renderToast('금지 카드입니다!','error');return;}
  const ex=list.find(x=>x.id===cardId);
  if(ex){if(ex.qty>=max){renderToast(`최대 ${max}장까지!`,'warn');return;}ex.qty++;}
  else list.push({id:cardId,qty:1});
  render();
}
function removeDeckCard(cardId,tab='main'){
  const list=tab==='main'?App.db.currentDeck.main:App.db.currentDeck.extra;
  const idx=list.findIndex(x=>x.id===cardId);if(idx<0)return;
  list[idx].qty--;if(list[idx].qty<=0)list.splice(idx,1);render();
}
function clearDeck(){if(!confirm('덱을 초기화하시겠습니까?'))return;App.db.currentDeck={main:[],extra:[],side:[]};render();}
function saveDeck(){
  const name=App.db.deckName.trim();if(!name){renderToast('덱 이름을 입력하세요.','error');return;}
  DB.saveDeck(name,App.db.currentDeck);renderToast('덱 저장 완료!','success');render();
}
function loadDeck(name){
  const decks=DB.getDecks();if(!decks[name])return;
  App.db.currentDeck=JSON.parse(JSON.stringify(decks[name]));
  App.db.deckName=name;renderToast(`「${name}」 불러옴!`,'success');render();
}
function deleteSavedDeck(name){
  if(!confirm(`「${name}」 덱을 삭제하시겠습니까?`))return;
  DB.deleteDeck(name);renderToast('삭제됨.','success');render();
}
function startDuelWithDeck(){
  const deck=App.db.currentDeck;
  const mainIds=deck.main.flatMap(x=>Array(x.qty).fill(x.id));
  // Bug1 fix: extra deck도 같이 전달
  const extraIds=(deck.extra||[]).flatMap(x=>Array(x.qty).fill(x.id));
  if(mainIds.length<20){if(!confirm(`덱이 ${mainIds.length}장입니다. 시작하시겠습니까?`))return;}
  startDuel(mainIds.length>0?[...mainIds,...extraIds]:buildAIDeck());
}
function quickStart(){startDuel(buildAIDeck());}

function goTo(screen){App.screen=screen;App.ctxMenu=null;App.tooltip=null;render();}
function openAdmin(){window.open('admin.html','_blank');}

function renderToast(msg,type='success'){
  const el=document.createElement('div');
  el.style.cssText=`position:fixed;bottom:1.5rem;right:1.5rem;background:var(--bg2);border:1px solid ${type==='success'?'var(--green)':type==='error'?'var(--red)':'var(--gold)'};border-radius:3px;padding:.6rem 1rem;font-size:.8rem;z-index:9999;color:var(--text)`;
  el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2500);
}

function attachGlobalHandlers(){
  document.addEventListener('click',(e)=>{
    if(App.ctxMenu&&!e.target.closest('.ctxmenu'))closeCtx();
  },{once:true});
  document.addEventListener('mousemove',(e)=>{
    const el=document.getElementById('_tt');
    if(el&&App.tooltip)positionTooltip(el,e.clientX,e.clientY);
  });
}

function openSetSelectModal(){
  // If a card is selected, set it
  const idx=App.ui.selectedHand;
  if(idx===null){addLog('먼저 핸드에서 카드를 선택하세요!');return;}
  const cardId=player().hand[idx];const card=CARDDB[cardId];if(!card)return;
  if(isMonster(card)){addLog('마법/함정 카드를 선택하세요!');return;}
  const slot=player().spellZones.findIndex(z=>z===null);
  if(slot===-1){addLog('마함존이 가득 찼습니다!');return;}
  setSpellTrap(idx,slot);
  App.ui.selectedHand=null;render();
}

// ══════════════════════════════════════════
// START
// ══════════════════════════════════════════
// ─── CARD IMAGE RENDERER ─────────────────────────────────────
// 이모지, URL, base64 모두 처리
function renderCardImage(imageVal, sizePx, extraStyle='') {
  if (!imageVal) return `<span style="font-size:${Math.round(sizePx*0.55)}px;color:#666">?</span>`;
  const isUrl = imageVal.startsWith('http') || imageVal.startsWith('data:');
  if (isUrl) {
    return `<img src="${imageVal}" alt="" style="width:${sizePx}px;height:${Math.round(sizePx*1.35)}px;object-fit:cover;border-radius:2px;display:block;${extraStyle}" onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<span style=\'font-size:14px\'>🖼</span>')">`;
  }
  const fs = Math.round(sizePx * (imageVal.length > 2 ? 0.52 : 0.68));
  return `<span style="font-size:${fs}px;line-height:1;display:block;text-align:center;${extraStyle}">${imageVal}</span>`;
}

// 필드 존을 꽉 채우는 렌더링 (fcard-emoji 내부용)
function renderCardImageFull(imageVal) {
  if (!imageVal) return `<span style="font-size:1.4rem;color:#666">?</span>`;
  const isUrl = imageVal.startsWith('http') || imageVal.startsWith('data:');
  if (isUrl) {
    return `<img src="${imageVal}" alt="" style="width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0" onerror="this.style.display='none'">`;
  }
  return `<span style="font-size:clamp(1rem,2.5vw,1.8rem);line-height:1">${imageVal}</span>`;
}

init();
</script>
