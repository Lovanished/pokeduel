<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUEL ARENA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080810;--bg2:#0e0e1a;--bg3:#121220;
  --border:#1a1a2e;--border2:#242438;
  --gold:#c9a84c;--gold2:#f0d080;--gold3:#7a5a18;
  --red:#cc2244;--blue:#2244cc;--green:#22aa55;--purple:#8822cc;
  --text:#e8e0cc;--muted:#7a7060;
  --cinzel:'Cinzel',serif;--sans:'Noto Sans KR',sans-serif;
  --lp-p:#3366ff;--lp-e:#ff3366;
  /* UI 스케일 - 슬라이더로 제어 */
  --ui-scale:0.82;
  --card-min:58px;
  --hand-card-w:44px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── BUTTONS ── */
.btn{padding:.4rem .9rem;font-family:var(--cinzel);font-size:.76rem;letter-spacing:.07em;cursor:pointer;border-radius:3px;transition:all .15s;border:1px solid;white-space:nowrap}
.btn-gold{background:var(--gold3);border-color:var(--gold);color:#080810}.btn-gold:hover{background:var(--gold)}
.btn-outline{background:transparent;border-color:var(--border2);color:var(--text)}.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-red{background:transparent;border-color:var(--red);color:var(--red)}.btn-red:hover{background:rgba(204,34,68,.15)}
.btn-blue{background:transparent;border-color:var(--blue);color:#6699ff}.btn-blue:hover{background:rgba(34,68,204,.15)}
.btn-purple{background:transparent;border-color:var(--purple);color:#bb66ff}.btn-purple:hover{background:rgba(136,34,204,.15)}
.btn-green{background:transparent;border-color:var(--green);color:var(--green)}.btn-green:hover{background:rgba(34,170,85,.15)}
.btn-sm{padding:.22rem .55rem;font-size:.68rem}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ══ TITLE ══ */
.title-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem;padding:2rem;position:relative}
.title-bg{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 30% 60%,rgba(34,68,204,.08),transparent 50%),radial-gradient(ellipse at 70% 40%,rgba(136,34,204,.08),transparent 50%)}
.title-emblem{width:110px;height:110px;border:1.5px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.8rem;position:relative;animation:spinR 20s linear infinite}
.title-emblem::before{content:'';position:absolute;width:130px;height:130px;border:1px solid rgba(201,168,76,.25);border-radius:50%;animation:spinR 15s linear infinite reverse}
@keyframes spinR{to{transform:rotate(360deg)}}
.title-logo{font-family:'Cinzel Decorative',serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:900;color:var(--gold);letter-spacing:.06em;text-shadow:0 0 40px rgba(201,168,76,.5);animation:glow 3s ease-in-out infinite}
@keyframes glow{0%,100%{text-shadow:0 0 40px rgba(201,168,76,.4)}50%{text-shadow:0 0 70px rgba(201,168,76,.7)}}
.title-sub{font-family:var(--cinzel);font-size:.85rem;color:var(--muted);letter-spacing:.4em}
.title-menu{display:flex;flex-direction:column;gap:.7rem;width:100%;max-width:300px}
.title-menu .btn{padding:.7rem 1.5rem;font-size:.9rem}

/* ══ DECK BUILDER ══ */
.deckbuilder{display:grid;grid-template-rows:auto 1fr;grid-template-columns:1fr 340px;min-height:100vh}
.db-header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.2rem;background:var(--bg2);border-bottom:1px solid var(--border)}
.db-header-title{font-family:'Cinzel Decorative',serif;font-size:1rem;color:var(--gold)}
.db-header-actions{display:flex;gap:.5rem;align-items:center}
.db-count{font-size:.78rem;color:var(--muted);font-family:var(--cinzel)}
.card-pool{padding:.8rem;display:flex;flex-direction:column;gap:.7rem;overflow:hidden;height:calc(100vh - 60px)}
.pool-toolbar{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;flex-shrink:0}
.pool-search{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:.4rem .7rem;font-family:var(--sans);font-size:.82rem;border-radius:3px;outline:none;flex:1;min-width:140px;transition:border-color .15s}
.pool-search:focus{border-color:var(--gold)}.pool-search::placeholder{color:var(--muted)}
.filter-pill{background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:.28rem .7rem;font-size:.72rem;font-family:var(--cinzel);cursor:pointer;border-radius:2px;transition:all .15s;white-space:nowrap}
.filter-pill.on,.filter-pill:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.06)}
.card-pool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--card-min),1fr));gap:4px;overflow-y:auto;flex:1;align-content:start;padding-right:2px}
.pool-card{position:relative;cursor:pointer;border:1.5px solid var(--border);border-radius:3px;overflow:hidden;transition:all .15s;aspect-ratio:3/4.2;background:var(--bg2);display:flex;flex-direction:column;user-select:none}
.pool-card:hover{border-color:var(--gold);transform:translateY(-2px) scale(1.03);z-index:5;box-shadow:0 3px 12px rgba(201,168,76,.3)}
.pool-card-img{flex:1;display:flex;align-items:center;justify-content:center;font-size:2rem;position:relative}
.pool-card-frame{position:absolute;inset:0;opacity:.15}
.pool-card-footer{padding:2px 4px;font-size:.56rem;font-family:var(--cinzel);color:rgba(0,0,0,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pool-card-atk{position:absolute;bottom:22px;right:3px;font-size:.53rem;font-family:var(--cinzel);color:#f09090;background:rgba(0,0,0,.7);padding:1px 3px;border-radius:1px}
.pool-card-restrict{position:absolute;top:2px;right:2px;font-size:.6rem;background:rgba(0,0,0,.85);color:#ff9090;padding:1px 3px;border-radius:1px}
.pool-card-in-deck{position:absolute;top:2px;left:2px;background:rgba(201,168,76,.9);color:#000;font-size:.6rem;font-family:var(--cinzel);padding:1px 4px;border-radius:1px}
.deck-panel{background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;height:calc(100vh - 60px)}
.deck-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.deck-tab{flex:1;padding:.5rem;font-family:var(--cinzel);font-size:.72rem;letter-spacing:.06em;cursor:pointer;color:var(--muted);text-align:center;border-bottom:2px solid transparent;transition:all .15s}
.deck-tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.deck-info{display:flex;gap:1rem;padding:.5rem .8rem;border-bottom:1px solid var(--border);font-size:.72rem;flex-shrink:0}
.deck-info-item{display:flex;flex-direction:column;align-items:center;gap:.1rem}
.deck-info-val{font-family:var(--cinzel);font-size:1rem;color:var(--gold)}
.deck-info-label{color:var(--muted)}
.deck-list{overflow-y:auto;flex:1;padding:.4rem}
.deck-row{display:flex;align-items:center;gap:6px;padding:4px 6px;border:1px solid transparent;border-radius:2px;transition:all .15s}
.deck-row:hover{background:rgba(255,255,255,.02);border-color:var(--border)}
.deck-row-icon{font-size:1.1rem;flex-shrink:0;width:22px;text-align:center}
.deck-row-name{flex:1;font-size:.75rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.deck-row-lvl{font-size:.68rem;color:var(--muted);width:24px;text-align:right;font-family:var(--cinzel)}
.deck-row-atk{font-size:.68rem;color:#f09090;width:28px;text-align:right;font-family:var(--cinzel)}
.deck-row-qty{font-family:var(--cinzel);font-size:.82rem;color:var(--gold);font-weight:700;min-width:18px;text-align:right}
.deck-row-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.75rem;padding:0 2px;transition:color .15s}.deck-row-del:hover{color:var(--red)}
.deck-row-add{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.75rem;padding:0 2px;transition:color .15s}.deck-row-add:hover{color:var(--green)}
.deck-actions{padding:.7rem .8rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:.4rem;flex-shrink:0}
.deck-name-row{display:flex;gap:.4rem}
.deck-name-input{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:.35rem .6rem;font-size:.78rem;font-family:var(--sans);border-radius:3px;outline:none}.deck-name-input:focus{border-color:var(--gold)}
.saved-decks{display:flex;flex-direction:column;gap:.3rem;max-height:110px;overflow-y:auto}
.saved-deck-row{display:flex;align-items:center;gap:.4rem;padding:.3rem .4rem;border:1px solid var(--border);border-radius:2px;cursor:pointer;font-size:.75rem;transition:all .15s}.saved-deck-row:hover{border-color:var(--gold);color:var(--gold)}

/* ══ DUEL ══ */
.duel{display:grid;grid-template-rows:auto minmax(0,1fr) auto;height:100vh;max-width:1280px;margin:0 auto;padding:.4rem;gap:.3rem;overflow:hidden}
.top-bar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.5rem;padding:.3rem .8rem;background:var(--bg2);border:1px solid var(--border);border-radius:3px;flex-shrink:0}
.lp-block{display:flex;align-items:center;gap:.6rem}
.lp-block.enemy{flex-direction:row-reverse}
.lp-name{font-family:var(--cinzel);font-size:.72rem;letter-spacing:.06em;min-width:55px}
.lp-bar-wrap{width:130px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.lp-bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.lp-bar-fill.p{background:linear-gradient(90deg,var(--lp-p),#88aaff)}
.lp-bar-fill.e{background:linear-gradient(90deg,#ff88aa,var(--lp-e))}
.lp-num{font-family:var(--cinzel);font-size:.88rem;font-weight:700;min-width:40px}
.lp-num.p{color:#88aaff}.lp-num.e{color:#ff88aa}
.phase-center{text-align:center}
.phase-label{font-family:var(--cinzel);font-size:.76rem;color:var(--gold);letter-spacing:.1em}
.turn-label{font-size:.62rem;color:var(--muted);margin-top:.1rem}

/* Field — .field-scaler transform으로만 처리 */
.field-scaler-wrap{width:100%;height:100%;overflow:hidden;display:flex;justify-content:center;align-items:flex-start}
.field-scaler{transform-origin:top center;transition:transform .2s;width:100%}
.field{display:grid;grid-template-rows:1fr 5px 1fr;gap:.25rem;height:100%}
.field-side{display:grid;grid-template-rows:auto auto;gap:.25rem}
/* extra-deck zone 포함 */
.field-main-area{display:grid;grid-template-columns:40px 34px 1fr 34px 40px;gap:.2rem}
.zone-col{display:flex;flex-direction:column;gap:.2rem;justify-content:center}
.extra-col{display:flex;flex-direction:column;gap:.2rem;justify-content:center}
.monster-row,.spell-row{display:grid;grid-template-columns:repeat(5,1fr);gap:.2rem}
.field-divider{background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.25;border-radius:2px;flex-shrink:0}

/* Zones */
.zone{aspect-ratio:59/86;border:1px solid var(--border2);border-radius:2px;background:rgba(255,255,255,.015);display:flex;align-items:center;justify-content:center;cursor:default;transition:all .2s;position:relative;overflow:hidden;font-size:.48rem;color:var(--muted);letter-spacing:.02em;font-family:var(--cinzel)}
.zone.clickable{cursor:pointer}.zone.clickable:hover{border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.04)}
.zone.mzone{border-color:rgba(240,192,64,.18)}
.zone.szone{border-color:rgba(10,160,128,.18)}
.zone.gz{border-color:rgba(140,60,60,.25);cursor:pointer}
.zone.bz{border-color:rgba(60,60,140,.25)}
.zone.fz{border-color:rgba(60,140,60,.25)}
.zone.pulse{border-color:var(--gold)!important;box-shadow:0 0 12px rgba(201,168,76,.6)!important;animation:zpulse .7s ease-in-out infinite;cursor:pointer}
.zone.atk-target{border-color:#ff3366!important;box-shadow:0 0 12px rgba(255,51,102,.5)!important;animation:zpulse .5s ease-in-out infinite;cursor:pointer}
.zone.gy-target{border-color:#8866ff!important;box-shadow:0 0 12px rgba(136,102,255,.5)!important;animation:zpulse .7s ease-in-out infinite;cursor:pointer}
@keyframes zpulse{0%,100%{opacity:1}50%{opacity:.6}}
.zone-cnt{position:absolute;bottom:2px;right:2px;background:rgba(0,0,0,.75);color:var(--gold);font-size:.58rem;padding:1px 3px;border-radius:1px;font-family:var(--cinzel);pointer-events:none}

/* Field cards */
.fcard{width:100%;height:100%;position:relative;border-radius:1px;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column}
.fcard-emoji{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;width:100%;flex:1;overflow:hidden}
.fcard-emoji img{width:100%;height:100%;object-fit:cover;display:block}
.fcard-emoji span{font-size:clamp(1rem,3vw,1.8rem);line-height:1}
.fcard-frame-overlay{position:absolute;inset:0;opacity:.35}
.fcard-atk{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.72);font-family:var(--cinzel);font-size:.5rem;display:flex;justify-content:space-around;padding:1px 0;pointer-events:none}
.atk-v{color:#f09090}.def-v{color:#90b0f0}
.fcard.def-pos .fcard-inner{transform:rotate(90deg)}
.fcard.facedown{background:linear-gradient(135deg,#181830,#0c0c1c)}
.fcard-sel{outline:2px solid var(--gold);outline-offset:-2px}
.atk-mark{position:absolute;top:2px;left:2px;background:rgba(255,100,100,.85);color:#fff;font-size:.5rem;padding:1px 3px;border-radius:1px;font-family:var(--cinzel);pointer-events:none}
.set-mark{position:absolute;top:2px;left:2px;background:rgba(100,100,255,.8);color:#fff;font-size:.5rem;padding:1px 3px;border-radius:1px;font-family:var(--cinzel);pointer-events:none}

/* Hand */
.hand-area{display:flex;align-items:flex-end;justify-content:center;gap:3px;padding:.3rem .4rem;background:rgba(255,255,255,.01);border:1px solid var(--border);border-radius:3px;min-height:70px;flex-wrap:wrap}
.hand-card{width:var(--hand-card-w);aspect-ratio:59/86;border:1.5px solid var(--border);border-radius:3px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative;flex-shrink:0;background:var(--bg2);display:flex;align-items:center;justify-content:center}
.hand-card:hover{transform:translateY(-10px) scale(1.08);border-color:var(--gold);z-index:5;box-shadow:0 5px 16px rgba(201,168,76,.35)}
.hand-card.selected{transform:translateY(-14px) scale(1.1);border-color:var(--gold);box-shadow:0 0 16px rgba(201,168,76,.7)}
.hand-card.face-down{font-size:1.1rem}
.hand-card-inner{width:100%;height:100%;position:relative;display:flex;align-items:center;justify-content:center}
.hand-card-emoji{font-size:1.5rem;position:relative;z-index:1}
.hand-card-overlay{position:absolute;inset:0;opacity:.28}
.empty-hand{color:var(--muted);font-size:.78rem}

/* Action bar */
.action-bar{display:flex;align-items:center;gap:.5rem;padding:.5rem .8rem;background:var(--bg2);border:1px solid var(--border);border-radius:3px;flex-wrap:wrap;min-height:52px}
.action-log{flex:1;font-size:.75rem;min-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.log-special{color:var(--gold)}.log-danger{color:#ff7788}.log-enemy{color:#ff9999}.log-phase{color:var(--muted)}.log-chain{color:#bb88ff}
.action-btns{display:flex;gap:.35rem;flex-wrap:wrap;align-items:center}

/* Card action panel (selected hand card buttons) */
.card-actions-panel{background:var(--bg3);border:1px solid var(--gold);border-radius:4px;padding:.5rem .7rem;display:flex;gap:.4rem;align-items:center;flex-wrap:wrap;margin-bottom:.3rem}
.card-actions-panel .card-name{font-family:var(--cinzel);font-size:.75rem;color:var(--gold);margin-right:.3rem;white-space:nowrap}

/* Tooltip */
.tooltip{position:fixed;z-index:9000;width:230px;background:var(--bg2);border:1px solid var(--gold);border-radius:4px;overflow:hidden;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.85)}
.tooltip-top{height:8px}
.tooltip-body{padding:.6rem .8rem}
.tooltip-name{font-family:var(--cinzel);font-size:.82rem;color:var(--gold);font-weight:600;margin-bottom:.2rem;line-height:1.3}
.tooltip-type{font-size:.68rem;color:var(--muted);margin-bottom:.3rem}
.tooltip-stats{display:flex;gap:.8rem;margin-bottom:.3rem;font-family:var(--cinzel);font-size:.75rem}
.tooltip-atk{color:#f09090}.tooltip-def{color:#90b0f0}
.tooltip-desc{font-size:.68rem;color:var(--text);line-height:1.55;max-height:90px;overflow-y:auto}
.tooltip-effects{margin-top:.4rem;border-top:1px solid var(--border);padding-top:.4rem}
.effect-chip{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);border-radius:2px;padding:.15rem .4rem;font-size:.62rem;color:var(--gold);margin-bottom:.2rem}

/* Context menu */
.ctxmenu{position:fixed;z-index:9500;background:var(--bg2);border:1px solid var(--gold);border-radius:3px;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,.8);min-width:160px}
.ctxmenu-item{padding:.45rem .9rem;font-family:var(--cinzel);font-size:.78rem;color:var(--text);cursor:pointer;letter-spacing:.04em;border-bottom:1px solid var(--border);transition:all .15s}.ctxmenu-item:last-child{border-bottom:none}
.ctxmenu-item:hover{background:rgba(201,168,76,.08);color:var(--gold)}
.ctxmenu-item.danger{color:var(--red)}.ctxmenu-item.danger:hover{background:rgba(204,34,68,.1)}
.ctxmenu-item.disabled{color:var(--muted);cursor:not-allowed;opacity:.5}.ctxmenu-item.disabled:hover{background:none;color:var(--muted)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:8000;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-box{background:var(--bg2);border:1px solid var(--gold);border-radius:5px;padding:1.5rem;max-width:580px;width:100%;box-shadow:0 0 40px rgba(201,168,76,.15);max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Cinzel Decorative',serif;font-size:1rem;color:var(--gold);margin-bottom:.5rem;text-align:center}
.modal-subtitle{font-size:.8rem;color:var(--muted);margin-bottom:.8rem;text-align:center}
.modal-body{font-size:.85rem;line-height:1.6;color:var(--text);margin-bottom:1rem}
.modal-actions{display:flex;gap:.5rem;justify-content:center;margin-top:.8rem}
.card-select-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(66px,1fr));gap:5px;max-height:260px;overflow-y:auto;margin-bottom:.8rem}
.effect-list-select{display:flex;flex-direction:column;gap:.4rem;max-height:300px;overflow-y:auto;margin-bottom:.8rem}
.effect-select-item{padding:.5rem .8rem;background:var(--bg3);border:1px solid var(--border);border-radius:3px;cursor:pointer;transition:all .15s;font-size:.8rem}
.effect-select-item:hover{border-color:var(--gold);background:rgba(201,168,76,.06);color:var(--gold)}

/* Chain banner */
.chain-banner{position:fixed;top:0;left:0;right:0;z-index:7000;background:linear-gradient(90deg,rgba(8,8,16,.95),rgba(136,34,204,.3),rgba(8,8,16,.95));border-bottom:1px solid rgba(136,34,204,.5);padding:.5rem 1rem;display:flex;align-items:center;justify-content:center;gap:.8rem;font-family:var(--cinzel);font-size:.8rem;color:#cc88ff;letter-spacing:.06em;animation:slideDown .3s ease}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}

/* Result */
.result-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:flex;align-items:center;justify-content:center}
.result-box{text-align:center;animation:resultPop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes resultPop{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
.result-title{font-family:'Cinzel Decorative',serif;font-size:clamp(2.5rem,8vw,5rem);color:var(--gold);text-shadow:0 0 60px rgba(201,168,76,.8);margin-bottom:.5rem}
.result-sub{font-family:var(--cinzel);font-size:1.1rem;color:var(--muted);margin-bottom:1.5rem}
.result-btns{display:flex;gap:.7rem;justify-content:center}

/* Damage popup */
.dmg-pop{position:fixed;pointer-events:none;font-family:'Cinzel Decorative',serif;font-size:2rem;font-weight:900;color:#ff4466;text-shadow:0 0 20px rgba(255,68,102,.8);animation:dmgFloat 1.4s ease-out forwards;z-index:9800}
@keyframes dmgFloat{0%{opacity:1;transform:translateY(0)scale(1)}100%{opacity:0;transform:translateY(-80px)scale(1.4)}}
.heal-pop{color:#44ff88;text-shadow:0 0 20px rgba(68,255,136,.8)}

/* Summon mode indicator */

<body>
<div id="app"></div>
<script src="shared-data.js"></script>
<script>
// ══════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════
const PHASES=['DRAW','STANDBY','MAIN1','BATTLE','MAIN2','END'];
const PHASE_LABEL={DRAW:'DRAW PHASE',STANDBY:'STANDBY PHASE',MAIN1:'MAIN PHASE 1',BATTLE:'BATTLE PHASE',MAIN2:'MAIN PHASE 2',END:'END PHASE'};

// ══════════════════════════════════════════
// GLOBAL STATE
// ══════════════════════════════════════════
let CARDDB={};

const App={
  screen:'title',
  db:{search:'',typeFilter:'all',currentDeck:{main:[],extra:[],side:[]},deckName:'마이 덱',activeTab:'main'},
  duel:null,
  result:null,
  tooltip:null,
  ctxMenu:null,
  modal:null,
  logs:[],
  // Duel UI state
  ui:{
    selectedHand:null,      // hand index
    summonMode:false,       // true = waiting for zone click to summon
    summonType:null,        // 'normal'|'set'
    attackingZone:null,     // {zoneIdx}
    targetMode:null,        // { type, callback } - waiting for target selection
    chainQueue:null,        // chain prompt state
  },
};

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
function init(){
  const cards=DB.getCards();
  CARDDB=buildCardIndex(cards);
  // 저장된 UI 스케일 복원
  const savedScale=parseFloat(localStorage.getItem('ui_scale')||'0.82');
  applyUIScale(savedScale);
  render();
}

// ══════════════════════════════════════════
// DUEL FACTORY
// ══════════════════════════════════════════
function newPlayerState(name,deckIds,isAI){
  return{
    name,isAI,lp:8000,
    deck:[...deckIds].sort(()=>Math.random()-.5),
    hand:[],
    monsterZones:[null,null,null,null,null],
    spellZones:[null,null,null,null,null],
    fieldZone:null,graveyard:[],banished:[],
    extraDeck:[],  // 융합/싱크로/엑시즈/링크 카드 (덱 분리 후 채워짐)
    usedEffectsThisTurn:new Set(),
  };
}

function startDuel(playerDeckIds){
  // 엑스트라 덱 카드(융합/싱크로/엑시즈/링크)를 main deck에서 분리
  function splitDeck(ids){
    const mainIds=[], extraIds=[];
    ids.forEach(id=>{const c=CARDDB[id];(c&&isExtraType(c)?extraIds:mainIds).push(id);});
    return{mainIds,extraIds};
  }
  const playerSplit=splitDeck(playerDeckIds);
  const aiDeckRaw=buildAIDeck();
  const aiSplit=splitDeck(aiDeckRaw);

  App.duel={
    turn:1,activePlayer:0,phase:'DRAW',
    normalSummonDone:false,
    players:[
      newPlayerState('YOU',playerSplit.mainIds,false),
      newPlayerState('AI',aiSplit.mainIds,true),
    ],
    lastResult:null,
  };
  // 엑스트라 덱 주입
  App.duel.players[0].extraDeck=playerSplit.extraIds;
  App.duel.players[1].extraDeck=aiSplit.extraIds;
  App.duel.lastResult=playerDeckIds;
  App.result=null;
  App.logs=[];
  App.ui={selectedHand:null,summonMode:false,summonType:null,attackingZone:null,targetMode:null,chainQueue:null,extraSummonModal:null};
  doDrawCard(0,5); doDrawCard(1,5);
  addLog('듀얼 시작! 선공: YOU','special');
  App.screen='duel';
  handlePhaseStart();
  render();
}

function buildAIDeck(){
  const cards=Object.values(CARDDB);
  const monsters=cards.filter(c=>c.type==='monster'&&!isExtraType(c));
  const spells=cards.filter(c=>c.type==='spell');
  const traps=cards.filter(c=>c.type==='trap');
  const pick=(arr,n)=>{
    const out=[];const sh=[...arr].sort(()=>Math.random()-.5);
    for(const c of sh){const cp=Math.min(3,n-out.length);for(let i=0;i<cp&&out.length<n;i++)out.push(c.id);if(out.length>=n)break;}
    return out;
  };
  return [...pick(monsters,24),...pick(spells,10),...pick(traps,6)].sort(()=>Math.random()-.5);
}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
const d=()=>App.duel;
const P=(i)=>d().players[i];
const activeP=()=>P(d().activePlayer);
const waitP=()=>P(1-d().activePlayer);
const player=()=>P(0);
const enemy=()=>P(1);

function addLog(msg,type='normal'){
  App.logs.unshift({msg,type,id:Date.now()+Math.random()});
  if(App.logs.length>40)App.logs.pop();
}

function doDrawCard(pi,count=1){
  const p=P(pi);
  for(let i=0;i<count;i++){
    if(p.deck.length===0){addLog(`${p.name}: 덱 아웃!`,'danger');endDuel(1-pi);return;}
    p.hand.push(p.deck.shift());
  }
}

function getRestrictions(){return DB.getRestrictions();}
function maxCopies(cardId){
  const r=getRestrictions()[cardId];
  if(r==='forbidden')return 0;if(r==='limited')return 1;if(r==='semi')return 2;return 3;
}

// ── Activatable checks ──
function canActivateEffect(eff,fc,pi,context){
  // fc가 null인 경우(핸드에서 수동 발동 등) once 체크 생략
  if(eff.once&&fc&&fc._usedEffects?.includes(eff.id))return false;
  if(eff.condition&&fc){
    try{
      const fn=new Function('ctx','state',`return(${eff.condition})`);
      if(!fn({state:d(),cardDB:CARDDB,controller:pi,sourceCard:fc},d()))return false;
    }catch{return false;}
  }
  return true;
}

// Check which effects on a field card are usable right now
function getActivatableEffects(fc,pi,context){
  const card=CARDDB[fc?.cardId];
  if(!card||!card.effects)return[];
  return card.effects.filter(e=>{
    if(e.trigger==='continuous')return false; // continuous auto-applies
    return canActivateEffect(e,fc,pi,context);
  });
}

// Can player set/activate a spell from hand?
function canPlaySpellFromHand(card,fc_if_field,pi,context){
  if(!card)return{canActivate:false,canSet:false};
  const dv=d();
  const isMyTurn=dv.activePlayer===pi;
  const inMain=dv.phase==='MAIN1'||dv.phase==='MAIN2';
  const canSet=isMyTurn&&inMain&&pi===0;
  let canActivate=false;
  if(card.subtype==='quickplay'){
    // From hand: only if it's my main phase. From field (set): enemy turn also ok after set turn
    if(fc_if_field){
      canActivate=!fc_if_field.setThisTurn; // set turn restriction
    } else {
      canActivate=isMyTurn&&inMain&&pi===0;
    }
  } else if(card.type==='spell'){
    canActivate=isMyTurn&&inMain&&pi===0;
  } else if(card.type==='trap'){
    if(fc_if_field){
      canActivate=!fc_if_field.setThisTurn; // trap cannot activate turn it was set
    } else {
      canActivate=false; // traps must be set first
    }
  }
  return{canActivate,canSet};
}

// ══════════════════════════════════════════
// PHASE ENGINE
// ══════════════════════════════════════════
function handlePhaseStart(){
  const dv=d();
  addLog(`${activeP().name}: ${PHASE_LABEL[dv.phase]}`,'phase');
  if(dv.phase==='DRAW'){
    if(dv.turn>1||dv.activePlayer===1)doDrawCard(dv.activePlayer,1);
    // Auto-advance: no actions in DRAW
    setTimeout(()=>{if(d()&&d().phase==='DRAW'){advancePhase();}},activeP().isAI?300:500);
  }
  if(dv.phase==='STANDBY'){
    // Auto-advance: no player actions needed (trigger effects handled)
    triggerStandbyEffects();
    setTimeout(()=>{if(d()&&d().phase==='STANDBY'){advancePhase();}},activeP().isAI?300:600);
  }
  if(dv.phase==='MAIN1'){
    dv.normalSummonDone=false;
    // Reset attack status
    activeP().monsterZones.forEach(z=>{if(z){z.canAttack=!z.summonedThisTurn;}});
    // Clear setThisTurn flags at start of own main phase
    if(!activeP().isAI){
      player().spellZones.forEach(z=>{if(z)z.setThisTurn=false;});
    }
  }
  if(dv.phase==='BATTLE'){
    // Enable all eligible monsters to attack
    activeP().monsterZones.forEach(z=>{if(z&&!z.summonedThisTurn)z.canAttack=true;});
  }
  if(dv.phase==='END'){
    // Reset turn-based flags
    activeP().monsterZones.forEach(z=>{if(z){z.summonedThisTurn=false;z.attacked=false;}});
    // Clear enemy player setThisTurn flags (for their traps/quickplay)
    waitP().spellZones.forEach(z=>{if(z)z.setThisTurn=false;});
    const p=activeP();
    if(!p.isAI&&p.hand.length>6){
      App.modal={type:'discard',count:p.hand.length-6,selected:[]};
      render();return;
    }else{
      while(p.hand.length>6)p.graveyard.push(p.hand.shift());
    }
  }
}

function triggerStandbyEffects(){
  // Fire any 'on_standby' continuous effects (placeholder for future)
}

function advancePhase(){
  const dv=d();if(!dv)return;
  const idx=PHASES.indexOf(dv.phase);
  if(idx<PHASES.length-1){
    dv.phase=PHASES[idx+1];
    handlePhaseStart();
  }else{
    endTurn();
  }
  // Check chain opportunities at phase transitions
  checkPlayerChainOpportunities('phase_transition');
  render();
  if(d()&&activeP().isAI)setTimeout(aiDoTurn,400);
}

function endTurn(){
  const dv=d();
  // End of turn cleanup
  activeP().monsterZones.forEach(z=>{if(z){z.summonedThisTurn=false;z.attacked=false;z.canAttack=false;}});
  dv.activePlayer=1-dv.activePlayer;
  dv.turn++;
  dv.phase='DRAW';
  handlePhaseStart();
}

function endDuel(winnerIdx){
  if(App.result)return;
  App.result={winner:P(winnerIdx).name,isPlayer:winnerIdx===0,lastDeckIds:d().lastResult};
  render();
}

// ══════════════════════════════════════════
// SUMMON SYSTEM
// ══════════════════════════════════════════
function normalSummon(handIdx,zoneIdx,position='ATK'){
  const dv=d();
  if(dv.normalSummonDone){addLog('이미 일반 소환했습니다!');return false;}
  if(dv.phase!=='MAIN1'&&dv.phase!=='MAIN2'){addLog('메인 페이즈에만 소환 가능합니다!');return false;}
  if(dv.activePlayer!==0){addLog('자신의 턴이 아닙니다!');return false;}
  const cardId=player().hand[handIdx];
  const card=CARDDB[cardId];
  if(!card||!isMonster(card)||isExtraType(card)){addLog('소환 불가!');return false;}
  if(player().monsterZones[zoneIdx]!==null){addLog('해당 존에 이미 몬스터가 있습니다!');return false;}

  const lv=card.level||0;
  const tributeNeeded=lv>=7?2:lv>=5?1:0;
  if(tributeNeeded>0){
    const existing=player().monsterZones.map((z,i)=>({z,i})).filter(({z})=>z!==null);
    if(existing.length<tributeNeeded){addLog(`릴리스 ${tributeNeeded}체가 필요합니다! (현재 ${existing.length}체)`);return false;}
    // Tribute first N monsters
    let count=0;
    for(let i=0;i<5&&count<tributeNeeded;i++){
      if(player().monsterZones[i]){sendToGY(0,'monster',i);count++;}
    }
  }

  const fc=createFieldCard(cardId,position,true);
  fc.canAttack=false;fc.summonedThisTurn=true;
  player().monsterZones[zoneIdx]=fc;
  player().hand.splice(handIdx,1);
  dv.normalSummonDone=true;
  addLog(`${card.name} ${position==='DEF'?'수비':'공격'}표시로 소환!`,'special');

  // Fire summon triggers - check chain
  fireTriggers('on_summon',fc,0);
  fireTriggers('on_normal_summon',fc,0);
  checkLPWin();
  return true;
}

function setMonster(handIdx,zoneIdx){
  const dv=d();
  if(dv.normalSummonDone){addLog('이미 일반 소환했습니다!');return false;}
  if(dv.activePlayer!==0){return false;}
  const cardId=player().hand[handIdx];
  const card=CARDDB[cardId];
  if(!card||!isMonster(card)){return false;}
  if((card.level||0)>=5){addLog('레벨 5+ 몬스터는 세트 불가!');return false;}
  if(player().monsterZones[zoneIdx]!==null){addLog('해당 존이 차있습니다!');return false;}
  const fc=createFieldCard(cardId,'DEF',false);
  fc.summonedThisTurn=true;fc.canAttack=false;
  player().monsterZones[zoneIdx]=fc;
  player().hand.splice(handIdx,1);
  dv.normalSummonDone=true;
  addLog('몬스터를 뒷면 수비로 세트했습니다.');
  return true;
}

function specialSummon(cardId,pi,position='ATK',fromGY=false){
  const p=P(pi);
  const card=CARDDB[cardId];
  if(!card||!isMonster(card))return false;
  if(card.noSpecialSummon){addLog(`${card.name}은 특수 소환 불가입니다!`);return false;}
  const zoneIdx=p.monsterZones.findIndex(z=>z===null);
  if(zoneIdx===-1){addLog(`${P(pi).name}: 몬스터 존이 가득 찼습니다!`);return false;}
  const fc=createFieldCard(cardId,position,true);
  fc.summonedThisTurn=true;fc.canAttack=false;
  p.monsterZones[zoneIdx]=fc;
  addLog(`${card.name} 특수 소환!`,'special');
  fireTriggers('on_summon',fc,pi);
  fireTriggers('on_special_summon',fc,pi);
  checkLPWin();
  return true;
}

// ══════════════════════════════════════════
// SPELL / TRAP SYSTEM
// ══════════════════════════════════════════
function setSpellTrap(handIdx,zoneIdx){
  const p=player();
  if(p.spellZones[zoneIdx]!==null){addLog('해당 마함존이 차있습니다!');return false;}
  const cardId=p.hand[handIdx];
  const card=CARDDB[cardId];
  if(!card||isMonster(card)){return false;}
  const fc=createFieldCard(cardId,'ATK',false);
  fc.setThisTurn=true;  // cannot activate same turn
  p.spellZones[zoneIdx]=fc;
  p.hand.splice(handIdx,1);
  addLog(`${card.name} 세트.`);
  return true;
}

function activateSpellFromHand(handIdx){
  const p=player();
  const cardId=p.hand[handIdx];
  const card=CARDDB[cardId];
  if(!card||(card.type!=='spell'&&card.type!=='trap'))return false;
  if(card.type==='trap'){addLog('함정 카드는 핸드에서 발동 불가. 먼저 세트하세요.');return false;}
  const slot=p.spellZones.findIndex(z=>z===null);
  if(slot===-1){addLog('마함존이 가득 찼습니다!');return false;}
  const fc=createFieldCard(cardId,'ATK',true);
  p.spellZones[slot]=fc;
  p.hand.splice(handIdx,1);
  addLog(`${card.name} 발동!`,'special');
  // Execute on_activate effects (may require target selection)
  executeEffectByTrigger('on_activate',fc,0,null,()=>{
    if(card.subtype==='normal'||card.subtype==='quickplay'){
      p.spellZones[slot]=null;p.graveyard.push(cardId);
    }
    checkLPWin();render();
  });
  return true;
}

function activateFieldSpellTrap(zoneIdx,pi){
  const p=P(pi);
  const fc=p.spellZones[zoneIdx];
  if(!fc)return;
  const card=CARDDB[fc.cardId];
  if(!card)return;
  if(fc.setThisTurn&&card.type==='trap'){addLog('세트한 당 턴에는 함정을 발동할 수 없습니다!');return;}
  if(fc.setThisTurn&&card.subtype==='quickplay'){addLog('세트한 당 턴에는 속공 마법을 발동할 수 없습니다!');return;}
  if(fc.faceUp&&card.type!=='trap'){return;} // already active continuous
  fc.faceUp=true;
  addLog(`${card.name} 발동!`,'special');
  executeEffectByTrigger('on_activate',fc,pi,null,()=>{
    if(card.type==='trap'&&(card.subtype==='normal'||card.subtype==='counter')){
      p.spellZones[zoneIdx]=null;p.graveyard.push(fc.cardId);
    } else if(card.type==='spell'&&(card.subtype==='normal'||card.subtype==='quickplay')){
      p.spellZones[zoneIdx]=null;p.graveyard.push(fc.cardId);
    }
    checkLPWin();render();
  });
}

// ══════════════════════════════════════════
// EFFECT EXECUTION ENGINE
// ══════════════════════════════════════════
function executeEffectByTrigger(trigger,fc,pi,specificEffect,callback){
  const card=CARDDB[fc?.cardId];if(!card||!card.effects)return callback&&callback();
  const effects=specificEffect?[specificEffect]:card.effects.filter(e=>e.trigger===trigger);
  if(effects.length===0)return callback&&callback();
  executeEffectSequence(effects,0,fc,pi,callback);
}

function executeEffectSequence(effects,idx,fc,pi,callback){
  if(idx>=effects.length)return callback&&callback();
  const eff=effects[idx];
  executeOneEffect(eff,fc,pi,()=>{
    executeEffectSequence(effects,idx+1,fc,pi,callback);
  });
}

function executeOneEffect(eff,fc,pi,callback){
  // Check once-per-turn
  if(eff.once&&fc._usedEffects?.includes(eff.id))return callback&&callback();
  const ctx={state:d(),cardDB:CARDDB,controller:pi,sourceCard:fc,log:(m,t)=>addLog(m,t||'special')};
  // Pay cost first
  if(eff.cost&&eff.cost.length>0)EffectEngine.executeActions(eff.cost,ctx);
  // Execute actions with target selection where needed
  executeActionsWithUI(eff.actions,ctx,pi,()=>{
    if(eff.once){if(!fc._usedEffects)fc._usedEffects=[];fc._usedEffects.push(eff.id);}
    callback&&callback();
  });
}

function executeActionsWithUI(actions,ctx,pi,callback){
  if(!actions||actions.length===0)return callback&&callback();
  const doNext=(idx)=>{
    if(idx>=actions.length)return callback&&callback();
    const action=actions[idx];
    executeActionWithUI(action,ctx,pi,()=>doNext(idx+1));
  };
  doNext(0);
}

function executeActionWithUI(action,ctx,pi,callback){
  const p=ctx.state.players[pi];
  const opp=ctx.state.players[1-pi];

  switch(action.type){
    case 'draw':{
      const count=action.value||1;
      for(let i=0;i<count;i++){
        if(p.deck.length===0){addLog(`${p.name}: 덱이 없습니다!`,'danger');endDuel(1-pi);return;}
        p.hand.push(p.deck.shift());
      }
      addLog(`${count}장 드로우!`);
      return callback&&callback();
    }
    case 'damage':{
      const target=action.target==='opponent'?opp:p;
      const dmg=action.value||0;
      target.lp=Math.max(0,target.lp-dmg);
      addLog(`${dmg} 데미지!`,'special');
      showPopup(dmg,action.target==='opponent'?'enemy':'player');
      return callback&&callback();
    }
    case 'heal':{
      const hp=action.value||0;
      p.lp=Math.min(8000,p.lp+hp);
      addLog(`${hp} LP 회복!`);
      return callback&&callback();
    }
    case 'mill':{
      const count=action.value||1;
      const tgt=action.target==='opponent'?opp:p;
      for(let i=0;i<count;i++){if(tgt.deck.length>0)tgt.graveyard.push(tgt.deck.shift());}
      addLog(`덱 상단 ${count}장 묘지로.`);
      return callback&&callback();
    }
    case 'change_atk':{
      if(ctx.sourceCard)ctx.sourceCard._atkBoost=(ctx.sourceCard._atkBoost||0)+(action.value||0);
      return callback&&callback();
    }
    case 'negate':{
      addLog('효과 무효!','special');
      return callback&&callback();
    }
    case 'return_hand':{
      // Target selection for opponent_monster
      if(action.target==='opponent_monster'){
        const targets=opp.monsterZones.map((z,i)=>({z,i})).filter(({z})=>z);
        if(targets.length===0){addLog('대상 없음.');return callback&&callback();}
        const count=Math.min(action.value||1,targets.length);
        if(targets.length<=count){
          targets.forEach(t=>{opp.hand.push(t.z.cardId);opp.monsterZones[t.i]=null;});
          addLog(`상대 몬스터 ${count}체를 핸드로!`,'special');
          return callback&&callback();
        }
        // Need player to select
        if(pi===0){
          openTargetSelectModal('상대 몬스터를 선택하세요',opp.monsterZones,count,false,(selectedIdxs)=>{
            selectedIdxs.forEach(i=>{opp.hand.push(opp.monsterZones[i].cardId);opp.monsterZones[i]=null;});
            addLog(`상대 몬스터 ${selectedIdxs.length}체를 핸드로!`,'special');
            callback&&callback();
          });
        }else{
          targets.slice(0,count).forEach(t=>{opp.hand.push(t.z.cardId);opp.monsterZones[t.i]=null;});
          addLog(`상대 몬스터 ${count}체를 핸드로!`,'special');
          return callback&&callback();
        }
      }else return callback&&callback();
      break;
    }
    case 'destroy':{
      const tgtArr=action.target==='opponent_monster'?opp.monsterZones:
                   action.target==='own_monster'?p.monsterZones:
                   action.target==='any_spell_field'?opp.spellZones:null;
      const tgtPlayer=action.target==='own_monster'?p:opp;
      const tgtZoneKey=action.target==='own_monster'?'monsterZones':
                       action.target==='opponent_monster'?'monsterZones':'spellZones';
      if(!tgtArr){addLog('파괴: 대상 없음');return callback&&callback();}
      const available=tgtArr.map((z,i)=>({z,i})).filter(({z})=>z);
      if(available.length===0){addLog('파괴 대상이 없습니다.');return callback&&callback();}
      const count=action.value>=99?available.length:Math.min(action.value||1,available.length);
      if(count>=available.length||action.value>=99){
        // Destroy all
        available.forEach(t=>{
          const destroyed=tgtArr[t.i];
          tgtArr[t.i]=null;
          tgtPlayer[tgtZoneKey][t.i]=null;
          tgtPlayer.graveyard.push(destroyed.cardId);
          fireTriggers('on_destroy',destroyed,action.target==='own_monster'?pi:1-pi);
          fireTriggers('on_send_to_gy',destroyed,action.target==='own_monster'?pi:1-pi);
        });
        addLog(`${count}장 파괴!`,'special');
        return callback&&callback();
      }
      // Player selects targets
      if(pi===0&&action.target!=='own_monster'||action.target==='own_monster'&&pi===0){
        openTargetSelectModal('파괴할 카드를 선택하세요',tgtArr,count,false,(selectedIdxs)=>{
          selectedIdxs.forEach(i=>{
            const destroyed=tgtArr[i];
            tgtPlayer[tgtZoneKey][i]=null;
            tgtPlayer.graveyard.push(destroyed.cardId);
            fireTriggers('on_destroy',destroyed,action.target==='own_monster'?pi:1-pi);
            fireTriggers('on_send_to_gy',destroyed,action.target==='own_monster'?pi:1-pi);
          });
          addLog(`${selectedIdxs.length}장 파괴!`,'special');
          callback&&callback();
        });
      }else{
        // AI just destroys first N
        available.slice(0,count).forEach(t=>{
          tgtPlayer[tgtZoneKey][t.i]=null;
          tgtPlayer.graveyard.push(t.z.cardId);
          fireTriggers('on_destroy',t.z,action.target==='own_monster'?pi:1-pi);
          fireTriggers('on_send_to_gy',t.z,action.target==='own_monster'?pi:1-pi);
        });
        addLog(`${count}장 파괴!`,'special');
        return callback&&callback();
      }
      break;
    }
    case 'banish':{
      const oppBanish=opp;
      const targets=oppBanish.monsterZones.map((z,i)=>({z,i})).filter(({z})=>z);
      if(targets.length===0){addLog('제외 대상 없음.');return callback&&callback();}
      const count=Math.min(action.value||1,targets.length);
      if(pi===0&&targets.length>count){
        openTargetSelectModal('제외할 몬스터를 선택하세요',oppBanish.monsterZones,count,false,(selectedIdxs)=>{
          selectedIdxs.forEach(i=>{oppBanish.banished.push(oppBanish.monsterZones[i].cardId);oppBanish.monsterZones[i]=null;});
          addLog(`${selectedIdxs.length}체 제외!`,'special');
          callback&&callback();
        });
      }else{
        targets.slice(0,count).forEach(t=>{oppBanish.banished.push(t.z.cardId);oppBanish.monsterZones[t.i]=null;});
        addLog(`${count}체 제외!`,'special');
        return callback&&callback();
      }
      break;
    }
    case 'special_summon':{
      executeSpecialSummonAction(action,ctx,pi,callback);
      break;
    }
    case 'fusion_summon':{
      // 엑스트라 덱에서 소환 가능한 융합 몬스터 목록 추출
      const fusionTargets=p.extraDeck
        .map(id=>({id,card:CARDDB[id]}))
        .filter(({card})=>card&&card.subtype==='fusion'&&checkFusionMaterialsAvailable(card,ctx.state,pi,CARDDB));
      if(!fusionTargets.length){addLog('융합 소환 가능한 카드가 없습니다.','danger');return callback&&callback();}
      if(pi===0){
        // 플레이어: 소환할 융합 몬스터 선택 모달
        App.modal={
          type:'fusionSummonSelect',
          targets:fusionTargets,
          pi,
          callback:(selectedId)=>{
            const card=CARDDB[selectedId];if(!card)return;
            doFusionSummon(card,pi,ctx.state,CARDDB,sendToGY,()=>{
              const slot=p.monsterZones.findIndex(z=>z===null);
              if(slot===-1){addLog('몬스터존이 가득 찼습니다!','danger');return;}
              const ei=p.extraDeck.indexOf(selectedId);
              if(ei>-1)p.extraDeck.splice(ei,1);
              const fc=createFieldCard(selectedId,'ATK',true);
              fc.summonedThisTurn=true;fc.canAttack=false;
              p.monsterZones[slot]=fc;
              addLog(`융합 소환: ${card.name}!`,'special');
              fireTriggers('on_summon',fc,pi);
              fireTriggers('on_special_summon',fc,pi);
              checkLPWin();
              callback&&callback();
              render();
            });
          }
        };
        render();
      }else{
        // AI: 가장 ATK 높은 융합 몬스터 소환
        const best=fusionTargets.sort((a,b)=>(b.card.atk||0)-(a.card.atk||0))[0];
        doFusionSummon(best.card,pi,ctx.state,CARDDB,sendToGY,()=>{
          const slot=p.monsterZones.findIndex(z=>z===null);
          if(slot===-1)return;
          const ei=p.extraDeck.indexOf(best.id);
          if(ei>-1)p.extraDeck.splice(ei,1);
          const fc=createFieldCard(best.id,'ATK',true);
          fc.summonedThisTurn=true;fc.canAttack=false;
          p.monsterZones[slot]=fc;
          addLog(`AI 융합 소환: ${best.card.name}!`,'enemy');
          fireTriggers('on_summon',fc,pi);
          fireTriggers('on_special_summon',fc,pi);
          checkLPWin();
          return callback&&callback();
        });
      }
      break;
    }
    default:
      addLog(`[효과: ${action.type}]`);
      return callback&&callback();
  }
}

// ══════════════════════════════════════════
// TRIGGER SYSTEM & CHAIN
// ══════════════════════════════════════════
// 소환/파괴 트리거는 해당 카드 자신에게만 발동
const SELF_ONLY_TRIGGERS=new Set(['on_summon','on_normal_summon','on_special_summon','on_destroy','on_send_to_gy','on_attack','on_attacked']);

function fireTriggers(trigger,sourceFC,sourcePi){
  const pendingChains=[];
  const isSelfOnly=SELF_ONLY_TRIGGERS.has(trigger);

  if(isSelfOnly){
    // 해당 카드 자신의 효과만 체크
    if(sourceFC){
      const card=CARDDB[sourceFC.cardId];
      if(card&&card.effects){
        card.effects.filter(e=>e.trigger===trigger).forEach(eff=>{
          if(canActivateEffect(eff,sourceFC,sourcePi,{})){
            pendingChains.push({fc:sourceFC,eff,pi:sourcePi});
          }
        });
      }
    }
  }else{
    // on_activate 등 전체 필드 순회
    for(let pi=0;pi<2;pi++){
      const p=P(pi);
      [...p.monsterZones,...p.spellZones].forEach(fc=>{
        if(!fc||!fc.faceUp)return;
        const card=CARDDB[fc.cardId];if(!card||!card.effects)return;
        card.effects.filter(e=>e.trigger===trigger).forEach(eff=>{
          if(canActivateEffect(eff,fc,pi,{})){
            pendingChains.push({fc,eff,pi});
          }
        });
      });
    }
  }

  // Player chain opportunities
  const playerChains=pendingChains.filter(c=>c.pi===0);
  if(playerChains.length>0&&!activeP().isAI){
    askChain(playerChains,()=>{
      pendingChains.filter(c=>c.pi===1).forEach(c=>{
        executeOneEffect(c.eff,c.fc,c.pi,()=>{});
      });
      checkLPWin();render();
    });
  }else{
    pendingChains.forEach(c=>{
      executeOneEffect(c.eff,c.fc,c.pi,()=>{});
    });
    checkLPWin();
  }
}

function askChain(chainOptions,afterAll){
  if(chainOptions.length===0){afterAll();return;}
  App.ui.chainQueue={options:chainOptions,idx:0,afterAll};
  render();
}

function respondChain(doActivate,optionIdx){
  const cq=App.ui.chainQueue;if(!cq)return;
  if(doActivate){
    const opt=cq.options[optionIdx];
    executeOneEffect(opt.eff,opt.fc,opt.pi,()=>{
      cq.idx++;
      if(cq.idx>=cq.options.length){App.ui.chainQueue=null;cq.afterAll();}
      else{render();}
    });
  }else{
    cq.idx++;
    if(cq.idx>=cq.options.length){App.ui.chainQueue=null;cq.afterAll();}
    else render();
  }
}

function checkPlayerChainOpportunities(context){
  // Check if player has any quick_effect traps/spells that can respond
  // Called at phase transitions and after enemy actions
  const dv=d();if(!dv||activeP().isAI)return;// Only when it's NOT player's turn
}

// ══════════════════════════════════════════
// BATTLE SYSTEM
// ══════════════════════════════════════════
function declareAttack(atkZoneIdx,defZoneIdx){
  const dv=d();
  if(dv.phase!=='BATTLE'){addLog('배틀 페이즈에만 공격 가능합니다!');return;}
  const atkFC=player().monsterZones[atkZoneIdx];
  if(!atkFC||!atkFC.canAttack||atkFC.attacked){addLog('이 몬스터는 공격할 수 없습니다!');return;}

  // Check player set traps can respond (enemy turn effect)
  const activatableTraps=player().spellZones
    .map((fc,i)=>({fc,i}))
    .filter(({fc})=>{
      if(!fc||fc.faceUp||fc.setThisTurn)return false;
      const card=CARDDB[fc.cardId];
      return card&&card.type==='trap'&&(card.effects||[]).some(e=>e.trigger==='quick_effect');
    });
  // For simplicity: resolve attack directly (trap activation is via field click)
  resolveAttack(atkZoneIdx,defZoneIdx);
}

function resolveAttack(atkZoneIdx,defZoneIdx){
  const atkFC=player().monsterZones[atkZoneIdx];
  if(!atkFC){render();return;}
  const atkCard=CARDDB[atkFC.cardId];
  const atk=(atkCard?.atk||0)+(atkFC._atkBoost||0);

  if(defZoneIdx===-1){
    if(enemy().monsterZones.some(z=>z)){addLog('상대 몬스터가 있어 직접 공격 불가!');return;}
    enemy().lp=Math.max(0,enemy().lp-atk);
    addLog(`${atkCard?.name} 직접 공격! 상대 -${atk}`,'special');
    showPopup(atk,'enemy');
    atkFC.attacked=true;atkFC.canAttack=false;
  }else{
    const defFC=enemy().monsterZones[defZoneIdx];
    if(!defFC){addLog('대상 없음!');return;}
    const defCard=CARDDB[defFC.cardId];
    if(!defFC.faceUp){defFC.faceUp=true;addLog(`${defCard?.name||'?'} 표측 수비!`);}
    const defVal=defFC.position==='ATK'?(defCard?.atk||0)+(defFC._atkBoost||0):(defCard?.def||0)+(defFC._defBoost||0);
    if(atk>defVal){
      if(defFC.position==='ATK'){
        const diff=atk-defVal;
        enemy().lp=Math.max(0,enemy().lp-diff);
        showPopup(diff,'enemy');
        addLog(`${atkCard?.name} 전투 승리! 상대 -${diff}`,'special');
      }else{addLog(`${atkCard?.name} 수비 파괴!`,'special');}
      sendToGY(1,'monster',defZoneIdx);
    }else if(atk===defVal){
      addLog(`동귀어진!`,'special');
      sendToGY(1,'monster',defZoneIdx);
      sendToGY(0,'monster',atkZoneIdx);
      App.ui.attackingZone=null;
      checkLPWin();render();return;
    }else{
      const diff=defVal-atk;
      if(defFC.position==='ATK'){
        player().lp=Math.max(0,player().lp-diff);
        showPopup(diff,'player');
        addLog(`${atkCard?.name} 전투 패배! -${diff}`,'danger');
        d()._lastTookBattleDamage=true; // 전투 데미지 플래그
        sendToGY(0,'monster',atkZoneIdx);
      }else{
        addLog(`${atkCard?.name} 공격 막힘 (ATK ${atk} vs DEF ${defVal})`);
      }
    }
    if(player().monsterZones[atkZoneIdx]){
      player().monsterZones[atkZoneIdx].attacked=true;
      player().monsterZones[atkZoneIdx].canAttack=false;
    }
  }
  App.ui.attackingZone=null;
  checkLPWin();render();
}

function sendToGY(pi,zone,idx){
  const p=P(pi);
  const fc=zone==='monster'?p.monsterZones[idx]:p.spellZones[idx];
  if(!fc)return;
  if(zone==='monster')p.monsterZones[idx]=null;
  else p.spellZones[idx]=null;
  p.graveyard.push(fc.cardId);
  fireTriggers('on_destroy',fc,pi);
  fireTriggers('on_send_to_gy',fc,pi);
}

// ══════════════════════════════════════════
// EXTRA DECK SUMMON SYSTEM
// ══════════════════════════════════════════
const EXTRA_SUMMON_REQS={
  fusion:{
    label:'융합 소환',color:'#6a3a8a',
    canSummon(card,pi){
      const dv=d();
      if(!checkFusionMaterialsAvailable(card,dv,pi,CARDDB)){
        const mats=(card.fusionMaterials||[]).map(m=>{
          if(typeof m==='string') return CARDDB[m]?.name||m;
          if(m.any) return '아무 몬스터';
          if(m.race) return m.race+' 몬스터';
          if(m.attribute) return m.attribute+' 속성';
          if(m.ids) return m.ids.map(id=>CARDDB[id]?.name||id).join('또는');
          return '소재';
        }).join(' + ');
        return{ok:false,reason:`소재 부족 — ${mats}`};
      }
      return{ok:true};
    },
    doSummon(card,pi,callback){
      doFusionSummon(card,pi,d(),CARDDB,sendToGY,()=>{
        addLog(`융합 소환: ${card.name}!`,'special');
        callback&&callback();
      });
    }
  },
  synchro:{
    label:'싱크로 소환',color:'#d0d0d0',
    canSummon(card,pi){
      const p=P(pi);
      const lvNeeded=card.level||0;
      // 필드의 튜너 1체 + 비튜너 N체 레벨 합산
      const tuners=p.monsterZones.filter(z=>z&&CARDDB[z.cardId]?.isTuner);
      const nonTuners=p.monsterZones.filter(z=>z&&z.faceUp&&!CARDDB[z.cardId]?.isTuner);
      if(!tuners.length)return{ok:false,reason:'튜너 몬스터 없음'};
      if(!nonTuners.length)return{ok:false,reason:'비튜너 몬스터 없음'};
      // 레벨 합산으로 딱 맞는 조합 있는지 체크
      const tunerLvs=tuners.map(z=>CARDDB[z.cardId]?.level||0);
      const nonLvs=nonTuners.map(z=>CARDDB[z.cardId]?.level||0);
      const canMatch=tunerLvs.some(tl=>nonLvs.some(nl=>tl+nl===lvNeeded));
      if(!canMatch)return{ok:false,reason:`레벨 합산 ${lvNeeded} 조합 불가`};
      return{ok:true};
    },
    doSummon(card,pi,callback){
      const p=P(pi); const lvNeeded=card.level||0;
      const tuners=p.monsterZones.map((z,i)=>({z,i})).filter(({z})=>z&&CARDDB[z?.cardId]?.isTuner);
      const nonTuners=p.monsterZones.map((z,i)=>({z,i})).filter(({z})=>z&&z.faceUp&&!CARDDB[z?.cardId]?.isTuner);
      // 첫 번째 유효 조합 자동 선택
      let chosen=null;
      outer:for(const t of tuners){
        const tl=CARDDB[t.z.cardId]?.level||0;
        for(const nt of nonTuners){
          const nl=CARDDB[nt.z.cardId]?.level||0;
          if(tl+nl===lvNeeded){chosen={t,nt};break outer;}
        }
      }
      if(!chosen){addLog('싱크로 소환 소재 조합 없음.');return;}
      sendToGY(pi,'monster',chosen.t.i);
      sendToGY(pi,'monster',chosen.nt.i);
      addLog(`싱크로 소환: ${card.name}!`,'special');
      callback&&callback();
    }
  },
  xyz:{
    label:'엑시즈 소환',color:'#1a1a1a',
    canSummon(card,pi){
      const p=P(pi); const rank=card.level||0;
      const same=p.monsterZones.filter(z=>z&&z.faceUp&&(CARDDB[z.cardId]?.level||0)===rank);
      if(same.length<2)return{ok:false,reason:`랭크${rank} 몬스터 2체 이상 필요`};
      return{ok:true};
    },
    doSummon(card,pi,callback){
      const p=P(pi); const rank=card.level||0;
      const mats=p.monsterZones.map((z,i)=>({z,i})).filter(({z})=>z&&z.faceUp&&(CARDDB[z?.cardId]?.level||0)===rank);
      // 2체 릴리스
      mats.slice(0,2).forEach(({i})=>sendToGY(pi,'monster',i));
      addLog(`엑시즈 소환: ${card.name}!`,'special');
      callback&&callback();
    }
  },
  link:{
    label:'링크 소환',color:'#0a4a8a',
    canSummon(card,pi){
      const p=P(pi); const rating=card.level||1; // link rating
      const avail=p.monsterZones.filter(z=>z&&z.faceUp&&!isExtraType(CARDDB[z?.cardId]));
      if(avail.length<rating)return{ok:false,reason:`링크 소재 ${rating}체 필요 (현재 ${avail.length}체)`};
      return{ok:true};
    },
    doSummon(card,pi,callback){
      const p=P(pi); const rating=card.level||1;
      const mats=p.monsterZones.map((z,i)=>({z,i})).filter(({z})=>z&&z.faceUp&&!isExtraType(CARDDB[z?.cardId]));
      mats.slice(0,rating).forEach(({i})=>sendToGY(pi,'monster',i));
      addLog(`링크 소환: ${card.name}!`,'special');
      callback&&callback();
    }
  }
};

function openExtraSummonModal(){
  const dv=d();
  if(dv.phase!=='MAIN1'&&dv.phase!=='MAIN2'){addLog('메인 페이즈에만 엑스트라 소환 가능!');return;}
  if(dv.activePlayer!==0){addLog('자신의 턴이 아닙니다!');return;}
  const p=player();
  if(!p.extraDeck||!p.extraDeck.length){addLog('엑스트라 덱이 비어있습니다!');return;}
  if(!p.monsterZones.some(z=>z===null)){addLog('몬스터 존이 가득 찼습니다!');return;}
  App.ui.extraSummonModal={tab:'fusion'};
  render();
}

function doExtraSummon(cardId){
  const card=CARDDB[cardId];
  if(!card)return;
  const subtype=card.subtype;
  const req=EXTRA_SUMMON_REQS[subtype];
  if(!req){addLog(`${subtype} 소환은 지원되지 않습니다.`);return;}
  const check=req.canSummon(card,0);
  if(!check.ok){addLog(`소환 불가: ${check.reason}`,'danger');return;}
  req.doSummon(card,0,()=>{
    // 엑스트라 덱에서 제거 후 필드에 소환
    const p=player();
    const ei=p.extraDeck.indexOf(cardId);
    if(ei>-1)p.extraDeck.splice(ei,1);
    const slot=p.monsterZones.findIndex(z=>z===null);
    if(slot===-1){addLog('몬스터 존이 가득 찼습니다!');return;}
    const fc=createFieldCard(cardId,'ATK',true);
    fc.summonedThisTurn=true;fc.canAttack=false;
    p.monsterZones[slot]=fc;
    fireTriggers('on_summon',fc,0);
    fireTriggers('on_special_summon',fc,0);
    checkLPWin();
  });
  App.ui.extraSummonModal=null;
  render();
}

// ══════════════════════════════════════════
// SPECIAL SUMMON SCHEMA (Bug 4)
// ══════════════════════════════════════════
// special_summon action의 확장 스키마:
// {
//   type: 'special_summon',
//   ss_source: 'gy'|'hand'|'deck'|'banished'|'token'|'self',
//   ss_target_player: 'self'|'opponent'|'both',  // 누구 묘지/패에서
//   ss_filter: 'any'|'monster'|specific card id or array,
//   ss_count: number,
//   ss_position: 'ATK'|'DEF'|'facedown',
//   ss_negate_effect: boolean,  // 소환된 몬스터의 효과 무효화
//   ss_cannot_attack: boolean,  // 소환된 턴 공격 불가 여부 (기본 true)
//   ss_condition: string,       // 추가 조건 JS 표현식 (기존 condition과 별개)
//   target: 'from_gy'          // 하위 호환
// }

function executeSpecialSummonAction(action,ctx,pi,callback){
  const p=ctx.state.players[pi];
  const opp=ctx.state.players[1-pi];
  const source=action.ss_source||(action.target==='from_gy'?'gy':'hand');
  const targetPlayer=action.ss_target_player==='opponent'?opp:p;
  const count=action.ss_count||1;
  const position=action.ss_position||'ATK';
  const negateEff=action.ss_negate_effect||false;

  // ss_condition 체크 (게임 상태 기반 추가 조건)
  if(action.ss_condition){
    try{
      const ok=new Function('ctx','state',`return(${action.ss_condition})`)(ctx,ctx.state);
      if(!ok){addLog('특수 소환 조건 미충족.','danger');return callback&&callback();}
    }catch{addLog('특수 소환 조건 오류.','danger');return callback&&callback();}
  }

  // 소환 대상 풀 구성 (Bug2 fix: ss_source=self 처리 추가)
  let pool=[];
  if(source==='self'){
    const selfCardId=ctx.sourceCard?.cardId;
    if(!selfCardId){addLog('자기 자신 소환 실패: 카드 정보 없음.','danger');return callback&&callback();}
    const handIdx=p.hand.indexOf(selfCardId);
    if(handIdx===-1){addLog('패에 해당 카드가 없습니다.','danger');return callback&&callback();}
    p.hand.splice(handIdx,1);
    doSpecialSummonCard(selfCardId,pi,position,negateEff,action);
    return callback&&callback();
  }
  else if(source==='gy') pool=targetPlayer.graveyard.map((id,i)=>({id,i,from:'gy'})).filter(({id})=>CARDDB[id]&&isMonster(CARDDB[id])&&!CARDDB[id].noSpecialSummon);
  else if(source==='hand') pool=targetPlayer.hand.map((id,i)=>({id,i,from:'hand'})).filter(({id})=>CARDDB[id]&&isMonster(CARDDB[id])&&!CARDDB[id].noSpecialSummon);
  else if(source==='banished') pool=targetPlayer.banished.map((id,i)=>({id,i,from:'banished'})).filter(({id})=>CARDDB[id]&&isMonster(CARDDB[id]));
  else if(source==='token'){
    doSpecialSummonCard('token_'+(Date.now()),pi,position,negateEff,null);
    return callback&&callback();
  }

  // ss_filter 적용
  if(action.ss_filter&&action.ss_filter!=='any'&&action.ss_filter!=='monster'){
    const ids=Array.isArray(action.ss_filter)?action.ss_filter:[action.ss_filter];
    pool=pool.filter(({id})=>ids.includes(id));
  }

  if(!pool.length){addLog('특수 소환 가능한 몬스터가 없습니다.');return callback&&callback();}

  // 플레이어 선택 or AI 자동
  if(pi===0){
    // gy/hand 선택 모달
    const modalGY=targetPlayer.graveyard;
    const modalHand=targetPlayer.hand;
    if(source==='gy'){
      openGYSelectModal('특수 소환할 몬스터 선택',modalGY,(selId,selIdx)=>{
        targetPlayer.graveyard.splice(selIdx,1);
        doSpecialSummonCard(selId,pi,position,negateEff,action);
        callback&&callback();
      },pool.map(x=>x.id));
    }else{
      // 핸드에서 선택
      App.modal={
        type:'gySelect',title:'특수 소환할 몬스터 선택',
        graveyard:modalHand,
        poolIds:pool.map(x=>x.id),
        callback:(selId,selIdx)=>{
          targetPlayer.hand.splice(selIdx,1);
          doSpecialSummonCard(selId,pi,position,negateEff,action);
          callback&&callback();
        }
      };
      render();
    }
  }else{
    // AI: 가장 ATK 높은 것
    const best=pool.sort((a,b)=>(CARDDB[b.id]?.atk||0)-(CARDDB[a.id]?.atk||0))[0];
    if(source==='gy')targetPlayer.graveyard.splice(best.i,1);
    else if(source==='hand')targetPlayer.hand.splice(best.i,1);
    else if(source==='banished')targetPlayer.banished.splice(best.i,1);
    doSpecialSummonCard(best.id,pi,position,negateEff,action);
    return callback&&callback();
  }
}

function doSpecialSummonCard(cardId,pi,position,negateEff,action){
  const p=P(pi);
  const card=CARDDB[cardId];
  const slot=p.monsterZones.findIndex(z=>z===null);
  if(slot===-1){addLog('몬스터 존 가득!');return;}
  const faceUp=position!=='facedown';
  const fc=createFieldCard(cardId,position==='facedown'?'DEF':position,faceUp);
  fc.summonedThisTurn=true;fc.canAttack=false;
  if(negateEff)fc._effectNegated=true;
  p.monsterZones[slot]=fc;
  addLog(`${card?.name||cardId} 특수 소환!`,'special');
  fireTriggers('on_summon',fc,pi);
  fireTriggers('on_special_summon',fc,pi);
  checkLPWin();
}

// ══════════════════════════════════════════
// MANUAL EFFECT CONDITION SYSTEM (Bug 5)
// ══════════════════════════════════════════
// effect 스키마 추가 필드:
// activationLocation: 'field'(기본)|'hand'|'gy'  — 어디서 발동하는가
// chainable: false(기본, 체인2이상 불가)|true(속공, 체인 가능)
// activationScope: 'own_turn'(기본)|'either_turn'|'opponent_turn'
//
// 조건 예: "상대 필드에 앞면 표시 카드 n장 이상" 등
// 내장 조건 함수로 처리 (JS 표현식 대신)
function checkEffectActivationCondition(eff,fc,pi){
  const ctx={state:d(),cardDB:CARDDB,controller:pi,sourceCard:fc};
  const dv=d();
  const isMyTurn=dv.activePlayer===pi;
  const phase=dv.phase;
  const inMain=phase==='MAIN1'||phase==='MAIN2';

  // 1. activationLocation 체크 — 명시된 경우에만 검사
  const loc=eff.activationLocation;
  if(loc==='field'&&fc){
    // uid로 필드 존재 확인 (참조 비교 대신)
    const onField=dv.players[pi].monsterZones.some(z=>z&&z.uid===fc.uid&&z.faceUp)
      ||dv.players[pi].spellZones.some(z=>z&&z.uid===fc.uid&&z.faceUp);
    if(!onField)return{ok:false,reason:'필드에 앞면 표시 상태가 아닙니다'};
  }else if(loc==='hand'&&fc){
    if(!dv.players[pi].hand.includes(fc.cardId))return{ok:false,reason:'패에 카드가 없습니다'};
  }else if(loc==='gy'&&fc){
    if(!dv.players[pi].graveyard.includes(fc.cardId))return{ok:false,reason:'묘지에 카드가 없습니다'};
  }

  // 2. activationScope 체크
  const scope=eff.activationScope||'own_turn';
  if(scope==='own_turn'&&!isMyTurn)return{ok:false,reason:'자신의 턴에만 발동 가능'};
  if(scope==='opponent_turn'&&isMyTurn)return{ok:false,reason:'상대 턴에만 발동 가능'};

  // 메인 페이즈 한정
  if(loc==='field'&&!eff.chainable&&!inMain&&isMyTurn)return{ok:false,reason:'메인 페이즈에만 발동 가능'};

  // 3. 내장 조건 체크
  if(eff.builtinConditions){
    for(const bc of eff.builtinConditions){
      const fn=BUILTIN_CONDITIONS[bc.type];
      if(!fn)continue;
      const ok=fn(bc.value,ctx);
      if(!ok)return{ok:false,reason:bc.failReason||`조건 미충족: ${bc.type}`};
    }
  }

  // 4. 기존 JS 표현식 condition 체크
  if(eff.condition&&fc){
    try{
      const ok=new Function('ctx','state',`return(${eff.condition})`)(ctx,dv);
      if(!ok)return{ok:false,reason:'발동 조건 미충족'};
    }catch{return{ok:false,reason:'조건 확인 오류'};}
  }

  return{ok:true};
}

// canActivateEffect를 새 시스템으로 대체
function canActivateEffect(eff,fc,pi,context){
  if(eff.trigger==='continuous')return false;
  if(eff.once&&fc&&fc._usedEffects?.includes(eff.id))return false;
  const result=checkEffectActivationCondition(eff,fc,pi);
  return result.ok;
}

// 효과 발동 불가 사유 반환 (UI용)
function getEffectBlockReason(eff,fc,pi){
  if(eff.once&&fc&&fc._usedEffects?.includes(eff.id))return'이미 사용됨 (1회 제한)';
  const result=checkEffectActivationCondition(eff,fc,pi);
  return result.ok?null:result.reason;
}

function checkLPWin(){
  if(!d())return;
  if(player().lp<=0){endDuel(1);}
  else if(enemy().lp<=0){endDuel(0);}
}


// ══════════════════════════════════════════
// AI ENGINE
// ══════════════════════════════════════════
function aiDoTurn(){
  if(!d()||!activeP().isAI||App.screen!=='duel')return;
  const ph=d().phase;
  if(ph==='DRAW'||ph==='STANDBY')return; // auto-advanced
  if(ph==='MAIN1'){aiMain();setTimeout(()=>advancePhase(),700);return;}
  if(ph==='BATTLE'){aiBattle();setTimeout(()=>advancePhase(),600);return;}
  if(ph==='MAIN2'){setTimeout(()=>advancePhase(),400);return;}
  if(ph==='END'){
    while(enemy().hand.length>6)enemy().graveyard.push(enemy().hand.shift());
    setTimeout(()=>advancePhase(),400);return;
  }
}

function aiMain(){
  const e=enemy();const dv=d();
  if(!dv.normalSummonDone){
    const available=e.hand.map((id,i)=>({id,i,card:CARDDB[id]}))
      .filter(({card})=>card&&isMonster(card)&&!isExtraType(card)&&(card.level||0)<=4)
      .sort((a,b)=>(b.card?.atk||0)-(a.card?.atk||0));
    if(available.length>0){
      const best=available[0];
      const slot=e.monsterZones.findIndex(z=>z===null);
      if(slot>-1){
        const fc=createFieldCard(best.id,'ATK',true);
        fc.canAttack=false;fc.summonedThisTurn=true;
        e.monsterZones[slot]=fc;e.hand.splice(best.i,1);
        dv.normalSummonDone=true;
        addLog(`AI: ${best.card.name} 소환!`,'enemy');
        fireTriggers('on_summon',fc,1);fireTriggers('on_normal_summon',fc,1);
      }
    }
  }
  // Play spells
  const spells=e.hand.map((id,i)=>({id,i,card:CARDDB[id]})).filter(({card})=>card&&isSpell(card));
  if(spells.length>0){
    const sp=spells[0];
    const slot=e.spellZones.findIndex(z=>z===null);
    if(slot>-1){
      const fc=createFieldCard(sp.id,'ATK',true);
      e.spellZones[slot]=fc;e.hand.splice(sp.i,1);
      addLog(`AI: ${sp.card.name} 발동!`,'enemy');
      const ctx={state:d(),cardDB:CARDDB,controller:1,sourceCard:fc,log:(m,t)=>addLog(m,t||'special')};
      const effs=(sp.card.effects||[]).filter(e=>e.trigger==='on_activate');
      for(const eff of effs)executeOneEffect(eff,fc,1,()=>{});
      if(sp.card.subtype==='normal'||sp.card.subtype==='quickplay'){
        e.spellZones[slot]=null;e.graveyard.push(sp.id);
      }
    }
  }
  // Set a trap
  const traps=e.hand.map((id,i)=>({id,i,card:CARDDB[id]})).filter(({card})=>card&&isTrap(card));
  if(traps.length>0){
    const tr=traps[0];
    const slot=e.spellZones.findIndex(z=>z===null);
    if(slot>-1){
      const fc=createFieldCard(tr.id,'ATK',false);
      fc.setThisTurn=true;
      e.spellZones[slot]=fc;e.hand.splice(tr.i,1);
      addLog(`AI: 카드를 1장 세트.`,'enemy');
    }
  }
  checkLPWin();render();
}

function aiBattle(){
  const e=enemy();
  e.monsterZones.forEach((atkFC,ai)=>{
    if(!atkFC||atkFC.attacked||atkFC.summonedThisTurn||!atkFC.canAttack)return;
    const atkCard=CARDDB[atkFC.cardId];
    const atk=(atkCard?.atk||0)+(atkFC._atkBoost||0);
    const targets=player().monsterZones.map((z,i)=>({z,i})).filter(({z})=>z);
    if(targets.length===0){
      player().lp=Math.max(0,player().lp-atk);
      addLog(`AI: ${atkCard?.name} 직접 공격! -${atk}`,'danger');
      showPopup(atk,'player');
      atkFC.attacked=true;atkFC.canAttack=false;
      checkLPWin();if(App.result)return;
    }else{
      const target=targets.sort((a,b)=>{
        const av=a.z.position==='ATK'?(CARDDB[a.z.cardId]?.atk||0):(CARDDB[a.z.cardId]?.def||0);
        const bv=b.z.position==='ATK'?(CARDDB[b.z.cardId]?.atk||0):(CARDDB[b.z.cardId]?.def||0);
        return av-bv;
      })[0];
      const defCard=CARDDB[target.z.cardId];
      if(!target.z.faceUp){target.z.faceUp=true;}
      const defVal=target.z.position==='ATK'?(defCard?.atk||0):(defCard?.def||0);
      if(atk>defVal){
        if(target.z.position==='ATK'){
          const diff=atk-defVal;
          player().lp=Math.max(0,player().lp-diff);
          showPopup(diff,'player');
          addLog(`AI: ${atkCard?.name} 공격! ${defCard?.name} 파괴! -${diff}`,'danger');
        }else{addLog(`AI: ${atkCard?.name} 수비 몬스터 파괴!`,'enemy');}
        sendToGY(0,'monster',target.i);
      }else{addLog(`AI: ${atkCard?.name} 공격 실패 (${atk} vs ${defVal})`,'enemy');}
      atkFC.attacked=true;atkFC.canAttack=false;
      checkLPWin();if(App.result)return;
    }
  });
  render();
}

  if(App.screen==='title')app.innerHTML=renderTitle();

}

function applyUIScale(scale){
  localStorage.setItem('ui_scale',scale);
  document.documentElement.style.setProperty('--ui-scale',scale);
  document.documentElement.style.setProperty('--card-min',Math.round(58*scale)+'px');
  document.documentElement.style.setProperty('--hand-card-w',Math.round(44*scale)+'px');
  const scaler=document.getElementById('field-scaler');
  if(scaler){
    scaler.style.transform=`scale(${scale})`;
    scaler.style.transformOrigin='top center';
    // scale < 1이면 아래 여백이 생기므로 음수 마진으로 당김
    const h=scaler.offsetHeight||400;
    scaler.style.marginBottom=scale<1?`${Math.round((scale-1)*h)}px`:'0';
  }
}

            <div class="deck-row-name" style="color:${fc}">${card.name}</div>
            <div class="deck-row-lvl">${card.type==='monster'?'★'+(card.level||0):''}</div>
            <div class="deck-row-atk">${card.type==='monster'?card.atk??'?':''}</div>
            <div class="deck-row-qty">×${entry.qty}</div>
            <button class="deck-row-del" onclick="removeDeckCard('${card.id}','${S.activeTab}')">−</button>
            <button class="deck-row-add" onclick="addDeckCard('${card.id}','${S.activeTab}')">+</button>
          </div>`;
        }).join('')}
        ${(S.activeTab==='main'?main:extra).length===0?'<div style="color:var(--muted);font-size:.78rem;text-align:center;padding:1.5rem">카드를 추가하세요<br><small>좌측 카드 풀에서 클릭</small></div>':''}
      </div>
      <div class="deck-actions">
        <div class="deck-name-row">
          <input class="deck-name-input" value="${S.deckName}" oninput="App.db.deckName=this.value" placeholder="덱 이름">
          <button class="btn btn-gold btn-sm" onclick="saveDeck()">저장</button>
        </div>
        ${savedDecks.length>0?`<div style="font-size:.7rem;color:var(--muted);font-family:var(--cinzel);letter-spacing:.08em;margin-top:.3rem">저장된 덱</div>
        <div class="saved-decks">${savedDecks.map(n=>`<div class="saved-deck-row" onclick="loadDeck('${n}')"><span style="flex:1">📁 ${n}</span><button class="btn btn-sm btn-red" style="font-size:.65rem;padding:.15rem .4rem" onclick="event.stopPropagation();deleteSavedDeck('${n}')">삭제</button></div>`).join('')}</div>`:''}

function renderPoolCard(card,deck,restrictions){
  const fc=getFrameColor(card);
  const rest=restrictions[card.id];
  const maxCopy=maxCopies(card.id);
  const allEntries=[...deck.main,...deck.extra];
  const inDeckQty=allEntries.find(x=>x.id===card.id)?.qty||0;
  const forbidden=maxCopy===0;
  return`<div class="pool-card" style="opacity:${forbidden?.5:1}"
    onclick="${forbidden?'':'addCardFromPool(\''+card.id+'\')'}"
    onmouseenter="showTooltip(event,'${card.id}')" onmouseleave="hideTooltip()">
    <div class="pool-card-frame" style="background:${fc}"></div>
    <div class="pool-card-img">
      <div class="pool-card-frame" style="background:${fc};opacity:.2"></div>
      <span style="position:relative;z-index:1">${renderCardImage(card.image||'',38)}</span>
    </div>
    <div class="pool-card-footer" style="background:${fc}cc;color:rgba(0,0,0,.85)">${card.name}</div>
    ${card.type==='monster'?`<div class="pool-card-atk">${card.atk??'?'}</div>`:''}
    ${rest?`<div class="pool-card-restrict">${{forbidden:'禁',limited:'1',semi:'2'}[rest]}</div>`:''}
    ${inDeckQty>0?`<div class="pool-card-in-deck">×${inDeckQty}</div>`:''}
  </div>`;
}

function renderTopBar(dv){

    <div class="lp-block">
      <div class="lp-name">👤 ${p.name}</div>
      <div class="lp-bar-wrap"><div class="lp-bar-fill p" style="width:${pp}%"></div></div>

    <div class="phase-center">

    <div class="lp-block enemy">
      <div class="lp-name">🤖 ${enemy().name}</div>
      <div class="lp-bar-wrap"><div class="lp-bar-fill e" style="width:${ep}%"></div></div>
