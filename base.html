<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지하실 — 실험 구역 B</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;900&family=Share+Tech+Mono&display=swap');

:root {
  --black: #0a0a0a;
  --deep: #111115;
  --panel: #16161c;
  --surface: #1e1e26;
  --border: #2a2a35;
  --dim: #3a3a48;
  --muted: #5a5a72;
  --mid: #8a8aaa;
  --text: #c8c8e0;
  --bright: #e8e8f5;
  --white: #f5f5ff;
  --red: #cc3333;
  --red-dim: #441111;
  --red-bright: #ff4444;
  --amber: #cc8833;
  --amber-dim: #442211;
  --amber-bright: #ffaa44;
  --teal: #336677;
  --teal-bright: #44aacc;
  --green: #447744;
  --green-bright: #66bb66;
  --purple: #553388;
  --purple-bright: #8866cc;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--black);
  color: var(--text);
  font-family: 'Noto Serif KR', serif;
  min-height: 100vh;
  overflow: hidden;
}

/* ── SCREENS ── */
.screen { display: none; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
.screen.active { display: flex; }

/* ── TITLE SCREEN ── */
#title-screen {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--black);
  position: relative;
  overflow: hidden;
}

.noise-bg {
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
}

.scan-lines {
  position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
  pointer-events: none;
}

.title-content {
  position: relative; z-index: 1;
  text-align: center;
  animation: fadeIn 2s ease;
}

.title-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 6px;
  color: var(--red);
  text-transform: uppercase;
  margin-bottom: 24px;
  opacity: 0.8;
}

.title-main {
  font-size: clamp(72px, 12vw, 128px);
  font-weight: 900;
  color: var(--white);
  letter-spacing: -4px;
  line-height: 0.9;
  position: relative;
}

.title-main::after {
  content: '지하실';
  position: absolute; top: 3px; left: 3px;
  color: var(--red);
  opacity: 0.3;
  z-index: -1;
}

.title-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 3px;
  margin-top: 20px;
  margin-bottom: 60px;
}

.title-btn {
  background: transparent;
  border: 1px solid var(--red);
  color: var(--red);
  font-family: 'Share Tech Mono', monospace;
  font-size: 14px;
  letter-spacing: 4px;
  padding: 14px 48px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}
.title-btn:hover { background: var(--red); color: var(--white); }

.title-warning {
  margin-top: 40px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 2px;
  line-height: 1.8;
}

/* ── GAME SCREEN ── */
#game-screen {
  flex-direction: column;
  background: var(--deep);
}

.game-header {
  height: 44px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 20px;
  flex-shrink: 0;
}

.header-day {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  color: var(--red);
  letter-spacing: 2px;
}

.header-tp {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
}

.header-tp span { color: var(--amber); }

.header-students {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

.header-students span { color: var(--green-bright); }

.header-title {
  margin-left: auto;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 3px;
}

.game-body {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 220px;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  flex-shrink: 0;
}

.sidebar-section {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.student-list { display: flex; flex-direction: column; gap: 4px; }

.student-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 3px;
  font-size: 12px;
  transition: background 0.15s;
}

.student-item.alive { color: var(--text); }
.student-item.dead { color: var(--dim); text-decoration: line-through; }
.student-item.infected { color: var(--red); }

.student-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.alive .student-dot { background: var(--green-bright); }
.dead .student-dot { background: var(--dim); }
.infected .student-dot { background: var(--red); animation: pulse 1s infinite; }

.item-list { display: flex; flex-direction: column; gap: 4px; }

.item-entry {
  display: flex;
  justify-content: space-between;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--mid);
}

.item-count { color: var(--amber); }

.flag-list { display: flex; flex-direction: column; gap: 4px; }

.flag-entry {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  padding: 3px 6px;
  border-radius: 2px;
}
.flag-entry.on { background: rgba(68,170,68,0.15); color: var(--green-bright); }
.flag-entry.off { background: rgba(90,90,114,0.15); color: var(--dim); }

/* ── MAIN PANEL ── */
.main-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.scene-area {
  flex: 1;
  overflow-y: auto;
  padding: 32px 40px;
}

.scene-day-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--red);
  margin-bottom: 12px;
  text-transform: uppercase;
}

.scene-title {
  font-size: 22px;
  font-weight: 600;
  color: var(--bright);
  margin-bottom: 20px;
  line-height: 1.4;
}

.scene-text {
  font-size: 15px;
  line-height: 2;
  color: var(--text);
  margin-bottom: 20px;
  max-width: 660px;
}

.scene-text p { margin-bottom: 16px; }

.scene-atmosphere {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  border-left: 2px solid var(--border);
  padding: 8px 12px;
  margin: 16px 0;
  line-height: 1.8;
  max-width: 500px;
}

.scene-alert {
  background: var(--red-dim);
  border: 1px solid var(--red);
  border-radius: 3px;
  padding: 12px 16px;
  font-size: 13px;
  color: var(--red-bright);
  margin: 16px 0;
  max-width: 500px;
  font-family: 'Share Tech Mono', monospace;
  letter-spacing: 1px;
}

.scene-info {
  background: rgba(51,102,119,0.2);
  border: 1px solid var(--teal);
  border-radius: 3px;
  padding: 12px 16px;
  font-size: 13px;
  color: var(--teal-bright);
  margin: 16px 0;
  max-width: 500px;
  font-family: 'Share Tech Mono', monospace;
}

/* ── CHOICES ── */
.choices-area {
  padding: 20px 40px;
  background: var(--panel);
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 280px;
  overflow-y: auto;
}

.choice-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Noto Serif KR', serif;
  font-size: 14px;
  padding: 12px 20px;
  text-align: left;
  cursor: pointer;
  transition: all 0.15s;
  border-radius: 2px;
  line-height: 1.5;
}

.choice-btn:hover {
  border-color: var(--teal-bright);
  color: var(--bright);
  background: rgba(51,102,119,0.1);
  padding-left: 28px;
}

.choice-btn.danger:hover {
  border-color: var(--red);
  color: var(--red-bright);
  background: var(--red-dim);
}

.choice-btn.special {
  border-color: var(--purple);
  color: var(--purple-bright);
}
.choice-btn.special:hover {
  background: rgba(85,51,136,0.2);
  border-color: var(--purple-bright);
}

/* ── BATTLE SCREEN ── */
#battle-screen {
  flex-direction: column;
  background: var(--black);
}

.battle-header {
  padding: 12px 24px;
  background: var(--panel);
  border-bottom: 1px solid var(--red);
  display: flex;
  align-items: center;
  gap: 24px;
}

.battle-day-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  color: var(--red-bright);
  letter-spacing: 3px;
}

.battle-status {
  display: flex;
  gap: 20px;
  flex: 1;
}

.battle-stat {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}
.battle-stat span { color: var(--amber-bright); font-size: 14px; font-weight: bold; }

.battle-body {
  flex: 1;
  display: flex;
  gap: 0;
  overflow: hidden;
}

.battle-arena {
  flex: 1;
  position: relative;
  background: var(--deep);
  overflow: hidden;
}

.barricade-visual {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
}

/* Barricade walls */
.wall-top { height: 60px; background: var(--surface); border-bottom: 3px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 20px; }
.wall-bottom { height: 80px; background: var(--surface); border-top: 3px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 12px; }
.wall-left { position: absolute; left: 0; top: 60px; bottom: 80px; width: 60px; background: var(--surface); border-right: 3px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: space-around; }
.wall-right { position: absolute; right: 0; top: 60px; bottom: 80px; width: 60px; background: var(--surface); border-left: 3px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: space-around; }

.inner-space {
  position: absolute;
  top: 60px; bottom: 80px; left: 60px; right: 60px;
  background: var(--deep);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
}

.vent-area {
  display: flex;
  gap: 80px;
  align-items: center;
}

.vent-unit {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.vent-icon {
  width: 40px; height: 40px;
  border: 2px solid var(--border);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--green-bright);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.vent-icon.stopped { border-color: var(--red); color: var(--red); animation: blink 0.5s infinite; }
.vent-icon:hover { border-color: var(--teal-bright); }

.vent-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--muted);
}

.voltage-device {
  width: 56px; height: 40px;
  border: 2px solid var(--amber);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--amber);
  cursor: pointer;
  transition: all 0.2s;
}
.voltage-device:hover { background: rgba(204,136,51,0.2); border-color: var(--amber-bright); }
.voltage-device.charging { animation: charge 0.3s infinite; }
.voltage-device.fired { background: rgba(255,170,68,0.4); border-color: var(--amber-bright); color: var(--white); }
.voltage-device.disabled { border-color: var(--dim); color: var(--dim); cursor: not-allowed; }

.students-cluster {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 240px;
}

.student-token {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 1px solid var(--green-bright);
  background: rgba(68,119,68,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  color: var(--green-bright);
  font-family: 'Share Tech Mono', monospace;
  transition: all 0.3s;
}
.student-token.dead { border-color: var(--red); background: var(--red-dim); color: var(--red); }

/* Repair points */
.repair-pt {
  width: 32px; height: 18px;
  background: var(--surface);
  border: 1px solid var(--dim);
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  color: var(--muted);
}
.repair-pt.damaged { border-color: var(--amber); color: var(--amber); animation: blink 1s infinite; }
.repair-pt.critical { border-color: var(--red); color: var(--red); animation: blink 0.4s infinite; }
.repair-pt.breached { background: var(--red-dim); border-color: var(--red-bright); color: var(--red-bright); }
.repair-pt:hover:not(.breached) { background: rgba(68,170,68,0.1); border-color: var(--green-bright); }

/* 9-entities */
.entity-9 {
  position: absolute;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--red-dim);
  border: 1px solid var(--red);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px;
  color: var(--red-bright);
  font-family: 'Share Tech Mono', monospace;
  transition: all 0.4s ease;
  pointer-events: none;
}

/* Battle log */
.battle-log {
  width: 260px;
  background: var(--panel);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.battle-log-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 2px;
}

.battle-log-entries {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.log-entry {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  padding: 4px 8px;
  border-radius: 2px;
  line-height: 1.5;
  animation: slideIn 0.2s ease;
}
.log-entry.danger { color: var(--red-bright); background: rgba(68,17,17,0.5); }
.log-entry.warning { color: var(--amber); background: rgba(68,34,17,0.5); }
.log-entry.info { color: var(--teal-bright); background: rgba(51,68,80,0.5); }
.log-entry.success { color: var(--green-bright); background: rgba(34,51,34,0.5); }
.log-entry.system { color: var(--mid); }

.battle-actions {
  padding: 12px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.battle-action-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  padding: 8px 12px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  letter-spacing: 1px;
}
.battle-action-btn:hover { border-color: var(--teal-bright); color: var(--bright); }
.battle-action-btn.primary { border-color: var(--amber); color: var(--amber); }
.battle-action-btn.primary:hover { background: rgba(204,136,51,0.2); }
.battle-action-btn.disabled { opacity: 0.3; cursor: not-allowed; }

.wave-progress {
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--muted);
}

.wave-bar {
  height: 3px;
  background: var(--surface);
  margin-top: 4px;
  border-radius: 1px;
  overflow: hidden;
}

.wave-fill {
  height: 100%;
  background: var(--red);
  transition: width 0.5s;
}

/* ── ENDING SCREEN ── */
#ending-screen {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--black);
  position: relative;
  overflow: hidden;
}

.ending-content {
  position: relative; z-index: 1;
  text-align: center;
  max-width: 600px;
  padding: 40px;
  animation: fadeIn 1.5s ease;
}

.ending-type-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 6px;
  margin-bottom: 20px;
  text-transform: uppercase;
}

.ending-type-label.bad { color: var(--red); }
.ending-type-label.normal { color: var(--amber); }
.ending-type-label.true { color: var(--purple-bright); }
.ending-type-label.true2 { color: var(--teal-bright); }

.ending-title-big {
  font-size: clamp(36px, 6vw, 64px);
  font-weight: 900;
  line-height: 1.1;
  margin-bottom: 24px;
}

.ending-title-big.bad { color: var(--red-bright); }
.ending-title-big.normal { color: var(--text); }
.ending-title-big.true { color: var(--purple-bright); }
.ending-title-big.true2 { color: var(--teal-bright); }

.ending-story {
  font-size: 14px;
  line-height: 2;
  color: var(--mid);
  margin-bottom: 32px;
  text-align: left;
}

.ending-stats {
  display: flex;
  gap: 24px;
  justify-content: center;
  margin-bottom: 32px;
}

.ending-stat {
  text-align: center;
  font-family: 'Share Tech Mono', monospace;
}
.ending-stat-val { font-size: 24px; color: var(--amber); }
.ending-stat-label { font-size: 10px; color: var(--muted); margin-top: 4px; letter-spacing: 2px; }

.restart-btn {
  background: transparent;
  border: 1px solid var(--mid);
  color: var(--mid);
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  letter-spacing: 4px;
  padding: 12px 36px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}
.restart-btn:hover { border-color: var(--text); color: var(--text); }

/* ── ANIMATIONS ── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }
@keyframes charge { 0%,100% { background: rgba(204,136,51,0.1); } 50% { background: rgba(204,136,51,0.4); } }
@keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
@keyframes entityAttack { 0% { transform: scale(1); } 50% { transform: scale(1.3); opacity: 0.6; } 100% { transform: scale(1); } }

.scene-area { animation: fadeIn 0.3s ease; }
.shake { animation: shake 0.3s ease; }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--panel); }
::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<!-- ══════════════ TITLE SCREEN ══════════════ -->
<div id="title-screen" class="screen active">
  <div class="noise-bg"></div>
  <div class="scan-lines"></div>
  <div class="title-content">
    <div class="title-label">실험 구역 B — 분류 불명</div>
    <h1 class="title-main">지하실</h1>
    <div class="title-sub">THE BASEMENT — EXPERIMENT LOG</div>
    <button class="title-btn" onclick="startGame()">▶ 시작하기</button>
    <div class="title-warning">
      이 실험에는 참여 동의가 필요하지 않습니다.<br>
      생존 여부는 본인의 선택에 달려 있습니다.<br>
      — 교장 P
    </div>
  </div>
</div>

<!-- ══════════════ GAME SCREEN ══════════════ -->
<div id="game-screen" class="screen">
  <div class="game-header">
    <div class="header-day" id="hdr-day">DAY 0</div>
    <div class="header-tp">TP: <span id="hdr-tp">0</span></div>
    <div class="header-students">생존: <span id="hdr-alive">12</span>/12</div>

<script>
// ════════════════════════════════════════════════════════════════
//  GAME STATE
// ════════════════════════════════════════════════════════════════
const G = {
  day: 0,
  tp: 0,
  ateFood: false,      // 배급 섭취 여부
  flags: {
    planKnown: false,    // 계획 인지
    itemsReady: false,   // 아이템 준비
    maruMet: false,      // 김마루 접촉
    allSurvive: true,    // 전원 생존
    truePath: false,     // 진엔딩 경로
    day50Stay: false,    // 50일 잔류
  },
  items: { metal: 0, cable: 0, water: 0 },
  students: [
    { id:'주인공', name:'주인공', status:'alive' },
    { id:'사회', name:'사회문화 엘리트', status:'alive' },
    { id:'예체', name:'예체능 엘리트', status:'alive' },
    { id:'생명', name:'생명과학 엘리트', status:'alive' },
    { id:'수학', name:'수학 엘리트', status:'alive' },
    { id:'물리', name:'물리 엘리트', status:'alive' },
    { id:'화학', name:'화학 엘리트', status:'alive' },
    { id:'국어', name:'국어 엘리트', status:'alive' },
    { id:'역사', name:'역사 엘리트', status:'alive' },
    { id:'정보', name:'정보 엘리트', status:'alive' },
    { id:'윤리', name:'윤리 엘리트', status:'alive' },
    { id:'외국어', name:'외국어 엘리트', status:'alive' },
  ],
  // Battle state
  battle: {
    day: 93,
    phase: 0,
    wallHP: { L1:100,L2:100,R1:100,R2:100,B1:100,B2:100,B3:100,B4:100 },
    airQuality: 100,
    ventL: true,
    ventR: true,
    broadcastActive: false,
    broadcastTimer: 0,
    voltageUsed: [false,false,false],
    waveProgress: 0,
    entities: [],
    entityId: 0,
    interval: null,
    waveComplete: false,
    voltageCharging: false,
  },
  voltage93Used: false,
  voltage96Used: false,
  voltage99Used: false,
};

function aliveCount() { return G.students.filter(s=>s.status==='alive').length; }
function killStudent(id, reason) {
  const s = G.students.find(s=>s.id===id);
  if(!s || s.status!=='alive') return;
  s.status = 'dead';
  if(id==='사회') G.tp += 5;
  else if(id==='예체') { s.status='infected'; G.tp += 3; }
  else G.tp += 1;
  G.flags.allSurvive = false;
  updateSidebar();
  updateHeader();
}
function addTP(n) { G.tp += n; updateHeader(); }
function addItem(t,n=1) { G.items[t] = Math.min(3, G.items[t]+n); updateSidebar(); }
function setFlag(k,v=true) { G.flags[k]=v; updateSidebar(); }

// ════════════════════════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function updateHeader() {
  document.getElementById('hdr-day').textContent = `DAY ${G.day}`;
  document.getElementById('hdr-tp').textContent = G.tp;
  document.getElementById('hdr-alive').textContent = aliveCount();

  const fc = document.getElementById('hdr-flags');
  fc.innerHTML = '';
  if(G.flags.planKnown) fc.innerHTML += `<span style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--green-bright);letter-spacing:1px">계획인지</span>`;
  if(G.flags.maruMet) fc.innerHTML += `<span style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--purple-bright);letter-spacing:1px">마루접촉</span>`;
  if(G.flags.itemsReady) fc.innerHTML += `<span style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--amber-bright);letter-spacing:1px">아이템준비</span>`;
}

function updateSidebar() {
  // students
  const sl = document.getElementById('student-list');
  sl.innerHTML = G.students.map(s=>`
    <div class="student-item ${s.status}">
      <div class="student-dot"></div>
      <span style="font-size:11px">${s.name}</span>
    </div>`).join('');

  // items
  const il = document.getElementById('item-list');
  il.innerHTML = [
    ['metal','금속 물체'],['cable','도체 케이블'],['water','물']
  ].map(([k,n])=>`
    <div class="item-entry">
      <span>${n}</span>
      <span class="item-count">${G.items[k]}/3</span>
    </div>`).join('');

  // flags
  const flagDefs = [
    ['planKnown','배급 위험 인지'],
    ['itemsReady','전압 아이템 준비'],
    ['maruMet','김마루 접촉'],
    ['allSurvive','전원 생존 유지'],
    ['day50Stay','50일 잔류 선택'],
  ];
  const fl = document.getElementById('flag-list');
  fl.innerHTML = flagDefs.map(([k,n])=>`
    <div class="flag-entry ${G.flags[k]?'on':'off'}">${G.flags[k]?'✓':' '} ${n}</div>`).join('');
}

function renderScene(dayLabel, title, html, choices) {
  updateHeader();
  updateSidebar();
  document.getElementById('scene-area').innerHTML = `
    <div class="scene-day-label">${dayLabel}</div>
    <div class="scene-title">${title}</div>
    <div class="scene-text">${html}</div>`;
  
  const ca = document.getElementById('choices-area');
  ca.innerHTML = choices.map((c,i)=>`
    <button class="choice-btn ${c.cls||''}" onclick="(${c.fn})()">${c.text}</button>`).join('');
}

function addSceneExtra(html) {
  document.getElementById('scene-area').innerHTML += html;
}

// ════════════════════════════════════════════════════════════════
//  GAME START
// ════════════════════════════════════════════════════════════════
function startGame() {
  showScreen('game-screen');
  sceneProlog();
}

//  SCENES

function sceneProlog() {
  G.day = 0;
  renderScene('프롤로그 — DAY 0', '평범한 점심시간',
  `<p>오늘도 급식실은 시끄럽다. 식판을 들고 줄을 서는 학생들, 이미 자리에 앉아 수다를 떠는 무리들. 당신은 식판을 들고 자리를 찾던 중이었다.</p>
  <p>그때 급식실 반대편에서 비명이 터졌다.</p>
  <p>처음에는 단순한 다툼처럼 보였다. 그러나 사람들이 물러나며 공간이 생기자 — 그 가운데 있던 것이 보였다. 피부가 녹아내리고, 관절이 뒤틀린 채 움직이는 <strong style="color:var(--red)">무언가</strong>.</p>
  <div class="scene-alert">⚠ 9화 현상 최초 발생 확인 — 급식실 전역 확산 중</div>
  <p>패닉이 퍼졌다. 출구 쪽에서도 비명. 급식을 먹던 학생들 중 일부가 갑자기 쓰러지기 시작한다.</p>
  <p>당신은 달린다. 복도로 나오자 — 평소 출입 금지였던 계단 아래 공간이 열려 있다. 쇠창살이 파손된 상태. 내려가는 좁은 계단이 드러나 있다.</p>
  <div class="scene-atmosphere">발소리가 가까워진다. 위층에서. 빠르다.</div>`,
  [
    { text:'계단 아래로 내려간다', fn:'scene01_descend' },
    { text:'다른 출구를 찾는다', cls:'danger', fn:'scene01_other' },
  ]);
}

function scene01_other() {
  renderScene('DAY 0', '막힌 출구',
  `<p>당신은 다른 출구를 찾아 복도를 달린다. 그러나 정문도, 비상구도 이미 9 개체들로 막혀 있다.</p>
  <p>뒤에서 빠른 발소리. 결국 당신은 계단 아래로 뛰어들 수밖에 없었다.</p>`,
  [{ text:'계단 아래로 내려간다', fn:'scene01_descend' }]);
}

function scene01_descend() {
  renderScene('DAY 0', '지하실',
  `<p>계단 아래는 어둡고 차갑다. 외부의 비명 소리가 점점 멀어진다.</p>
  <p>공간이 비정상적으로 정돈되어 있다. 오래된 폐공간이 아니다 — 벽면의 조명, 철제 문, 바닥의 이동 흔적. 최근까지 사용된 시설이다.</p>
  <p>뒤를 돌아보는 순간 — 어둠 속에서 누군가가 움직인다.</p>
  <div class="scene-atmosphere">시야가 흔들린다. 의식이 흐릿해진다. 마지막으로 보이는 것은 — 차분한 표정으로 상황을 관찰하는 교장 P의 모습.</div>

  <div class="scene-alert">⚡ 의식 소실 — 수감 시설로 이송됨</div>`,

}

function scene_day1() {
  G.day = 1;
  renderScene('DAY 1 — 수감 첫날', '12명의 생존자',
  `<p>눈을 떴을 때 당신은 철제 구조물로 된 수감 시설 안에 있었다. 주변에는 같은 상황에 빠진 학생들이 있다 — 총 11명. 모두 합쳐 12명.</p>

function scene_calm_social() {

function scene_food_analysis() {

const REPAIR_POINTS = ['L1','L2','R1','R2','B1','B2','B3','B4'];

function start_battle_91() {
  G.day = 91;
  showScreen('battle-screen');
  initBattle(91);
  addBattleLog('system','DAY 91 — 생존 전쟁 시작');
  addBattleLog('warning','9 개체들이 바리케이트로 접근 중...');
  document.getElementById('battle-day').textContent = 'DAY 91~92 — 초기 압박';
  setupStudentTokens();
  startBattleLoop();
}

function initBattle(day) {
  const b = G.battle;
  b.day = day;
  b.wallHP = { L1:100,L2:100,R1:100,R2:100,B1:100,B2:100,B3:100,B4:100 };
  b.airQuality = 100;
  b.ventL = true;
  b.ventR = true;
  b.broadcastActive = false;
  b.broadcastTimer = 0;
  b.waveProgress = 0;
  b.entities = [];
  b.entityId = 0;
  b.waveComplete = false;
  b.voltageCharging = false;
  updateBattleUI();
}

function setupStudentTokens() {
  const sc = document.getElementById('students-cluster');
  sc.innerHTML = G.students.map(s=>`
    <div class="student-token ${s.status}" id="tok-${s.id}" title="${s.name}">
      ${s.name[0]}
    </div>`).join('');
}

let battleTick = 0;

function startBattleLoop() {
  if(G.battle.interval) clearInterval(G.battle.interval);
  battleTick = 0;
  G.battle.interval = setInterval(doBattleTick, 800);
}

function stopBattle() {
  if(G.battle.interval) clearInterval(G.battle.interval);
  G.battle.interval = null;
}

function doBattleTick() {
  battleTick++;
  const b = G.battle;
  const day = b.day;

  // Wave progress
  b.waveProgress = Math.min(100, b.waveProgress + (day >= 99 ? 4 : day >= 96 ? 2.5 : 1.5));
  document.getElementById('wave-fill').style.width = b.waveProgress + '%';

  // Damage walls
  const damageRate = day >= 99 ? 8 : day >= 96 ? 5 : 3;
  const pts = ['B1','B2','B3','B4','L1','L2','R1','R2'];
  pts.forEach(p => {
    if(Math.random() < 0.3) {
      b.wallHP[p] = Math.max(0, b.wallHP[p] - damageRate);
    }
  });

  // Air quality
  if(!b.ventL || !b.ventR) {
    b.airQuality = Math.max(0, b.airQuality - (b.ventL||b.ventR ? 3 : 8));
  } else if(b.airQuality < 100) {
    b.airQuality = Math.min(100, b.airQuality + 2);
  }

  // Random vent stops
  if(battleTick % 8 === 0 && Math.random() < 0.4) {
    if(b.ventL) { b.ventL = false; addBattleLog('warning','좌측 환풍구 정지!'); document.getElementById('broadcast-warning').textContent = '⚠ 좌측 환풍구 정지 — 재기동 필요'; }
  }
  if(battleTick % 11 === 0 && Math.random() < 0.35) {
    if(b.ventR) { b.ventR = false; addBattleLog('warning','우측 환풍구 정지!'); document.getElementById('broadcast-warning').textContent = '⚠ 우측 환풍구 정지 — 재기동 필요'; }
  }

  // Broadcast events
  const broadcastDays = {93: 25, 96: 55, 99: 80};
  if(!b.broadcastActive) {
    Object.entries(broadcastDays).forEach(([d,tick]) => {
      if(day >= parseInt(d) && Math.floor(b.waveProgress) === tick && !b.voltageCharging) {
        b.broadcastActive = true;
        b.broadcastTimer = 10;
        addBattleLog('danger',`⚡ 진행자 방송 노이즈 감지! 10초 안에 전압 장치를 기동하라!`);
        document.getElementById('broadcast-warning').textContent = '⚡⚡⚡ 방송 노이즈 — 10초 안에 전압 기동!';
        document.getElementById('voltage-status').textContent = `노이즈: ${b.broadcastTimer}초`;
        const vd = document.getElementById('voltage-dev');
        vd.classList.remove('disabled');
        vd.style.animation = 'blink 0.3s infinite';
      }
    });
  }

  if(b.broadcastActive && b.broadcastTimer > 0) {
    b.broadcastTimer--;
    document.getElementById('voltage-status').textContent = `노이즈: ${b.broadcastTimer}초`;
    if(b.broadcastTimer <= 0) {
      b.broadcastActive = false;
      broadcastFail();
    }
  }

  // Gas event at 95
  if(day >= 95 && battleTick % 20 === 0 && Math.random() < 0.3) {
    addBattleLog('danger','화학가스 살포! 환풍구 유지 필수!');
    if(!b.ventL && !b.ventR) {
      // disaster
      killStudentBattle();
    }
  }

  // Students die if wall breached + air bad
  if(b.airQuality < 20) {
    addBattleLog('danger','공기 오염 심각 — 학생 위험!');
    if(Math.random() < 0.3) killStudentBattle();
  }

  // Wall breach
  pts.forEach(p => {
    if(b.wallHP[p] <= 0 && Math.random() < 0.15) {
      addBattleLog('danger',`${p} 구역 붕괴! 9 개체 침입!`);
      if(Math.random() < 0.3) killStudentBattle();
    }
  });

  // Wave complete
  if(b.waveProgress >= 100) {
    b.waveComplete = true;
    stopBattle();
    advanceWave();
    return;
  }

  updateBattleUI();
}

function killStudentBattle() {
  const alive = G.students.filter(s=>s.status==='alive' && s.id!=='주인공');
  if(alive.length === 0) return;
  const victim = alive[Math.floor(Math.random()*alive.length)];
  killStudent(victim.id, '9화 공격');
  addBattleLog('danger',`${victim.name} 사망!`);
  document.getElementById(`tok-${victim.id}`)?.classList.add('dead');
  updateBattleUI();
}

function broadcastFail() {
  addBattleLog('danger','방송 송출 성공! 대량의 9가 침입 중!');
  document.getElementById('broadcast-warning').textContent = '';
  const vd = document.getElementById('voltage-dev');
  vd.style.animation = '';
  vd.classList.add('disabled');
  // Mass casualties
  for(let i=0;i<2;i++) killStudentBattle();
  // Damage walls heavily
  REPAIR_POINTS.forEach(p => G.battle.wallHP[p] = Math.max(0, G.battle.wallHP[p]-40));
  updateBattleUI();
}

function activateVoltage() {
  const b = G.battle;
  if(!b.broadcastActive) { addBattleLog('warning','방송 노이즈가 없습니다'); return; }
  if(G.items.metal < 1 || G.items.cable < 1 || G.items.water < 1) {
    addBattleLog('danger','아이템 부족! 전압 방출 불가!');
    broadcastFail();
    return;
  }
  // Use items
  G.items.metal--; G.items.cable--; G.items.water--;
  b.broadcastActive = false;
  b.broadcastTimer = 0;
  b.voltageCharging = true;
  const vd = document.getElementById('voltage-dev');
  vd.classList.add('charging');
  vd.style.animation = '';
  document.getElementById('voltage-status').textContent = '충전 중...';
  document.getElementById('broadcast-warning').textContent = '';
  setTimeout(()=>{
    b.voltageCharging = false;
    vd.classList.remove('charging');
    vd.classList.add('fired');
    vd.classList.add('disabled');
    document.getElementById('voltage-status').textContent = '방출 완료!';
    addBattleLog('success','⚡ 강한 전파 방출! 방송 교란 성공!');
    addBattleLog('info','9 개체 활동 감소...');
    updateSidebar();
    setTimeout(()=>{
      vd.classList.remove('fired');
      vd.classList.remove('disabled');
      document.getElementById('voltage-status').textContent = '대기중';
    }, 3000);
  }, 1000);
}

function repairVent(side) {
  const b = G.battle;
  if(side==='L' && !b.ventL) {
    b.ventL = true;
    addBattleLog('success','좌측 환풍구 재기동!');
    document.getElementById('vent-L').classList.remove('stopped');
    if(document.getElementById('broadcast-warning').textContent.includes('좌측'))
      document.getElementById('broadcast-warning').textContent = '';
  }
  if(side==='R' && !b.ventR) {
    b.ventR = true;
    addBattleLog('success','우측 환풍구 재기동!');
    document.getElementById('vent-R').classList.remove('stopped');
    if(document.getElementById('broadcast-warning').textContent.includes('우측'))
      document.getElementById('broadcast-warning').textContent = '';
  }
}

function repairWall(pt) {
  G.battle.wallHP[pt] = Math.min(100, G.battle.wallHP[pt] + 50);
  addBattleLog('info',`${pt} 수리 완료`);
  updateBattleUI();
}

function repairAll() {
  REPAIR_POINTS.forEach(p => G.battle.wallHP[p] = Math.min(100, G.battle.wallHP[p]+30));
  addBattleLog('info','전체 수리 시도');
  updateBattleUI();
}

function updateBattleUI() {
  const b = G.battle;
  // Wall HP colors
  REPAIR_POINTS.forEach(p => {
    const el = document.getElementById(`rep-${p}`);
    if(!el) return;
    const hp = b.wallHP[p];
    el.className = 'repair-pt';
    if(hp <= 0) el.classList.add('breached');
    else if(hp < 30) el.classList.add('critical');
    else if(hp < 60) el.classList.add('damaged');
    el.textContent = hp <= 0 ? '✗' : p;
  });

  // Vents
  const vl = document.getElementById('vent-L');
  const vr = document.getElementById('vent-R');
  if(vl) { vl.className = 'vent-icon' + (b.ventL?'':' stopped'); vl.textContent = b.ventL?'환풍\nL':'✗\nL'; }
  if(vr) { vr.className = 'vent-icon' + (b.ventR?'':' stopped'); vr.textContent = b.ventR?'환풍\nR':'✗\nR'; }

  // Stats
  const wallAvg = Math.round(Object.values(b.wallHP).reduce((a,b)=>a+b,0)/8);
  document.getElementById('b-wall').textContent = wallAvg;
  document.getElementById('b-air').textContent = Math.round(b.airQuality);
  document.getElementById('b-alive').textContent = aliveCount();
  document.getElementById('b-entities').textContent = b.entities.length;

  // Wave label
  const wl = document.getElementById('wave-label');
  if(b.day < 93) wl.textContent = 'DAY 91~92 적응 단계';
  else if(b.day < 96) wl.textContent = 'DAY 93 — 1차 웨이브';
  else if(b.day < 99) wl.textContent = 'DAY 96 — 2차 웨이브';
  else wl.textContent = 'DAY 99 — 최종 웨이브';
}

function advanceWave() {
  const b = G.battle;
  if(b.day < 93) {
    b.day = 93;
    b.waveProgress = 0;
    document.getElementById('battle-day').textContent = 'DAY 93 — 1차 웨이브';
    addBattleLog('danger','DAY 93 — 1차 대규모 공격 시작!');
    addBattleLog('warning','진행자의 방송 노이즈를 감지하면 즉시 전압 장치로!');
    startBattleLoop();
  } else if(b.day < 96) {
    b.day = 96;
    b.waveProgress = 0;
    G.day = 96;
    document.getElementById('battle-day').textContent = 'DAY 95~96 — 가스/2차 웨이브';
    addBattleLog('danger','DAY 95 화학가스 경보!');
    addBattleLog('danger','DAY 96 — 돌진형 9 등장!');
    startBattleLoop();
  } else if(b.day < 99) {
    b.day = 99;
    b.waveProgress = 0;
    G.day = 99;
    document.getElementById('battle-day').textContent = 'DAY 99 — 최종 웨이브';
    addBattleLog('danger','DAY 99 — 최종 공격! 모든 유형 동시 등장!');
    startBattleLoop();
  } else {
    // Battle over
    G.day = 100;
    stopBattle();
    setTimeout(scene_day100, 1000);
  }
}

function skipToNextPhase() {
  const b = G.battle;
  stopBattle();
  addBattleLog('system','>> 다음 단계로 이동');
  b.waveProgress = 100;
  advanceWave();
}

function addBattleLog(type, msg) {
  const le = document.getElementById('battle-log-entries');
  const d = document.createElement('div');
  d.className = `log-entry ${type}`;
  d.textContent = msg;
  le.appendChild(d);
  le.scrollTop = le.scrollHeight;
  // keep max 30
  while(le.children.length > 30) le.removeChild(le.firstChild);
}

function resetGame() {
  // Reset state
  G.day=0; G.tp=0; G.ateFood=false;
  G.flags = { planKnown:false,itemsReady:false,maruMet:false,allSurvive:true,truePath:false,day50Stay:false };
  G.items = { metal:0,cable:0,water:0 };
  G.students.forEach(s=>s.status='alive');
  stopBattle();
  showScreen('title-screen');
}
