<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUEL ARENA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810; --bg2: #0e0e1a; --bg3: #121220;
  --border: #1a1a2e; --border2: #242438;
  --gold: #c9a84c; --gold2: #f0d080; --gold3: #7a5a18;
  --red: #cc2244; --blue: #2244cc; --green: #22aa55;
  --text: #e8e0cc; --muted: #7a7060;
  --cinzel: 'Cinzel', serif; --sans: 'Noto Sans KR', sans-serif;
  --lp-p: #3366ff; --lp-e: #ff3366;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2)}

/* ── SHARED BUTTONS ── */
.btn{padding:.45rem 1rem;font-family:var(--cinzel);font-size:.78rem;letter-spacing:.08em;cursor:pointer;border-radius:3px;transition:all .15s;border:1px solid}
.btn-gold{background:var(--gold3);border-color:var(--gold);color:#080810}.btn-gold:hover{background:var(--gold)}
.btn-outline{background:transparent;border-color:var(--border2);color:var(--text)}.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-red{background:transparent;border-color:var(--red);color:var(--red)}.btn-red:hover{background:rgba(204,34,68,.1)}
.btn-blue{background:transparent;border-color:var(--blue);color:#6699ff}.btn-blue:hover{background:rgba(34,68,204,.1)}
.btn-sm{padding:.28rem .6rem;font-size:.7rem}

/* ══════════════════════════════════════════
   TITLE
══════════════════════════════════════════ */
.title-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem;padding:2rem;position:relative}
.title-bg{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 30% 60%,rgba(34,68,204,.08),transparent 50%),radial-gradient(ellipse at 70% 40%,rgba(136,34,204,.08),transparent 50%)}
.title-emblem{width:110px;height:110px;border:1.5px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.8rem;position:relative;animation:spin 20s linear infinite}
.title-emblem::before{content:'';position:absolute;width:130px;height:130px;border:1px solid rgba(201,168,76,.25);border-radius:50%;animation:spin 15s linear infinite reverse}
@keyframes spin{to{transform:rotate(360deg)}}
.title-logo{font-family:'Cinzel Decorative',serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:900;color:var(--gold);letter-spacing:.06em;text-shadow:0 0 40px rgba(201,168,76,.4);animation:glow 3s ease-in-out infinite}
@keyframes glow{0%,100%{text-shadow:0 0 40px rgba(201,168,76,.4)}50%{text-shadow:0 0 70px rgba(201,168,76,.7)}}
.title-sub{font-family:var(--cinzel);font-size:.85rem;color:var(--muted);letter-spacing:.4em}
.title-menu{display:flex;flex-direction:column;gap:.7rem;width:100%;max-width:300px}
.title-menu .btn{padding:.7rem 1.5rem;font-size:.9rem}

/* ══════════════════════════════════════════
   DECK BUILDER
══════════════════════════════════════════ */
.deckbuilder{display:grid;grid-template-rows:auto 1fr;grid-template-columns:1fr 340px;min-height:100vh;gap:0}
.db-header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.2rem;background:var(--bg2);border-bottom:1px solid var(--border)}
.db-header-title{font-family:'Cinzel Decorative',serif;font-size:1rem;color:var(--gold)}
.db-header-actions{display:flex;gap:.5rem;align-items:center}
.db-count{font-size:.78rem;color:var(--muted);font-family:var(--cinzel)}

/* Card pool */
.card-pool{padding:.8rem;display:flex;flex-direction:column;gap:.7rem;overflow:hidden}
.pool-toolbar{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center}
.pool-search{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:.4rem .7rem;font-family:var(--sans);font-size:.82rem;border-radius:3px;outline:none;flex:1;min-width:140px;transition:border-color .15s}
.pool-search:focus{border-color:var(--gold)}.pool-search::placeholder{color:var(--muted)}
.filter-pill{background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:.28rem .7rem;font-size:.72rem;font-family:var(--cinzel);cursor:pointer;border-radius:2px;transition:all .15s;white-space:nowrap}
.filter-pill.on,.filter-pill:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.06)}

/* Card grid */
.card-pool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:5px;overflow-y:auto;flex:1;padding-bottom:.5rem;align-content:start}
.pool-card{position:relative;cursor:pointer;border:1.5px solid var(--border);border-radius:3px;overflow:hidden;transition:all .15s;aspect-ratio:3/4.2;background:var(--bg2);display:flex;flex-direction:column;user-select:none}
.pool-card:hover{border-color:var(--gold);transform:translateY(-3px) scale(1.04);z-index:5;box-shadow:0 4px 16px rgba(201,168,76,.3)}
.pool-card-img{flex:1;display:flex;align-items:center;justify-content:center;font-size:2rem;position:relative}
.pool-card-frame{position:absolute;inset:0;opacity:.15}
.pool-card-footer{padding:2px 4px;font-size:.58rem;font-family:var(--cinzel);color:rgba(0,0,0,.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pool-card-atk{position:absolute;bottom:22px;right:3px;font-size:.55rem;font-family:var(--cinzel);color:#f09090;background:rgba(0,0,0,.7);padding:1px 3px;border-radius:1px;line-height:1.2}
.pool-card-restrict{position:absolute;top:2px;right:2px;font-size:.6rem;background:rgba(0,0,0,.8);color:#ff9090;padding:1px 3px;border-radius:1px}
.pool-card-in-deck{position:absolute;top:2px;left:2px;background:rgba(201,168,76,.9);color:#000;font-size:.6rem;font-family:var(--cinzel);padding:1px 4px;border-radius:1px}

/* Deck panel */
.deck-panel{background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.deck-tabs{display:flex;border-bottom:1px solid var(--border)}
.deck-tab{flex:1;padding:.5rem;font-family:var(--cinzel);font-size:.72rem;letter-spacing:.06em;cursor:pointer;color:var(--muted);text-align:center;border-bottom:2px solid transparent;transition:all .15s}
.deck-tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.deck-info{display:flex;gap:1rem;padding:.5rem .8rem;border-bottom:1px solid var(--border);font-size:.72rem}
.deck-info-item{display:flex;flex-direction:column;align-items:center;gap:.1rem}
.deck-info-val{font-family:var(--cinzel);font-size:1rem;color:var(--gold)}
.deck-info-label{color:var(--muted)}
.deck-list{overflow-y:auto;flex:1;padding:.4rem}
.deck-row{display:flex;align-items:center;gap:6px;padding:4px 6px;border:1px solid transparent;border-radius:2px;transition:all .15s;cursor:default}
.deck-row:hover{background:rgba(255,255,255,.02);border-color:var(--border)}
.deck-row-icon{font-size:1.1rem;flex-shrink:0;width:22px;text-align:center}
.deck-row-name{flex:1;font-size:.75rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.deck-row-lvl{font-size:.68rem;color:var(--muted);width:24px;text-align:right;font-family:var(--cinzel)}
.deck-row-atk{font-size:.68rem;color:#f09090;width:28px;text-align:right;font-family:var(--cinzel)}
.deck-row-qty{font-family:var(--cinzel);font-size:.82rem;color:var(--gold);font-weight:700;min-width:18px;text-align:right}
.deck-row-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.75rem;padding:0 2px;transition:color .15s;flex-shrink:0}.deck-row-del:hover{color:var(--red)}
.deck-row-add{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.75rem;padding:0 2px;transition:color .15s;flex-shrink:0}.deck-row-add:hover{color:var(--green)}
.deck-actions{padding:.7rem .8rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:.4rem}
.deck-name-row{display:flex;gap:.4rem}
.deck-name-input{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:.35rem .6rem;font-size:.78rem;font-family:var(--sans);border-radius:3px;outline:none}
.deck-name-input:focus{border-color:var(--gold)}
.saved-decks{display:flex;flex-direction:column;gap:.3rem;max-height:120px;overflow-y:auto}
.saved-deck-row{display:flex;align-items:center;gap:.4rem;padding:.3rem .4rem;border:1px solid var(--border);border-radius:2px;cursor:pointer;font-size:.75rem;transition:all .15s}
.saved-deck-row:hover{border-color:var(--gold);color:var(--gold)}

/* ══════════════════════════════════════════
   DUEL FIELD
══════════════════════════════════════════ */
.duel{display:grid;grid-template-rows:auto 1fr auto;min-height:100vh;max-width:1280px;margin:0 auto;padding:.4rem;gap:.4rem}

/* Top bar */
.top-bar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.5rem;padding:.4rem .8rem;background:var(--bg2);border:1px solid var(--border);border-radius:3px}
.lp-block{display:flex;align-items:center;gap:.6rem}
.lp-block.enemy{flex-direction:row-reverse}
.lp-name{font-family:var(--cinzel);font-size:.78rem;letter-spacing:.06em;min-width:60px}
.lp-bar-wrap{width:160px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.lp-bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.lp-bar-fill.p{background:linear-gradient(90deg,var(--lp-p),#88aaff)}
.lp-bar-fill.e{background:linear-gradient(90deg,#ff88aa,var(--lp-e))}
.lp-num{font-family:var(--cinzel);font-size:.95rem;font-weight:700;min-width:44px}
.lp-num.p{color:#88aaff}.lp-num.e{color:#ff88aa}
.phase-center{text-align:center}
.phase-label{font-family:var(--cinzel);font-size:.82rem;color:var(--gold);letter-spacing:.12em}
.turn-label{font-size:.68rem;color:var(--muted);margin-top:.1rem}

/* Field */
.field{display:grid;grid-template-rows:1fr 6px 1fr;gap:.3rem}
.field-side{display:grid;grid-template-rows:auto auto;gap:.3rem}
.field-main-area{display:grid;grid-template-columns:52px 1fr 52px;gap:.3rem}
.zone-col{display:flex;flex-direction:column;gap:.3rem;justify-content:center}
.monster-row,.spell-row{display:grid;grid-template-columns:repeat(5,1fr);gap:.3rem}
.field-divider{background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.25;border-radius:2px}

/* Zones */
.zone{aspect-ratio:59/86;border:1px solid var(--border2);border-radius:2px;background:rgba(255,255,255,.015);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;font-size:.52rem;color:var(--muted);letter-spacing:.03em;font-family:var(--cinzel)}
.zone:hover{border-color:rgba(201,168,76,.35);background:rgba(201,168,76,.03)}
.zone.mzone{border-color:rgba(240,192,64,.18)}
.zone.szone{border-color:rgba(10,160,128,.18)}
.zone.gz{border-color:rgba(140,60,60,.25);cursor:pointer}
.zone.bz{border-color:rgba(60,60,140,.25)}
.zone.fz{border-color:rgba(60,140,60,.25)}
.zone.pulse{border-color:var(--gold)!important;box-shadow:0 0 12px rgba(201,168,76,.6)!important;animation:zpulse .7s ease-in-out infinite}
.zone.atk-target{border-color:#ff3366!important;box-shadow:0 0 12px rgba(255,51,102,.5)!important;animation:zpulse .5s ease-in-out infinite}
@keyframes zpulse{0%,100%{opacity:1}50%{opacity:.6}}
.zone-cnt{position:absolute;bottom:2px;right:2px;background:rgba(0,0,0,.75);color:var(--gold);font-size:.58rem;padding:1px 3px;border-radius:1px;font-family:var(--cinzel);pointer-events:none}

/* Field cards */
.fcard{width:100%;height:100%;position:relative;border-radius:1px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.fcard-img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.fcard-emoji{font-size:1.6rem;position:relative;z-index:1}
.fcard-frame-overlay{position:absolute;inset:0;opacity:.4}
.fcard-atk{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);font-family:var(--cinzel);font-size:.52rem;display:flex;justify-content:space-around;padding:1px 0;pointer-events:none}
.atk-v{color:#f09090}.def-v{color:#90b0f0}
.fcard.def-pos{transform:rotate(90deg);transform-origin:center}
.fcard.facedown{background:linear-gradient(135deg,#181830,#0c0c1c);display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.fcard-sel{outline:2px solid var(--gold);outline-offset:-2px}
.atk-arrow{position:absolute;top:2px;left:2px;background:rgba(255,100,100,.85);color:#fff;font-size:.55rem;padding:1px 3px;border-radius:1px;font-family:var(--cinzel);pointer-events:none}

/* Hand */
.hand-area{display:flex;align-items:flex-end;justify-content:center;gap:4px;padding:.4rem .5rem;background:rgba(255,255,255,.01);border:1px solid var(--border);border-radius:3px;min-height:80px;flex-wrap:wrap}
.hand-card{width:52px;aspect-ratio:59/86;border:1.5px solid var(--border);border-radius:3px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative;flex-shrink:0;background:var(--bg2);display:flex;align-items:center;justify-content:center}
.hand-card:hover{transform:translateY(-14px) scale(1.08);border-color:var(--gold);z-index:5;box-shadow:0 6px 20px rgba(201,168,76,.35)}
.hand-card.selected{transform:translateY(-18px) scale(1.1);border-color:var(--gold);box-shadow:0 0 20px rgba(201,168,76,.7)}
.hand-card.face-down{font-size:1.1rem}
.hand-card-inner{width:100%;height:100%;position:relative;display:flex;align-items:center;justify-content:center}
.hand-card-emoji{font-size:1.6rem;position:relative;z-index:1}
.hand-card-overlay{position:absolute;inset:0;opacity:.3}

/* Action bar */
.action-bar{display:flex;align-items:center;gap:.5rem;padding:.4rem .8rem;background:var(--bg2);border:1px solid var(--border);border-radius:3px;flex-wrap:wrap}
.action-log{flex:1;font-size:.75rem;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.log-special{color:var(--gold)}.log-danger{color:#ff7788}.log-enemy{color:#ff9999}.log-phase{color:var(--muted)}
.action-btns{display:flex;gap:.4rem;flex-wrap:wrap}

/* Side zone specific */
.deck-zone-vis{background:linear-gradient(135deg,#1a1a3a,#0c0c20)}
.gy-zone-vis{background:linear-gradient(135deg,#2a1a1a,#1a0c0c)}

/* ══════════════════════════════════════════
   TOOLTIP
══════════════════════════════════════════ */
.tooltip{position:fixed;z-index:9000;width:230px;background:var(--bg2);border:1px solid var(--gold);border-radius:4px;overflow:hidden;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.85)}
.tooltip-top{height:8px}
.tooltip-body{padding:.6rem .8rem}
.tooltip-name{font-family:var(--cinzel);font-size:.82rem;color:var(--gold);font-weight:600;margin-bottom:.2rem;line-height:1.3}
.tooltip-type{font-size:.68rem;color:var(--muted);margin-bottom:.3rem}
.tooltip-stats{display:flex;gap:.8rem;margin-bottom:.3rem;font-family:var(--cinzel);font-size:.75rem}
.tooltip-atk{color:#f09090}.tooltip-def{color:#90b0f0}
.tooltip-desc{font-size:.68rem;color:var(--text);line-height:1.55;max-height:90px;overflow-y:auto}
.tooltip-effects{margin-top:.4rem;border-top:1px solid var(--border);padding-top:.4rem}
.effect-chip{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);border-radius:2px;padding:.15rem .4rem;font-size:.62rem;color:var(--gold);margin-bottom:.2rem}

/* ══════════════════════════════════════════
   CONTEXT MENU
══════════════════════════════════════════ */
.ctxmenu{position:fixed;z-index:9500;background:var(--bg2);border:1px solid var(--gold);border-radius:3px;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,.8);min-width:150px}
.ctxmenu-item{padding:.45rem .9rem;font-family:var(--cinzel);font-size:.78rem;color:var(--text);cursor:pointer;letter-spacing:.04em;border-bottom:1px solid var(--border);transition:all .15s}
.ctxmenu-item:last-child{border-bottom:none}
.ctxmenu-item:hover{background:rgba(201,168,76,.08);color:var(--gold)}
.ctxmenu-item.danger{color:var(--red)}.ctxmenu-item.danger:hover{background:rgba(204,34,68,.1)}

/* ══════════════════════════════════════════
   MODAL
══════════════════════════════════════════ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:8000;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-box{background:var(--bg2);border:1px solid var(--gold);border-radius:5px;padding:1.5rem;max-width:560px;width:100%;box-shadow:0 0 40px rgba(201,168,76,.15);max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Cinzel Decorative',serif;font-size:1rem;color:var(--gold);margin-bottom:.8rem;text-align:center}
.modal-body{font-size:.85rem;line-height:1.6;color:var(--text);margin-bottom:1rem}
.modal-actions{display:flex;gap:.5rem;justify-content:center}
.card-select-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(66px,1fr));gap:5px;max-height:280px;overflow-y:auto;margin-bottom:.8rem}

/* ══════════════════════════════════════════
   RESULT
══════════════════════════════════════════ */
.result-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:flex;align-items:center;justify-content:center}
.result-box{text-align:center;animation:resultPop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes resultPop{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
.result-title{font-family:'Cinzel Decorative',serif;font-size:clamp(2.5rem,8vw,5rem);color:var(--gold);text-shadow:0 0 60px rgba(201,168,76,.8);margin-bottom:.5rem}
.result-sub{font-family:var(--cinzel);font-size:1.1rem;color:var(--muted);margin-bottom:1.5rem}
.result-btns{display:flex;gap:.7rem;justify-content:center}

/* Damage popup */
.dmg-pop{position:fixed;pointer-events:none;font-family:'Cinzel Decorative',serif;font-size:2rem;font-weight:900;color:#ff4466;text-shadow:0 0 20px rgba(255,68,102,.8);animation:dmgFloat 1.4s ease-out forwards;z-index:9800}
@keyframes dmgFloat{0%{opacity:1;transform:translateY(0)scale(1)}100%{opacity:0;transform:translateY(-80px)scale(1.4)}}
.heal-pop{color:#44ff88;text-shadow:0 0 20px rgba(68,255,136,.8)}

/* Misc */
.tag-badge{display:inline-block;padding:.1rem .4rem;border-radius:2px;font-size:.65rem;font-family:var(--cinzel)}
.empty-hand{color:var(--muted);font-size:.78rem}
.turn-indicator{padding:.15rem .6rem;border-radius:2px;font-family:var(--cinzel);font-size:.68rem}
</style>
</head>
<body>
<div id="app"></div>
<script src="shared-data.js"></script>
<script>
// ══════════════════════════════════════════
// PHASE & GAME CONSTANTS
// ══════════════════════════════════════════
const PHASES = ['DRAW','STANDBY','MAIN1','BATTLE','MAIN2','END'];
const PHASE_LABEL = {DRAW:'DRAW PHASE',STANDBY:'STANDBY PHASE',MAIN1:'MAIN PHASE 1',BATTLE:'BATTLE PHASE',MAIN2:'MAIN PHASE 2',END:'END PHASE'};

// ══════════════════════════════════════════
// APP STATE
// ══════════════════════════════════════════
let CARDDB = {}; // id -> card

const App = {
  screen: 'title', // title | deckbuilder | duel
  // deck builder
  db: { search:'', typeFilter:'all', subFilter:'all', currentDeck:{ main:[], extra:[], side:[] }, deckName:'마이 덱', activeTab:'main' },
  // duel
  duel: null,
  result: null,
  // ui
  tooltip: null,
  ctxMenu: null,
  modal: null,
  logs: [],
  // duel ui state
  ui: { selectedHand: null, attackingZone: null },
};

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
function init() {
  const cards = DB.getCards();
  CARDDB = buildCardIndex(cards);
  render();
}

// ══════════════════════════════════════════
// DUEL STATE FACTORY
// ══════════════════════════════════════════
function newPlayerState(name, deckIds, isAI) {
  const deck = [...deckIds].sort(() => Math.random() - 0.5);
  return { name, isAI, lp:8000, deck, hand:[], monsterZones:[null,null,null,null,null], spellZones:[null,null,null,null,null], fieldZone:null, graveyard:[], banished:[], extraDeck:[] };
}

function startDuel(playerDeckIds) {
  const d = App.duel = {
    turn:1, activePlayer:0, phase:'MAIN1',
    normalSummonDone:false, attackedUIDs: new Set(),
    players:[ newPlayerState('YOU', playerDeckIds, false), newPlayerState('AI', buildAIDeck(), true) ]
  };
  App.result = null;
  App.logs = [];
  App.ui = { selectedHand:null, attackingZone:null };
  // Initial hand
  doDrawCard(0,5); doDrawCard(1,5);
  // Enable monster attacks for turn start (will be cleared on turn 1 Main1)
  addLog('듀얼 시작! 선공: YOU', 'special');
  App.screen = 'duel';
  render();
}

function buildAIDeck() {
  const cards = Object.values(CARDDB);
  const monsters = cards.filter(c=>c.type==='monster'&&!isExtraType(c));
  const spells = cards.filter(c=>c.type==='spell');
  const traps = cards.filter(c=>c.type==='trap');
  const pick = (arr,n) => {
    const out = [];
    const shuffled = [...arr].sort(()=>Math.random()-.5);
    for(const c of shuffled){ const copies=Math.min(3,n-out.length); for(let i=0;i<copies&&out.length<n;i++) out.push(c.id); if(out.length>=n)break; }
    return out;
  };
  return [...pick(monsters,24), ...pick(spells,12), ...pick(traps,4)].sort(()=>Math.random()-.5);
}

// ══════════════════════════════════════════
const d = () => App.duel;
const P = (i) => d().players[i];
const activeP = () => P(d().activePlayer);
const waitP = () => P(1-d().activePlayer);
const player = () => P(0);
const enemy = () => P(1);

function addLog(msg, type='normal') {
  App.logs.unshift({msg,type,id:Date.now()+Math.random()});
  if(App.logs.length>30) App.logs.pop();
}

function doDrawCard(pi, count=1) {
  const p = P(pi);
  for(let i=0;i<count;i++){
    if(p.deck.length===0){ addLog(`${p.name}: 덱이 없습니다!`,'danger'); endDuel(1-pi); return; }
    p.hand.push(p.deck.shift());
  }
}

function getRestrictions() { return DB.getRestrictions(); }
function maxCopies(cardId) {
  const r = getRestrictions()[cardId];
  if(r==='forbidden') return 0;
  if(r==='limited') return 1;
  if(r==='semi') return 2;
  return 3;
}

// ══════════════════════════════════════════
// PHASE ENGINE
// ══════════════════════════════════════════
function nextPhase() {
  const dv = d();
  const idx = PHASES.indexOf(dv.phase);
  if(idx < PHASES.length-1){
    dv.phase = PHASES[idx+1];
    onPhaseStart();
  } else {
    endTurn();
  }
  if(activeP().isAI && App.screen==='duel') setTimeout(aiDoTurn, 400);
  render();
}

function onPhaseStart() {
  const dv = d();
  addLog(`${activeP().name}: ${PHASE_LABEL[dv.phase]}`, 'phase');
  if(dv.phase==='DRAW'){
    if(dv.turn>1 || dv.activePlayer===1) doDrawCard(dv.activePlayer,1);
  }
  if(dv.phase==='MAIN1'){
    dv.normalSummonDone=false;
    // Allow monsters summoned BEFORE this turn to attack
    activeP().monsterZones.forEach(z=>{ if(z) z.canAttack=z.summonedThisTurn?false:true; });
  }
  if(dv.phase==='BATTLE'){
    // Allow attacking for monsters that were NOT summoned this turn
    activeP().monsterZones.forEach(z=>{ if(z) z.canAttack=!z.summonedThisTurn; });
  }
  if(dv.phase==='END'){
    const p = activeP();
    if(!p.isAI && p.hand.length>6){
      App.modal={type:'discard', count:p.hand.length-6, selected:[]};
      render(); return;
    } else {
      while(p.hand.length>6) p.graveyard.push(p.hand.shift());
    }
  }
}

function endTurn() {
  const dv = d();
  // Clear summonedThisTurn flags
  activeP().monsterZones.forEach(z=>{ if(z){ z.summonedThisTurn=false; z.attacked=false; z.canAttack=false; }});
  dv.activePlayer = 1-dv.activePlayer;
  dv.turn++;
  dv.phase='DRAW';
  onPhaseStart();
}

function endDuel(winnerIdx) {
  App.result={ winner: P(winnerIdx).name, isPlayer: winnerIdx===0 };
  render();
}

// ══════════════════════════════════════════
// SUMMON & ACTIONS
// ══════════════════════════════════════════
function normalSummon(handIdx, zoneIdx, position='ATK') {
  const dv=d();
  if(dv.normalSummonDone){ addLog('이미 일반 소환했습니다!'); return; }
  if(dv.phase!=='MAIN1'&&dv.phase!=='MAIN2'){ addLog('메인 페이즈에만 소환 가능합니다!'); return; }
  const cardId=player().hand[handIdx];
  const card=CARDDB[cardId];
  if(!card||!isMonster(card)||isExtraType(card)){ addLog('소환할 수 없는 카드입니다!'); return; }
  if(player().monsterZones[zoneIdx]!==null){ addLog('그 존에 이미 몬스터가 있습니다!'); return; }

  const lv=card.level||0;
  let tributeNeeded = lv>=7?2:lv>=5?1:0;

  if(tributeNeeded>0){
    const existing=player().monsterZones.filter(z=>z!==null);
    if(existing.length<tributeNeeded){ addLog(`릴리스 ${tributeNeeded}체 필요합니다!`); return; }
    let count=0;
    for(let i=0;i<5&&count<tributeNeeded;i++){
      if(player().monsterZones[i]){
        sendToGY(0, 'monster', i);
        count++;
      }
    }
  }

  const fc=createFieldCard(cardId, position, true);
  fc.canAttack=false; fc.summonedThisTurn=true;
  player().monsterZones[zoneIdx]=fc;
  player().hand.splice(handIdx,1);
  dv.normalSummonDone=true;
  addLog(`${card.name} 소환! [${position}]`, 'special');
  fireEffects('on_summon', fc, 0);
  fireEffects('on_normal_summon', fc, 0);
}

function setMonster(handIdx, zoneIdx) {
  const dv=d();
  if(dv.normalSummonDone){ addLog('이미 일반 소환했습니다!'); return; }
  const cardId=player().hand[handIdx];
  const card=CARDDB[cardId];
  if(!card||!isMonster(card)){ return; }
  if((card.level||0)>=5){ addLog('레벨 5+ 몬스터는 세트 불가!'); return; }
  if(player().monsterZones[zoneIdx]!==null){ addLog('그 존이 차있습니다!'); return; }
  const fc=createFieldCard(cardId,'DEF',false);
  fc.summonedThisTurn=true; fc.canAttack=false;
  player().monsterZones[zoneIdx]=fc;
  player().hand.splice(handIdx,1);
  dv.normalSummonDone=true;
  addLog(`몬스터 세트.`);
}

function activateSpellTrap(handIdx, zoneIdx) {
  const cardId=player().hand[handIdx];
  const card=CARDDB[cardId];
  if(!card||(card.type!=='spell'&&card.type!=='trap')){ return; }
  if(player().spellZones[zoneIdx]!==null){ addLog('그 마함존이 차있습니다!'); return; }
  const fc=createFieldCard(cardId,'ATK',true);
  player().spellZones[zoneIdx]=fc;
  player().hand.splice(handIdx,1);
  if(card.type==='spell'){
    addLog(`${card.name} 발동!`, 'special');
    fireEffects('on_activate', fc, 0);
    // Normal spell goes to GY
    if(card.subtype==='normal'||card.subtype==='quickplay'){
      player().spellZones[zoneIdx]=null;
      player().graveyard.push(cardId);
    }
  } else {
    addLog(`함정 카드 세트.`);
    fc.faceUp=false; // trap sets face down
  }
}

function activateTrap(zoneIdx) {
  const fc=player().spellZones[zoneIdx];
  if(!fc||fc.faceUp) return;
  const card=CARDDB[fc.cardId];
  if(!card||card.type!=='trap') return;
  fc.faceUp=true;
  addLog(`${card.name} 발동!`, 'special');
  fireEffects('on_activate', fc, 0);
  if(card.subtype==='normal'){
    player().spellZones[zoneIdx]=null;
    player().graveyard.push(fc.cardId);
  }
}

function sendToGY(pi, zone, idx) {
  const p=P(pi);
  const fc = zone==='monster'?p.monsterZones[idx]:p.spellZones[idx];
  if(!fc) return;
  const card=CARDDB[fc.cardId];
  if(zone==='monster') p.monsterZones[idx]=null;
  else p.spellZones[idx]=null;
  p.graveyard.push(fc.cardId);
  if(card) { fireEffects('on_destroy', fc, pi); fireEffects('on_send_to_gy', fc, pi); }
}

// ══════════════════════════════════════════
// BATTLE
// ══════════════════════════════════════════
function declareAttack(atkZoneIdx, defZoneIdx) {
  // defZoneIdx = -1 for direct
  const dv=d();
  if(dv.phase!=='BATTLE'){ addLog('배틀 페이즈에만 공격 가능합니다!'); return; }
  const atkFC=player().monsterZones[atkZoneIdx];
  if(!atkFC||!atkFC.canAttack||atkFC.attacked){ addLog('이 몬스터는 공격할 수 없습니다!'); return; }
  const atkCard=CARDDB[atkFC.cardId];
  const atk=(atkCard?.atk||0)+(atkFC._atkBoost||0);

  if(defZoneIdx===-1){
    // Direct attack
    if(enemy().monsterZones.some(z=>z)){addLog('상대 몬스터가 있어 직접 공격 불가!'); return;}
    const dmg=atk;
    enemy().lp=Math.max(0,enemy().lp-dmg);
    addLog(`${atkCard?.name} 직접 공격! 상대 -${dmg}`,  'special');
    showPopup(dmg,'enemy');
    atkFC.attacked=true; atkFC.canAttack=false;
    if(enemy().lp===0) { endDuel(0); return; }
  } else {
    const defFC=enemy().monsterZones[defZoneIdx];
    if(!defFC){ addLog('대상 없음!'); return; }
    const defCard=CARDDB[defFC.cardId];
    // Flip face-down
    if(!defFC.faceUp){ defFC.faceUp=true; addLog(`${defCard?.name||'?'} 표측방어!`); }

    let defVal;
    if(defFC.position==='ATK') defVal=Math.max(0,(defCard?.atk||0)+(defFC._atkBoost||0));
    else defVal=Math.max(0,(defCard?.def||0)+(defFC._defBoost||0));

    if(atk > defVal){
      const diff=atk-defVal;
      if(defFC.position==='ATK'){
        enemy().lp=Math.max(0,enemy().lp-diff);
        showPopup(diff,'enemy');
        addLog(`${atkCard?.name} → ${defCard?.name}: 전투 승리! 상대 -${diff}`,'special');
        if(enemy().lp===0){ endDuel(0); return; }
      } else {
        addLog(`${atkCard?.name} → ${defCard?.name} (DEF): 몬스터 파괴!`,'special');
      }
      sendToGY(1,'monster',defZoneIdx);
    } else if(atk===defVal){
      addLog(`${atkCard?.name} vs ${defCard?.name}: 동귀어진!`,'special');
      sendToGY(1,'monster',defZoneIdx);
      sendToGY(0,'monster',atkZoneIdx);
      App.ui.attackingZone=null; App.ui.selectedHand=null; render(); return;
    } else {
      const diff=defVal-atk;
      if(defFC.position==='ATK'){
        player().lp=Math.max(0,player().lp-diff);
        showPopup(diff,'player');
        addLog(`${atkCard?.name} 전투 패배! 내 LP -${diff}`,'danger');
        sendToGY(0,'monster',atkZoneIdx);
        if(player().lp===0){ endDuel(1); return; }
      } else {
        addLog(`${atkCard?.name} 공격이 막혔습니다. (ATK${atk} vs DEF${defVal})`);
      }
    }
    if(player().monsterZones[atkZoneIdx]){
      player().monsterZones[atkZoneIdx].attacked=true;
      player().monsterZones[atkZoneIdx].canAttack=false;
    }
  }
  App.ui.attackingZone=null;
  render();
}

function fireEffects(trigger, fieldCard, playerIdx) {
  const card=CARDDB[fieldCard?.cardId];
  if(!card||!card.effects) return;
  const ctx={
    state:d(), cardDB:CARDDB, controller:playerIdx, sourceCard:fieldCard,
    log:(msg,t)=>addLog(msg,t||'special'),
  };

  // Check if opponent died
  if(d().players[0].lp<=0) endDuel(1);
  if(d().players[1].lp<=0) endDuel(0);
}

// ══════════════════════════════════════════
// AI ENGINE
// ══════════════════════════════════════════
function aiDoTurn() {
  if(!d()||!activeP().isAI||App.screen!=='duel') return;
  const ph=d().phase;
  if(ph==='DRAW'||ph==='STANDBY'){ setTimeout(nextPhase,300); return; }
  if(ph==='MAIN1'){ aiMain(); setTimeout(()=>{nextPhase();},600); return; }
  if(ph==='BATTLE'){ aiBattle(); setTimeout(()=>{nextPhase();},500); return; }
  if(ph==='MAIN2'){ setTimeout(nextPhase,300); return; }
  if(ph==='END'){
    while(enemy().hand.length>6) enemy().graveyard.push(enemy().hand.shift());
    setTimeout(nextPhase,300); return;
  }
}

function aiMain() {
  const e=enemy();
  const dv=d();
  // Play best monster from hand
  if(!dv.normalSummonDone){
    const available=e.hand.map((id,i)=>({id,i,card:CARDDB[id]}))
      .filter(({card})=>card&&isMonster(card)&&!isExtraType(card)&&(card.level||0)<=4)
      .sort((a,b)=>(b.card.atk||0)-(a.card.atk||0));
    if(available.length>0){
      const best=available[0];
      const slot=e.monsterZones.findIndex(z=>z===null);
      if(slot>-1){
        const fc=createFieldCard(best.id,'ATK',true);
        fc.canAttack=false; fc.summonedThisTurn=true;
        e.monsterZones[slot]=fc;
        e.hand.splice(best.i,1);
        dv.normalSummonDone=true;
        addLog(`AI: ${best.card.name} 소환!`,'enemy');
        fireEffects('on_summon',fc,1);
        fireEffects('on_normal_summon',fc,1);
      }
    }
  }
  // Play a spell
  const spells=e.hand.map((id,i)=>({id,i,card:CARDDB[id]})).filter(({card})=>card&&isSpell(card));
  if(spells.length>0){
    const sp=spells[0];
    const slot=e.spellZones.findIndex(z=>z===null);
    if(slot>-1){
      const fc=createFieldCard(sp.id,'ATK',true);
      e.spellZones[slot]=fc;
      e.hand.splice(sp.i,1);
      addLog(`AI: ${sp.card.name} 발동!`,'enemy');
      const ctx={state:d(),cardDB:CARDDB,controller:1,sourceCard:fc,log:(m,t)=>addLog(m,t||'special')};
      for(const eff of (sp.card.effects||[]).filter(e=>e.trigger==='on_activate')){
        EffectEngine.executeActions(eff.actions,ctx);
      }
      if(sp.card.subtype==='normal'||sp.card.subtype==='quickplay'){
        e.spellZones[slot]=null; e.graveyard.push(sp.id);
      }
    }
  }
  render();
}

function aiBattle() {
  const e=enemy();
  e.monsterZones.forEach((atkFC,ai)=>{
    if(!atkFC||atkFC.attacked||atkFC.summonedThisTurn||!atkFC.canAttack) return;
    const atkCard=CARDDB[atkFC.cardId];
    const atk=(atkCard?.atk||0)+(atkFC._atkBoost||0);
    const targets=player().monsterZones.map((z,i)=>({z,i})).filter(({z})=>z);
    if(targets.length===0){
      // Direct
      player().lp=Math.max(0,player().lp-atk);
      addLog(`AI: ${atkCard?.name} 직접 공격! -${atk}`,'danger');
      showPopup(atk,'player');
      atkFC.attacked=true; atkFC.canAttack=false;
      if(player().lp===0){ endDuel(1); return; }
    } else {
      // Attack weakest
      const target=targets.sort((a,b)=>{
        const av=a.z.position==='ATK'?(CARDDB[a.z.cardId]?.atk||0):(CARDDB[a.z.cardId]?.def||0);
        const bv=b.z.position==='ATK'?(CARDDB[b.z.cardId]?.atk||0):(CARDDB[b.z.cardId]?.def||0);
        return av-bv;
      })[0];
      const defCard=CARDDB[target.z.cardId];
      if(!target.z.faceUp){ target.z.faceUp=true; }
      const defVal=target.z.position==='ATK'?(defCard?.atk||0):(defCard?.def||0);
      if(atk>defVal){
        if(target.z.position==='ATK'){
          const diff=atk-defVal;
          player().lp=Math.max(0,player().lp-diff);
          showPopup(diff,'player');
          addLog(`AI: ${atkCard?.name} 공격 → ${defCard?.name} 파괴! -${diff}`,'danger');
          if(player().lp===0){ endDuel(1); return; }
        } else {
          addLog(`AI: ${atkCard?.name} 수비 몬스터 파괴!`,'enemy');
        }
        sendToGY(0,'monster',target.i);
      } else {
        addLog(`AI: ${atkCard?.name} 공격 실패 (${atk} vs ${defVal})`,'enemy');
      }
      atkFC.attacked=true; atkFC.canAttack=false;
    }
  });
  render();
}

        <div class="deck-info-item"><div class="deck-info-val">${mainCards.filter(x=>CARDDB[x.id]?.type==='spell').reduce((s,x)=>s+x.qty,0)}</div><div class="deck-info-label">마법</div></div>
        <div class="deck-info-item"><div class="deck-info-val">${mainCards.filter(x=>CARDDB[x.id]?.type==='trap').reduce((s,x)=>s+x.qty,0)}</div><div class="deck-info-label">함정</div></div>
        <div class="deck-info-item"><div class="deck-info-val" style="color:${mainTotal>=40?'var(--green)':'var(--red)'}">${mainTotal>=40?'OK':'부족'}</div><div class="deck-info-label">40장+</div></div>

      <div class="deck-list">

          const card=CARDDB[entry.id];

          const fc=getFrameColor(card);
          return `<div class="deck-row"
            onmouseenter="showTooltip(event,'${card.id}')" onmouseleave="hideTooltip()">
            <div class="deck-row-icon">${card.image||'?'}</div>
            <div class="deck-row-name" style="color:${fc}">${card.name}</div>
            <div class="deck-row-lvl">${card.type==='monster'?'★'+(card.level||0):''}</div>
            <div class="deck-row-atk">${card.type==='monster'?card.atk??'?':''}</div>
            <div class="deck-row-qty">×${entry.qty}</div>
            <button class="deck-row-del" onclick="removeDeckCard('${card.id}','${S.activeTab}')">−</button>
            <button class="deck-row-add" onclick="addDeckCard('${card.id}','${S.activeTab}')">+</button>
          </div>`;
        }).join('')}
        ${(S.activeTab==='main'?mainCards:extraCards).length===0?
          '<div style="color:var(--muted);font-size:.78rem;text-align:center;padding:1.5rem">카드를 추가하세요<br><small>카드 풀에서 클릭</small></div>':''}
      </div>
      <div class="deck-actions">
        <div class="deck-name-row">
          <input class="deck-name-input" value="${S.deckName}" oninput="App.db.deckName=this.value" placeholder="덱 이름">
          <button class="btn btn-gold btn-sm" onclick="saveDeck()">저장</button>
        </div>
        ${savedDecks.length>0?`<div style="font-size:.7rem;color:var(--muted);font-family:var(--cinzel);letter-spacing:.08em;margin-top:.3rem">저장된 덱</div>
        <div class="saved-decks">
          ${savedDecks.map(n=>`<div class="saved-deck-row" onclick="loadDeck('${n}')">
            <span style="flex:1">📁 ${n}</span>
            <button class="btn btn-sm btn-red" style="font-size:.65rem;padding:.15rem .4rem" onclick="event.stopPropagation();deleteSavedDeck('${n}')">삭제</button>
          </div>`).join('')}
        </div>`:''}
      </div>
    </div>
  </div>
  ${renderTooltip()}`;
}

function renderPoolCard(card, deck, restrictions) {
  const fc=getFrameColor(card);
  const rest=restrictions[card.id];
  const maxCopy=maxCopies(card.id);
  const allEntries=[...deck.main,...deck.extra];
  const inDeckEntry=allEntries.find(x=>x.id===card.id);
  const inDeckQty=inDeckEntry?.qty||0;
  const forbidden=maxCopy===0;
  const isExtra=isExtraType(card);
  return `<div class="pool-card ${forbidden?'':'cursor-pointer'}"
    style="opacity:${forbidden?.5:1}"
    onclick="${forbidden?'':'addCardFromPool(\''+card.id+'\')'}"
    onmouseenter="showTooltip(event,'${card.id}')"
    onmouseleave="hideTooltip()">
    <div class="pool-card-frame" style="background:${fc}"></div>
    <div class="pool-card-img">
      <div class="pool-card-frame" style="background:${fc};opacity:.2"></div>
      <span style="position:relative;z-index:1;font-size:${card.image?.length>2?'1.4rem':'2rem'}">${card.image||'?'}</span>
    </div>
    <div class="pool-card-footer" style="background:${fc}cc;color:rgba(0,0,0,.85)">${card.name}</div>
    ${card.type==='monster'?`<div class="pool-card-atk">${card.atk??'?'}</div>`:''}
    ${rest?`<div class="pool-card-restrict">${{forbidden:'禁',limited:'1',semi:'2'}[rest]}</div>`:''}
    ${inDeckQty>0?`<div class="pool-card-in-deck">×${inDeckQty}</div>`:''}
  </div>`;
}

function addCardFromPool(cardId) {
  const card=CARDDB[cardId];
  if(!card) return;
  const isExtra=isExtraType(card);
  addDeckCard(cardId, isExtra?'extra':'main');
}

function addDeckCard(cardId, tab='main') {
  const card=CARDDB[cardId];
  if(!card) return;
  const deck=App.db.currentDeck;
  const list=tab==='main'?deck.main:deck.extra;
  const maxItems=tab==='main'?60:15;
  const total=list.reduce((s,x)=>s+x.qty,0);
  if(total>=maxItems){ addLog(`${tab==='main'?'메인':'엑스트라'} 덱이 가득 찼습니다!`); renderToast('덱이 가득 찼습니다!','error'); return; }
  const max=maxCopies(cardId);
  if(max===0){ renderToast('금지 카드입니다!','error'); return; }
  const existing=list.find(x=>x.id===cardId);
  if(existing){
    if(existing.qty>=max){ renderToast(`최대 ${max}장까지만 넣을 수 있습니다.`,'warn'); return; }
    existing.qty++;
  } else {
    list.push({id:cardId, qty:1});
  }
  render();
}

function removeDeckCard(cardId, tab='main') {
  const list=tab==='main'?App.db.currentDeck.main:App.db.currentDeck.extra;
  const idx=list.findIndex(x=>x.id===cardId);
  if(idx<0) return;
  list[idx].qty--;
  if(list[idx].qty<=0) list.splice(idx,1);
  render();
}

function clearDeck() {
  if(!confirm('덱을 초기화하시겠습니까?')) return;
  App.db.currentDeck={main:[],extra:[],side:[]};
  render();
}

function saveDeck() {
  const name=App.db.deckName.trim();
  if(!name){ renderToast('덱 이름을 입력하세요.','error'); return; }
  DB.saveDeck(name, App.db.currentDeck);
  renderToast('덱 저장 완료!','success');
  render();
}

function loadDeck(name) {
  const decks=DB.getDecks();
  if(!decks[name]) return;
  App.db.currentDeck=JSON.parse(JSON.stringify(decks[name]));
  App.db.deckName=name;
  renderToast(`「${name}」 덱 불러옴!`,'success');
  render();
}

function deleteSavedDeck(name) {
  if(!confirm(`「${name}」 덱을 삭제하시겠습니까?`)) return;
  DB.deleteDeck(name);
  renderToast('삭제됨.','success');
  render();
}

function startDuelWithDeck() {
  const deck=App.db.currentDeck;
  const mainIds=deck.main.flatMap(x=>Array(x.qty).fill(x.id));
  if(mainIds.length<20){
    if(!confirm(`덱이 ${mainIds.length}장입니다 (권장:40+). 그대로 시작하시겠습니까?`)) return;
  }
  startDuel(mainIds.length>0?mainIds:buildAIDeck());
}

function quickStart() {
  startDuel(buildAIDeck());
}

// ── DUEL ─────────────────────────────────
function renderDuel() {
  const dv=d();
  if(!dv) return '';
  const isMyTurn=dv.activePlayer===0;
  return `<div class="duel">
    ${renderTopBar(dv)}
    ${renderField(dv, isMyTurn)}
    ${renderActionBar(dv, isMyTurn)}
  </div>
  ${renderTooltip()}
  ${renderCtxMenu()}
  ${renderModal()}`;
}

function renderTopBar(dv) {
  const p=player(), e=enemy();
  const pp=Math.max(0,Math.min(100,(p.lp/8000)*100));
  const ep=Math.max(0,Math.min(100,(e.lp/8000)*100));
  return `<div class="top-bar">
    <div class="lp-block">
      <div class="lp-name">👤 ${p.name}</div>
      <div class="lp-bar-wrap"><div class="lp-bar-fill p" style="width:${pp}%"></div></div>
      <div class="lp-num p">${p.lp.toLocaleString()}</div>
    </div>
    <div class="phase-center">
      <div class="phase-label">${PHASE_LABEL[dv.phase]}</div>
      <div class="turn-label">TURN ${dv.turn} · ${activeP().name}</div>
    </div>
    <div class="lp-block enemy">
      <div class="lp-name">🤖 ${enemy().name}</div>
      <div class="lp-bar-wrap"><div class="lp-bar-fill e" style="width:${ep}%"></div></div>
      <div class="lp-num e">${enemy().lp.toLocaleString()}</div>
    </div>
  </div>`;
}

function renderField(dv, isMyTurn) {
  return `<div class="field">
    ${renderSide(1, dv, isMyTurn, true)}
    <div class="field-divider"></div>
    ${renderSide(0, dv, isMyTurn, false)}
  </div>`;
}

function renderSide(pi, dv, isMyTurn, isEnemy) {
  const p=P(pi);
  const showHand=!isEnemy;
  return `<div class="field-side">
    ${isEnemy?renderHandArea(p, isEnemy):''}
    <div class="field-main-area">
      <!-- Left col: extra zones -->
      <div class="zone-col">
        ${renderSideZone('field','필드',p.fieldZone)}
        ${renderGYZone(pi, p)}
        ${renderBZone(pi, p)}
      </div>
      <!-- Center: main field -->
      <div>
        ${isEnemy?`
        <div class="spell-row" style="margin-bottom:.3rem">
          ${p.spellZones.map((z,i)=>renderZone(z,'szone',pi,'spell',i,isMyTurn,isEnemy)).join('')}
        </div>
        <div class="monster-row">
          ${p.monsterZones.map((z,i)=>renderZone(z,'mzone',pi,'monster',i,isMyTurn,isEnemy)).join('')}
        </div>`:
        `<div class="monster-row" style="margin-bottom:.3rem">
          ${p.monsterZones.map((z,i)=>renderZone(z,'mzone',pi,'monster',i,isMyTurn,isEnemy)).join('')}
        </div>
        <div class="spell-row">
          ${p.spellZones.map((z,i)=>renderZone(z,'szone',pi,'spell',i,isMyTurn,isEnemy)).join('')}
        </div>`}
      </div>
      <!-- Right col: deck -->
      <div class="zone-col">
        ${renderDeckZone(p)}
      </div>
    </div>
    ${!isEnemy?renderHandArea(p, isEnemy):''}
  </div>`;
}

function renderZone(fieldCard, zoneClass, pi, zoneType, zoneIdx, isMyTurn, isEnemy) {
  const attacking=App.ui.attackingZone;
  let extraClass='';
  let onclick='';

  if(!fieldCard){
    // Empty zone click logic
    if(!isEnemy && isMyTurn && App.ui.selectedHand!==null && !attacking){
      const dv=d();
      if((dv.phase==='MAIN1'||dv.phase==='MAIN2')&&dv.activePlayer===0){
        if(zoneType==='monster') { extraClass='pulse'; onclick=`onEmptyMonsterClick(${zoneIdx})`; }
        if(zoneType==='spell') { extraClass='pulse'; onclick=`onEmptySpellClick(${zoneIdx})`; }
      }
    }
    if(isEnemy&&attacking&&zoneType==='monster'){ extraClass='atk-target'; onclick=`doAttack(${attacking.zoneIdx},${zoneIdx})`; }
    return `<div class="zone ${zoneClass} ${extraClass}" onclick="${onclick}">
      <div>${zoneType==='monster'?'M':'S/T'}</div>
    </div>`;
  }

  const card=CARDDB[fieldCard.cardId];
  const fc=getFrameColor(card);
  const isSelected=App.ui.attackingZone?.zoneIdx===zoneIdx&&!isEnemy&&zoneType==='monster';

  // Click handlers
  if(!isEnemy&&isMyTurn&&zoneType==='monster'){
    const dv=d();
    if(dv.phase==='BATTLE'&&dv.activePlayer===0&&fieldCard.canAttack&&!fieldCard.attacked){
      onclick=`selectAttacker(${zoneIdx})`;
    } else if(dv.phase==='MAIN1'||dv.phase==='MAIN2'){
      onclick=`showMonsterCtx(event,${zoneIdx})`;
    }
    if(isSelected) extraClass='pulse';
  }
  if(!isEnemy&&zoneType==='spell'&&fieldCard&&!fieldCard.faceUp){
    onclick=`activateTrap(${zoneIdx})`;
  }
  if(isEnemy&&attacking&&zoneType==='monster'){ extraClass='atk-target'; onclick=`doAttack(${attacking.zoneIdx},${zoneIdx})`; }

  const isDef=fieldCard.position==='DEF';
  const atk=card?.atk!=null?(card.atk+(fieldCard._atkBoost||0)):null;
  const def=card?.def!=null?(card.def+(fieldCard._defBoost||0)):null;

  return `<div class="zone ${zoneClass} ${extraClass}"
    onclick="${onclick}"
    onmouseenter="showTooltip(event,'${fieldCard.cardId}')"
    onmouseleave="hideTooltip()"
    style="padding:0;cursor:${onclick?'pointer':'default'}">
    <div class="fcard ${isDef?'def-pos':''} ${!fieldCard.faceUp?'facedown':''} ${isSelected?'fcard-sel':''}">
      <div class="fcard-frame-overlay" style="background:${fc}"></div>
      ${fieldCard.faceUp?`<span class="fcard-emoji">${card?.image||'?'}</span>`:'🃏'}
      ${fieldCard.faceUp&&fieldCard.attacked?`<div class="atk-arrow">⚔</div>`:''}
      ${fieldCard.faceUp&&card?.type==='monster'&&atk!=null?`<div class="fcard-atk">
        <span class="atk-v">${atk}</span><span class="def-v">${def??'?'}</span>
      </div>`:''}
    </div>
  </div>`;
}

function renderSideZone(type, label, content) {
  return `<div class="zone fz" style="cursor:default"><div>${label}</div></div>`;
}

function renderGYZone(pi, p) {
  const count=p.graveyard.length;
  const topId=p.graveyard[p.graveyard.length-1];
  return `<div class="zone gz" onclick="showGY(${pi})"
    ${topId?`onmouseenter="showTooltip(event,'${topId}')" onmouseleave="hideTooltip()"`:''}>
    ${topId?`<span style="font-size:1.2rem">${CARDDB[topId]?.image||'🃏'}</span>`:'<div>묘지</div>'}
    <div class="zone-cnt">${count}</div>
  </div>`;
}

function renderBZone(pi, p) {
  return `<div class="zone bz" style="cursor:default">
    <div>제외</div><div class="zone-cnt">${p.banished.length}</div>
  </div>`;
}

function renderDeckZone(p) {
  return `<div class="zone deck-zone-vis" style="cursor:default">
    <div style="font-size:1.2rem">🃏</div><div class="zone-cnt">${p.deck.length}</div>
  </div>`;
}

function renderHandArea(p, isEnemy) {
  if(isEnemy) {
    return `<div class="hand-area">
      ${p.hand.map(()=>`<div class="hand-card face-down">🎴</div>`).join('')}
      ${p.hand.length===0?'<span class="empty-hand">핸드 없음</span>':''}
    </div>`;
  }
  return `<div class="hand-area">
    ${p.hand.map((cardId,i)=>{
      const card=CARDDB[cardId];
      const fc=getFrameColor(card);
      const sel=App.ui.selectedHand===i;
      return `<div class="hand-card ${sel?'selected':''}"
        onclick="selectHand(${i})"
        onmouseenter="showTooltip(event,'${cardId}')"
        onmouseleave="hideTooltip()">
        <div class="hand-card-inner">
          <div class="hand-card-overlay" style="background:${fc}"></div>
          <span class="hand-card-emoji">${card?.image||'?'}</span>
        </div>
      </div>`;
    }).join('')}
    ${p.hand.length===0?'<span class="empty-hand">핸드 없음</span>':''}

}

function renderActionBar(dv, isMyTurn) {
  const log=App.logs[0];
  const atk=App.ui.attackingZone;
  return `<div class="action-bar">
    <div class="action-log">
      ${log?`<span class="${{special:'log-special',danger:'log-danger',enemy:'log-enemy',phase:'log-phase',normal:''}[log.type]||''}">${log.msg}</span>`:''}
    </div>
    <div class="action-btns">
      ${atk?`
        <button class="btn btn-red btn-sm" onclick="cancelAttack()">취소</button>
        <button class="btn btn-outline btn-sm" onclick="directAttackBtn()">직접 공격</button>
      `:''}
      ${isMyTurn&&!atk?`
        ${dv.phase==='MAIN1'||dv.phase==='MAIN2'?`<button class="btn btn-outline btn-sm" onclick="activateSelectedSpell()">마법 발동</button>`:''}
        ${dv.phase==='MAIN1'?`<button class="btn btn-outline btn-sm" onclick="toBattle()">배틀 페이즈</button>`:''}
        <button class="btn btn-gold btn-sm" onclick="nextPhase()">다음 페이즈 →</button>
      `:''}
      ${!isMyTurn?`<span style="font-size:.75rem;color:var(--muted);font-family:var(--cinzel);letter-spacing:.08em">상대 턴 진행 중...</span>`:''}
      <button class="btn btn-red btn-sm" onclick="if(confirm('포기하시겠습니까?'))endDuel(1)">포기</button>
    </div>
  </div>`;
}

// ── TOOLTIP ───────────────────────────────
function showTooltip(event, cardId) {
  const card=CARDDB[cardId];
  if(!card) return;
  const prev=App.tooltip;
  App.tooltip={cardId, x:event.clientX, y:event.clientY};
  // 카드가 바뀌었거나 툴팁이 없으면 재렌더링
  if(!prev || prev.cardId !== cardId) {
    // 기존 툴팁 즉시 제거 후 재렌더
    const old=document.querySelector('.tooltip');
    if(old) old.remove();
    render();
  } else {
    const tip=document.querySelector('.tooltip');
    if(tip) positionTooltip(tip, event.clientX, event.clientY);
  }
}

function hideTooltip() {
  App.tooltip=null;
  const tip=document.querySelector('.tooltip');
  if(tip) tip.style.display='none';
}

function positionTooltip(el, x, y) {
  el.style.display='block';
  const left=x>window.innerWidth-250?x-240:x+12;
  el.style.left=left+'px';
  el.style.top=Math.min(y+10, window.innerHeight-360)+'px';
}

function renderTooltip() {
  if(!App.tooltip) return '';
  const {cardId, x, y} = App.tooltip;
  const card=CARDDB[cardId];
  if(!card) return '';
  const fc=getFrameColor(card);
  const left=x>window.innerWidth-250?x-240:x+12;
  const top=Math.min(y+10, window.innerHeight-360);
  return `<div class="tooltip" style="left:${left}px;top:${top}px">
    <div class="tooltip-top" style="background:${fc}"></div>
    <div class="tooltip-body">
      <div class="tooltip-name">${card.name}</div>
      <div class="tooltip-type">${{monster:'몬스터',spell:'마법',trap:'함정'}[card.type]} · ${card.subtype||''} ${card.type==='monster'?`· ★${card.level||0} · ${card.attribute||''} / ${card.race||''}`:''}</div>
      ${card.type==='monster'?`<div class="tooltip-stats"><span class="tooltip-atk">ATK ${card.atk??'?'}</span><span class="tooltip-def">DEF ${card.def??'?'}</span></div>`:''}
      <div class="tooltip-desc">${card.desc||''}</div>
      ${(card.effects||[]).length>0?`<div class="tooltip-effects">
        ${card.effects.map(e=>`<div class="effect-chip">◈ ${e.description||e.trigger}</div>`).join('')}
      </div>`:''}
    </div>
  </div>`;
}

// ── CONTEXT MENU ──────────────────────────
function renderCtxMenu() {
  if(!App.ctxMenu) return '';
  const {x,y,items}=App.ctxMenu;
  const left=x>window.innerWidth-200?x-170:x;
  return `<div class="ctxmenu" style="left:${left}px;top:${y}px">
    ${items.map(item=>`<div class="ctxmenu-item ${item.cls||''}" onclick="${item.action};closeCtx()">${item.label}</div>`).join('')}
    <div class="ctxmenu-item" onclick="closeCtx()" style="color:var(--muted)">취소</div>
  </div>`;
}

function closeCtx() { App.ctxMenu=null; const el=document.querySelector('.ctxmenu'); if(el) el.remove(); }

// ── MODAL ─────────────────────────────────
function renderModal() {
  if(!App.modal) return '';
  const m=App.modal;
  if(m.type==='gy'){
    const p=P(m.pi);
    return `<div class="modal-bg" onclick="App.modal=null;render()">
      <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-title">묘지 (${p.graveyard.length}장)</div>
        <div class="card-select-grid">
          ${p.graveyard.slice().reverse().map(id=>{
            const card=CARDDB[id];
            const fc=getFrameColor(card);
            return `<div class="pool-card" style="cursor:default;border:1.5px solid ${fc}40"
              onmouseenter="showTooltip(event,'${id}')" onmouseleave="hideTooltip()">
              <div class="pool-card-img"><span style="font-size:1.5rem">${card?.image||'?'}</span></div>
              <div class="pool-card-footer" style="background:${fc}cc;color:rgba(0,0,0,.85)">${card?.name||id}</div>
            </div>`;
          }).join('')}
        </div>
        <div class="modal-actions"><button class="btn btn-outline" onclick="App.modal=null;render()">닫기</button></div>
      </div>
    </div>`;
  }
  if(m.type==='discard'){
    const p=player();
    return `<div class="modal-bg">
      <div class="modal-box">
        <div class="modal-title">핸드 제한 초과</div>
        <div class="modal-body">${m.count}장을 선택하여 묘지로 보내세요. (${m.selected.length}/${m.count})</div>
        <div class="card-select-grid">
          ${p.hand.map((id,i)=>{
            const card=CARDDB[id];
            const fc=getFrameColor(card);
            const sel=m.selected.includes(i);
            return `<div class="pool-card" style="border:2px solid ${sel?'var(--gold)':fc+'40'};cursor:pointer"
              onclick="toggleDiscard(${i})"
              onmouseenter="showTooltip(event,'${id}')" onmouseleave="hideTooltip()">
              <div class="pool-card-img"><span style="font-size:1.5rem">${card?.image||'?'}</span></div>
              <div class="pool-card-footer" style="background:${fc}cc;color:rgba(0,0,0,.85)">${card?.name||id}</div>
            </div>`;
          }).join('')}
        </div>
        <div class="modal-actions">
          <button class="btn btn-gold" onclick="confirmDiscard()" ${m.selected.length<m.count?'disabled style="opacity:.5"':''}>확인</button>
        </div>
      </div>
    </div>`;
  }
  return '';
}

// ══════════════════════════════════════════
// UI EVENT HANDLERS
// ══════════════════════════════════════════
function selectHand(idx) {
  App.ui.selectedHand = App.ui.selectedHand===idx ? null : idx;
  App.ui.attackingZone=null;
  App.ctxMenu=null;
  render();
}

function onEmptyMonsterClick(zoneIdx) {
  const i=App.ui.selectedHand;
  if(i===null) return;
  const cardId=player().hand[i];
  const card=CARDDB[cardId];
  if(!card) return;
  if(!isMonster(card)||isExtraType(card)){ addLog('몬스터 카드만 소환 가능합니다!'); render(); return; }
  // Show summon options
  App.ctxMenu={
    x: 300, y: 300,
    items:[
      {label:'공격 표시로 소환', action:`normalSummon(${i},${zoneIdx},'ATK');App.ui.selectedHand=null;render()`},
      {label:'세트 (수비 표시)', action:`setMonster(${i},${zoneIdx});App.ui.selectedHand=null;render()`},
    ]
  };
  render();
}

function onEmptySpellClick(zoneIdx) {
  const i=App.ui.selectedHand;
  if(i===null) return;
  const cardId=player().hand[i];
  const card=CARDDB[cardId];
  if(!card) return;
  if(isMonster(card)){ addLog('마함존에는 마법/함정 카드만!'); render(); return; }
  activateSpellTrap(i, zoneIdx);
  App.ui.selectedHand=null;
  render();
}

function showMonsterCtx(event, zoneIdx) {
  const fc=player().monsterZones[zoneIdx];
  if(!fc) return;
  const items=[
    {label:'표시 방향 변경', action:`changePos(${zoneIdx})`},
  ];
  // Check activatable effects
  const card=CARDDB[fc.cardId];
  if(card?.effects?.some(e=>e.trigger==='manual')){
    items.unshift({label:'효과 발동', action:`activateManualEffect(${zoneIdx})`});
  }
  App.ctxMenu={x:event.clientX, y:event.clientY, items};
  render();
}

function changePos(zoneIdx) {
  const fc=player().monsterZones[zoneIdx];
  if(!fc) return;
  fc.position=fc.position==='ATK'?'DEF':'ATK';
  addLog(`표시 방향 변경: ${fc.position}`);
  render();
}

function activateManualEffect(zoneIdx) {
  const fc=player().monsterZones[zoneIdx];
  if(!fc) return;
  const card=CARDDB[fc.cardId];
  if(!card) return;
  const manualEffects=(card.effects||[]).filter(e=>e.trigger==='manual');
  if(manualEffects.length===0) return;
  const ctx={state:d(),cardDB:CARDDB,controller:0,sourceCard:fc,log:(m,t)=>addLog(m,t||'special')};
  for(const eff of manualEffects){
    if(eff.once && fc._usedEffects?.includes(eff.id)) continue;
    EffectEngine.executeActions(eff.cost, ctx);
    EffectEngine.executeActions(eff.actions, ctx);
    if(eff.once){ if(!fc._usedEffects)fc._usedEffects=[]; fc._usedEffects.push(eff.id); }
  }
  if(d().players[0].lp<=0) endDuel(1);
  if(d().players[1].lp<=0) endDuel(0);
  render();
}

function selectAttacker(zoneIdx) {
  App.ui.attackingZone={zoneIdx};
  addLog('공격 대상을 선택하세요.','phase');
  render();
}

function cancelAttack() { App.ui.attackingZone=null; render(); }

function doAttack(atkZoneIdx, defZoneIdx) {
  declareAttack(atkZoneIdx, defZoneIdx);
  App.ui.attackingZone=null;
}

function directAttackBtn() {
  if(!App.ui.attackingZone) return;
  declareAttack(App.ui.attackingZone.zoneIdx, -1);
  App.ui.attackingZone=null;
}

function activateSelectedSpell() {
  const i=App.ui.selectedHand;
  if(i===null){ addLog('먼저 핸드에서 카드를 선택하세요!'); return; }
  const cardId=player().hand[i];
  const card=CARDDB[cardId];
  if(!card||isMonster(card)){ addLog('마법/함정 카드를 선택하세요!'); return; }
  const slot=player().spellZones.findIndex(z=>z===null);
  if(slot<0){ addLog('마함존이 가득 찼습니다!'); return; }
  activateSpellTrap(i, slot);
  App.ui.selectedHand=null;
  render();
}

function toBattle() {
  // canAttack은 BATTLE 페이즈 시작 시 onPhaseStart에서 처리됨
  d().phase='MAIN1';
  nextPhase();
}

function showGY(pi) {
  App.modal={type:'gy', pi};
  render();
}

function toggleDiscard(idx) {
  const m=App.modal;
  const i=m.selected.indexOf(idx);
  if(i>-1) m.selected.splice(i,1);
  else if(m.selected.length<m.count) m.selected.push(idx);
  render();
}

function confirmDiscard() {
  const m=App.modal;
  m.selected.sort((a,b)=>b-a).forEach(idx=>{
    const id=player().hand.splice(idx,1)[0];
    player().graveyard.push(id);
  });
  App.modal=null;
  nextPhase();
}

// ── RESULT ────────────────────────────────
function showResult() {
  const r=App.result;
  const el=document.createElement('div');
  el.className='result-overlay';
  el.innerHTML=`<div class="result-box">
    <div class="result-title">${r.isPlayer?'YOU WIN!':'YOU LOSE'}</div>
    <div class="result-sub">${r.isPlayer?'멋진 승리입니다!':'분발하세요!'}</div>
    <div class="result-btns">
      <button class="btn btn-gold" onclick="App.result=null;App.duel=null;App.screen='title';App.logs=[];render()">타이틀로</button>
      <button class="btn btn-outline" onclick="App.result=null;App.duel=null;startDuelWithDeck?.[0]??quickStart()">재도전</button>
    </div>
  </div>`;
  document.body.appendChild(el);
}

// ── TOAST ─────────────────────────────────
function renderToast(msg, type='success') {
  const el=document.createElement('div');
  el.style.cssText=`position:fixed;bottom:1.5rem;right:1.5rem;background:var(--bg2);border:1px solid ${type==='success'?'var(--green)':type==='error'?'var(--red)':'var(--gold)'};border-radius:3px;padding:.6rem 1rem;font-size:.8rem;z-index:9999;animation:none;color:var(--text)`;
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2500);
}

// ── NAVIGATION ────────────────────────────
function goTo(screen) { App.screen=screen; App.ctxMenu=null; App.tooltip=null; render(); }

function openAdmin() {
  window.open('admin.html','_blank');
}

function attachGlobalHandlers() {
  document.addEventListener('click', (e)=>{
    if(App.ctxMenu && !e.target.closest('.ctxmenu')){ closeCtx(); }
  },{once:true});
  document.addEventListener('mousemove', (e)=>{
    const tip=document.querySelector('.tooltip');
    if(tip && App.tooltip) positionTooltip(tip, e.clientX, e.clientY);
  });
}

// ══════════════════════════════════════════
// START
// ══════════════════════════════════════════
init();
</script>
</body>
</html>
